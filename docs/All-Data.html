        bTip = `${up ? "+" : ""}${dHrs}h Vs ${p.prevLabel}` +
               (pct !== null ? ` (${pct}%)` : "");
      }
      // top 5 apps of this bucket in the CURRENT period, for the tooltip
      const m = new Map();
      for (const l of levels)
        for (const [n, s] of curA.apps[l] ?? []) m.set(n, (m.get(n) ?? 0) + s);
      const tops = [...m].sort((a, b) => b[1] - a[1]).slice(0, 5)
        .map(([n, s]) => `   ${hrs(s)}h  ${n}`).join("\n");
      const attrs = ` data-tip-title="${esc(label)}: ${hrs(cur)}h Vs ${hrs(prev)}h (${esc(p.prevLabel)})"
          data-tip-body="${esc(lvNames + "\n" + bTip + (tops ? "\n" + tops : ""))}"`;
      return lvlCell(curA, levels, cur, label, "pt-bar", attrs) +
        `<div class="app-trend pt-trend"${attrs}>${bTrend}</div>`;
    });
    // ---- ORIGINAL RescueTime category names the dictionary combines into
    // this category (up to 5, this period's hours) — CATEGORY cards only,
    // and only when the dictionary actually renames/merges something ----
    const rawCatRows = (catKey && !lvlKey)
      ? [...cur.rawCats.entries()].sort((a, b) => b[1].sec - a[1].sec)
      : [];
    const catMerged = rawCatRows.length > 1 ||
      (rawCatRows.length === 1 && rawCatRows[0][0] !== catDisplay);
    // summary block. PERIOD cards (v61): ONE shared grid — bar cells (col 1,
    // their previous width), the CURRENT pulse ring (col 2), the trends
    // (col 3, exactly midway between the rings), and the PRIOR-period pulse
    // ring at the far right (col 4). CATEGORY/TYPE cards keep the classic
    // two-sided total row and get no rings (a type is single-level).
    const totalAttrs =
      ` data-tip-title="${esc(catDisplay ? catDisplay + " — " : "")}${esc(p.label)}: ${hrs(totalSec)}h Logged"
         data-tip-body="${esc(tipBody)}"`;
    // category/type cards: the entity's ALL-TIME hours as a share of every
    // attributable hour — the "x% of all your time" line under Total Logged
    let entAllSec = 0;
    // for the APP detail card: tally this app's (effective) category + type so
    // we can show a "<category> — <type>" row (category renamed if the dict
    // renamed it, else the raw RescueTime name; both coloured by the type)
    const appCatSec = new Map(), appLvSec = emptyLevels();
    if (catKey)
      for (const dayRows of Object.values(arch?.days ?? {}))
        for (const [sec, act, cat, prod] of dayRows)
          if (inCat(cat, prod, act)) {
            entAllSec += sec;
            if (appKey) {
              appCatSec.set(cat, (appCatSec.get(cat) ?? 0) + sec);
              if (LEVELS.includes(String(prod))) appLvSec[String(prod)] += sec;
            }
          }
    let appCatLabel = "", appTypeLvl = null, appCatLvl = null;
    if (appKey) {
      let bc = "", bcs = -1;
      for (const [c, s] of appCatSec) if (s > bcs) { bcs = s; bc = c; }
      appCatLabel = catName(bc);
      let bl = -1;
      for (const l of LEVELS) if (appLvSec[l] > bl) { bl = appLvSec[l]; appTypeLvl = l; }
      // the CATEGORY's OWN colour = its dominant type across ALL its apps
      // (e.g. Games → red, driven by every other game), which is INDEPENDENT
      // of this one app's own dominant type (ESO → Personal). Scan the whole
      // (already-translated) archive for rows in this category.
      const catLv = emptyLevels();
      for (const dayRows of Object.values(arch?.days ?? {}))
        for (const row of dayRows)
          if (row[2] === bc && LEVELS.includes(String(row[3])))
            catLv[String(row[3])] += row[0];
      let cl = -1;
      for (const l of LEVELS) if (catLv[l] > cl) { cl = catLv[l]; appCatLvl = l; }
      if (appCatLvl === null) appCatLvl = appTypeLvl;
    }
    // entity cards (v80): FOUR aligned columns on ONE grid — this period's
    // hours with the entity's share OF THAT PERIOD right underneath, the
    // entity's all-time hours with its share of ALL logged time underneath,
    // then the trend and the prior period — every cell in the same
    // "value + label" style as the Total Logged cell (user spec).
    const entSummary = () => {
      const gt = grandTotalSec(arch);
      const perPct = p.total ? fmtPct(100 * totalSec / p.total) : null;
      const allPct = gt ? fmtPct(100 * entAllSec / gt) : null;
      const cell = (val, label, cls = "", attrs = "") =>
        `<div class="cat-label ent-cell${cls}"${attrs}>
           <span class="cat-time">${val}</span><span class="cat-name">${esc(label)}</span></div>`;
      const tip = (title, body) =>
        ` data-tip-title="${esc(title)}" data-tip-body="${esc(body)}"`;
      // grid (v93): [This Period][Logged In Total] tight on the left, a BIG
      // scalable trend filling the middle (both rows), the prior period
      // right-anchored (both rows). Row 2 = the two share %s under the left cols.
      return `<div class="ent-grid${appKey && appTypeLvl !== null ? " ent-hascat" : ""}">
        ${cell(hrs(totalSec) + "h", "This Period", " ent-a", totalAttrs)}
        ${cell(hrs(entAllSec) + "h", "Logged In Total", " ent-b",
           tip(`${catDisplay}: ${hrs(entAllSec)}h All Time`, "All Recorded Data"))}
        ${p.noPrev
          ? `<div class="app-trend ent-trend app-since">Since ${esc(p.range[0])}</div>`
          : `<div class="app-trend ent-trend"${totalAttrs}>${trend}</div>`}
        ${p.noPrev ? `<div class="ent-prior"></div>`
          : cell(hrs(prevTotSec) + "h", p.prevLabel, " ent-prior", totalAttrs)}
        ${perPct === null ? `<div class="ent-c"></div>`
          : cell(perPct + "%", "Of This Period", " ent-share ent-c",
              tip(`${perPct}% Of ${p.label}`,
                `${hrs(totalSec)}h Of ${hrs(p.total)}h Logged In ${p.label}\n${catDisplay} Only`))}
        ${allPct === null ? `<div class="ent-d"></div>`
          : cell(allPct + "%", "Of All Your Time", " ent-share ent-d",
              tip(`${allPct}% Of All Your Time`,
                `${hrs(entAllSec)}h Of ${hrs(gt)}h Total Logged\n${catDisplay} Across All Recorded Data`))}
        ${appKey && appTypeLvl !== null ? `
          <div class="cat-label ent-cell ent-catcell" style="color:${COLORS[appTypeLvl]}"><span class="cat-name">${esc(NAMES[appTypeLvl])}</span></div>
          <div class="cat-label ent-cell ent-typecell" style="color:${COLORS[appCatLvl]}"><span class="cat-name">${esc(appCatLabel)}</span></div>` : ""}
        </div>`;
    };
    // Total page (v81): an "Average Per Day" line right under Total Logged
    // (mean across every day that has data), before the level bars
    let avgCells = "";
    if (p.noPrev && !catKey) {
      let activeDays = 0;
      for (const dayRows of Object.values(arch?.days ?? {}))
        if (dayRows.length) activeDays++;
      if (activeDays) {
        const avgAttrs = ` data-tip-title="${esc(`${hrs(totalSec / activeDays)}h Average Per Day`)}"
          data-tip-body="${esc(`${hrs(totalSec)}h Across ${activeDays} Days With Data`)}"`;
        avgCells = textCell(hrs(totalSec / activeDays), "Average Per Day", "pt-bar", avgAttrs) +
          `<div class="app-trend pt-trend"${avgAttrs}></div>`;
      }
    }
    const summaryRows = catKey
      ? entSummary()
      : textCell(hrs(totalSec), "Total Logged", "pt-bar", totalAttrs) +
        `<div class="app-trend pt-trend"${totalAttrs}>${trend}</div>` +
        avgCells + bucketRows.join("");
    // two pulse rings, drawn exactly like the dashboard pulse card's rings
    // (total above, number inside, "Current"/"Prior" below): ring 1 = THIS
    // period, ring 2 = the PRIOR period, its caption naming what it shows
    const pulseBlock = (sfx, word) => `
      <div class="period-pulse pt-p${sfx}">
        <div class="pulse-wrap">
          <canvas id="periodPulseRing${sfx}"></canvas>
          <div class="pulse-center"><div class="pulse-inner">
            <div class="pulse-label" id="periodPulseTotal${sfx}">–</div>
            <div class="pulse-num" id="periodPulseNum${sfx}">–</div>
            <div class="pulse-label">${word}</div>
          </div></div>
        </div>
        <div class="pulse-pct" id="periodPulsePct${sfx}" hidden></div>
      </div>`;
    const rows = [
      catKey
        ? `<div class="period-top">
             <div class="period-top-rows">${summaryRows}</div></div>`
        : `<div class="period-top ptgrid${avgCells ? " ptgrid-total" : ""}">${summaryRows}${pulseBlock("1", "Current")}${p.noPrev ? "" : pulseBlock("2", "Prior")}</div>`,
      catKey
        ? `<div class="period-apps fill"><div class="app-sec">${appKey ? ({ hour2: "Usage Every 2 Hours For Past 24 Hours", d14: "Usage Per Day For Past 14 Days", d2x15: "Usage Every 2 Days For Past 30 Days", mon: "Usage Per Month For Past 12 Months", year: "Usage Per Year" }[p.appBucket] ?? "Hours Logged") : "Top Apps"}</div>
             <div class="bar-list" id="periodApps"></div>
             ${appKey || !p.h24 ? `<div class="pbot-chart" id="periodBot">
               <canvas id="periodBotCanvas"></canvas></div>` : ""}</div>`
        : `<div class="period-apps fill">
             <div class="tab-row" id="periodTabs">
               <div class="app-sec tab active" data-tab="apps">Apps</div>
               <div class="app-sec tab" data-tab="cats">Categories</div>
               <div class="app-sec tab" data-tab="types">Types</div>
               ${p.h24 ? "" : `<div class="app-sec tab" data-tab="pulse">Pulse</div>` +
                 (p.noPrev
                   ? `<div class="app-sec tab" data-tab="averages">Averages</div>`
                   : `<div class="app-sec tab" data-tab="trends">Trends</div>`)}
             </div>
             <div class="bar-list" id="periodApps"></div>
             ${p.h24 ? "" : `<div class="pbot-chart" id="periodBot" hidden>
               <canvas id="periodBotCanvas"></canvas></div>`}</div>`,
      ...(catMerged
        ? [`<div class="period-apps"><div class="app-sec">Combined Original Names</div>
             <div class="bar-list" id="catRawList"></div></div>`]
        : []),
    ];
    document.getElementById("appDetailTitle").classList.remove("tc");
    // show WHAT you're looking at in the title (App / Category / Type) so the
    // three same-named entities — e.g. "Personal" the type vs the category vs
    // an app — are tellable apart from the detail card, matching the tagged
    // search suggestions.
    const kindTag = appKey ? " (App)" : lvlKey ? " (Type)" : catKey ? " (Category)" : "";
    document.getElementById("appDetailTitle").textContent = catDisplay
      ? `${catDisplay}${kindTag} — ${p.label}`
      : `${p.label} — Details`;
    document.getElementById("appDetailFresh").textContent = winText(p.range, p.h24);
    // period switcher (v79): same entity, different period on click

      kind: appKey ? "app" : lvlKey ? "lvl" : catKey ? "cat" : "period",
      key: appKey ?? lvlKey ?? catKey, display: catDisplay,

    });

    sizeDetailCard();
    if (catMerged)
      renderBarList("catRawList", rawCatRows.slice(0, 5).map(([raw, e]) =>

         `Original RescueTime ${appKey ? "Name" : "Category"} — Renamed To ${catDisplay}\n` +
         `${hrs(e.sec)}h In ${p.label}`]));

      const actsOf = A => {

      document.getElementById("periodPulseTotal1").textContent = `${lvTot(curA)}h`;
      periodPulseChart?.destroy();
      periodPulseChart = makeDonut("periodPulseRing1", "periodPulseNum1",
        curA.lv, actsOf(curA), n => n,
        `${p.label} Pulse — ${winText(p.range, p.h24)}`);
      const pctEl = document.getElementById("periodPulsePct1");
      if (p.noPrev) {
        // Total page: no prior period exists — the ring's caption says what
        // the single ring covers instead of a trend
        pctEl.hidden = false;
        pctEl.textContent = `Since ${p.range[0]}`;
        pctEl.dataset.tipTitle = "All Recorded Data";
        pctEl.dataset.tipBody = winText(p.range, p.h24);
      } else {
        document.getElementById("periodPulseTotal2").textContent = `${lvTot(prevA)}h`;
        periodPulseChart2?.destroy();
        periodPulseChart2 = makeDonut("periodPulseRing2", "periodPulseNum2",
          prevA.lv, actsOf(prevA), n => n,
          `${p.prevLabel} Pulse — ${winText(p.prevRange, p.prevH24)}`);
        pulsePct("periodPulsePct1", curA.lv, prevA.lv, `From ${p.prevLabel}`,
          `${p.label} Vs ${p.prevLabel}`);
        // pulsePct hides itself when the previous period has no data — on this
        // card the line must never vanish (user request), so say why instead
        if (pctEl.hidden) {
          pctEl.hidden = false;
          pctEl.textContent = `No Trend (${p.prevLabel})`;
          pctEl.dataset.tipTitle = `No ${p.prevLabel} Data To Compare Against`;
          pctEl.dataset.tipBody = `${p.label} Vs ${p.prevLabel}`;
        }
        // ring 2's caption names the period it shows
        const pctEl2 = document.getElementById("periodPulsePct2");
        pctEl2.hidden = false;
        pctEl2.textContent = p.prevLabel;
        pctEl2.dataset.tipTitle = `${p.prevLabel} Pulse`;
        pctEl2.dataset.tipBody = winText(p.prevRange, p.prevH24) || p.prevLabel;
      }
    }
    // ---- the tabbed list (Apps / Categories / Types) — the list SCROLLS
    // inside the card (small themed scrollbar) instead of trimming rows, and
    // the site-wide 0.5 h floor now applies here too ----
    // apps: same bars, %-vs-previous-period labels and tooltips as the
    // dashboard's Top Apps cards; EVERY app ≥ 0.5 h, scrollable
    // On the all-time pages (noPrev) there is no previous period, so the
    // right-edge % is the entry's SHARE of every logged hour instead of a
    // trend ("20% of my total time went to Games") — v81 user spec. The
    // Apps list is also capped to the TOP 50 there (10+ years of apps).
    const sharePctOf = sec => p.total ? fmtPct(100 * sec / p.total) + "%" : undefined;
    const appEntries = [...agg.values()]
      .filter(e => e.sec >= MIN_LOGGED_SEC)
      .sort((a, b) => b.sec - a.sec)
      .slice(0, p.noPrev ? 50 : Infinity)
      .map(e => {
        const prevSec = prevAgg.get(e.name.toLowerCase())?.sec;
        const pct = p.noPrev ? sharePctOf(e.sec)
          : prevSec > 0 ? Math.round(100 * e.sec / prevSec) + "%" : "No Trend";
        return [e.name, e.sec, e.prod,
          `${catName(e.cat)} — ${NAMES[e.prod]}, ${hrs(e.sec)}h` +
          (p.noPrev ? `\n${pct} Of All Your Logged Time`
            : prevSec > 0 ? `\n${pct} Of ${p.prevLabel} (${hrs(prevSec)}h)`
                          : `\nNot Used In ${p.prevLabel} (No Trend)`),
          pct];
      });
    detailRefit = null;   // no fit-to-height trimming — the list scrolls
    // ---- the BOTTOM graph (v77): one line per top app (category/type cards
    // + the Apps tab) or per top category (the Categories tab) across THIS
    // period — DAILY points up to ~2 months, WEEKLY points beyond (year

    let botCache = null;
    const botMaps = () => botCache ??= (() => {
      const span = (new Date(p.range[1] + "T00:00:00")
                  - new Date(p.range[0] + "T00:00:00")) / 864e5;
      // v81: spans beyond ~3 years (the Total pages) bucket by HALF-YEAR
      // (user spec for the all-time charts); 2 months..3 years by week
      const half = span > 1100, weekly = !half && span > 62;
      const lvM = new Map(), appM = new Map(), catM = new Map();
      const appTot = new Map(), catTot = new Map();
      for (const d = new Date(p.range[0] + "T00:00:00"); ; d.setDate(d.getDate() + 1)) {
        const iso = isoOf(d.getTime());
        if (iso > p.range[1]) break;
        const key = half
          ? `${d.getFullYear()}-${d.getMonth() < 6 ? "01" : "07"}-01`
          : weekly
          ? isoOf(weekStart(new Date(iso + "T00:00:00")).getTime()) : iso;
        const l2 = lvM.get(key) ?? lvM.set(key, emptyLevels()).get(key);
        const am = appM.get(key) ?? appM.set(key, new Map()).get(key);
        const cm = catM.get(key) ?? catM.set(key, new Map()).get(key);
        for (const [sec, act, cat, prod] of rowsOf(iso)) {
          // the denominator stays ALL logged time of the slice (site-wide
          // % style), whatever entity filter applies to the lines
          if (LEVELS.includes(String(prod))) l2[String(prod)] += sec;
          const cn = catName(cat);
          cm.set(cn, (cm.get(cn) ?? 0) + sec);
          catTot.set(cn, (catTot.get(cn) ?? 0) + sec);
          if (!inCat(cat, prod, act)) continue;   // app lines: the ENTITY's apps
          const an = appName(act);
          am.set(an, (am.get(an) ?? 0) + sec);
          appTot.set(an, (appTot.get(an) ?? 0) + sec);
        }
      }
      const keys = [...lvM.keys()];
      const labels = [], tips = [];
      keys.forEach((k, i) => {
        const d = new Date(k + "T00:00:00");
        if (half) {
          const h = d.getMonth() < 6 ? 1 : 2;
          labels.push(`H${h} ${String(d.getFullYear()).slice(2)}`);
          tips.push(`H${h} ${d.getFullYear()} (${h === 1 ? "January – June" : "July – December"})`);
        } else if (weekly) {
          const wn = isoWeekNum(d);
          const th = new Date(d); th.setDate(d.getDate() + 3);
          labels.push(`W${wn}`);
          tips.push(`Week ${wn} ${th.getFullYear()} (From ${k})`);
        } else {
          labels.push(String(d.getDate()));   // integer day, no ".month" decimal
          tips.push(d.toLocaleDateString(undefined,
            { weekday: "short", day: "numeric", month: "short", year: "numeric" }));
        }
      });
      const top10 = m => [...m.entries()].sort((a, b) => b[1] - a[1])
        .slice(0, 10).map(([n]) => n);
      return { keys, labels, tips, lvM, appM, catM,
               topApps: top10(appTot), topCats: top10(catTot) };
    })();
    const botGraph = what => {
      const K = botMaps();
      return trendChartCore("periodBotCanvas", { keys: K.keys,
        labels: K.labels, tips: K.tips, lvMap: K.lvM,
        catMap: what === "apps" ? K.appM : K.catM,
        topCats: what === "apps" ? K.topApps : K.topCats,
        what: "cats", pointR: 2, legendScale: 1 });
    };
    // list entries linked to the graph: every APP / CATEGORY row opens its
    // own detail page for THIS period (entry[5] nav descriptor) and carries
    // the square matching its line colour below (entry[6] — invisible when
    // the app/category isn't on the graph)
    const withMeta = (entries, tops, kind) => entries.map(en => {
      const i = tops ? tops.indexOf(en[0]) : -1;
      return [...en, { kind, key: en[0], period: p.label },
        tops ? (i >= 0 ? CAT_COLORS[i % CAT_COLORS.length] : null) : undefined];
    });
    const appMeta = entries =>
      withMeta(entries, p.h24 ? null : botMaps().topApps, "app");
    const catMeta = entries =>
      withMeta(entries, p.h24 ? null : botMaps().topCats, "cat");
    // ---- APP view (v88): the "Hours Logged" section becomes a TIME-SERIES —
    // one bar per bucket of this app's hours, granularity set by the period
    // (Day = hourly, Week = 14 days, Month = 30 days, Year = months, Total =
    // years). The bottom graph plots the SAME hours as a line (period-card
    // style). ----
    if (appKey) {
      const isoD = d => isoOf(d.getTime());
      const addD = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
      const pad = n => String(n).padStart(2, "0");
      const WD = d => { const s = d.toLocaleDateString(undefined, { weekday: "long" }); return s.charAt(0).toUpperCase() + s.slice(1); };
      const MO = d => { const s = d.toLocaleDateString(undefined, { month: "long" }); return s.charAt(0).toUpperCase() + s.slice(1); };
      const moShort = d => { const s = d.toLocaleDateString(undefined, { month: "short" }); return s.charAt(0).toUpperCase() + s.slice(1); };
      // per-day seconds for this app (display-merged) + its dominant level (bar colour)
      const perDayApp = new Map(), lvSec = emptyLevels();
      for (const [d, dr] of Object.entries(arch?.days ?? {}))
        for (const [sec, act, , prod] of dr)
          if (appName(act).toLowerCase() === appKey) {
            perDayApp.set(d, (perDayApp.get(d) ?? 0) + sec);
            if (LEVELS.includes(String(prod))) lvSec[String(prod)] += sec;
          }
      let appLvl = "0", bestL = -1;
      for (const l of LEVELS) if (lvSec[l] > bestL) { bestL = lvSec[l]; appLvl = l; }
      const bucket = p.appBucket ?? "d2x15";
      // cells[i] = the ALIGNED text COLUMNS for row i (each its own grid cell,
      // so weekday / day / month / year line up card-wide); axis = short chart
      // x-labels; `template` = the row's CSS grid columns (hours + cells).
      const cells = [], axis = [], tips = [], secs = [];
      let template;
      // anchor: the shifted period's "end" (prev/next navigation). Defaults to
      // now / nowMs for the current window.
      const A = p.anchorDay ?? now, Ams = p.anchorMs ?? nowMs;
      if (bucket === "hour2") {
        // the past 24 h (ending at the anchor) split into 12 clock-aligned
        // 2-hour blocks, from data.json's hourly rows (per app).
        template = "3.8em 7em";                      // Hours | 2-hour range
        const abd = new Date(Ams); abd.setHours(0, 0, 0, 0);
        const baseMs = abd.getTime(), curH = new Date(Ams).getHours();
        const endHoff = (Math.floor(curH / 2) + 1) * 2;   // exclusive end (hours from midnight)
        const sm = new Array(12).fill(0);
        for (const [t, sec, , act] of (data.hour_activities ?? [])) {
          if (appName(act).toLowerCase() !== appKey) continue;
          const hoff = Math.round((new Date(t).getTime() - baseMs) / 36e5);
          const k = Math.floor((hoff - (endHoff - 24)) / 2);
          if (k >= 0 && k < 12) sm[k] += sec;
        }
        for (let k = 0; k < 12; k++) {
          const sHoff = endHoff - 24 + 2 * k, sh = ((sHoff % 24) + 24) % 24, eh = sh + 2;
          const d0 = new Date(baseMs + sHoff * 36e5);
          secs.push(sm[k]);
          cells.push([`${pad(sh)}:00 - ${pad(eh)}:00`]);
          axis.push(pad(sh));
          tips.push(`${WD(d0)} ${moShort(d0)} ${d0.getDate()}, ${pad(sh)}:00 – ${pad(eh)}:00`);
        }
      } else if (bucket === "d14") {
        template = "3.8em 6em 2.4em 5.6em";           // Hours | Weekday | Day | Month
        for (let i = 13; i >= 0; i--) {
          const d = addD(A, -i);
          secs.push(perDayApp.get(isoD(d)) ?? 0);
          cells.push([WD(d), String(d.getDate()), MO(d)]);
          axis.push(String(d.getDate()));
          tips.push(`${WD(d)} ${MO(d)} ${d.getDate()}, ${d.getFullYear()}`);
        }
      } else if (bucket === "d2x15") {
        // 15 two-day buckets over the past 30 days (newest = yesterday+today)
        template = "3.8em 6em 4.4em 5.6em";           // Hours | Weekday | Day range | Month
        for (let j = 14; j >= 0; j--) {
          const older = addD(A, -(2 * j + 1)), newer = addD(A, -2 * j);
          secs.push((perDayApp.get(isoD(older)) ?? 0) + (perDayApp.get(isoD(newer)) ?? 0));
          cells.push([WD(older), `${older.getDate()} - ${newer.getDate()}`, MO(older)]);
          axis.push(String(older.getDate()));
          tips.push(`${older.getDate()} – ${newer.getDate()} ${MO(older)} ${older.getFullYear()}`);
        }
      } else if (bucket === "mon") {
        // the 12 months of the CALENDAR year (Jan..Dec; Jan..this-month for the
        // current year) — one bar per month
        template = "3.8em 5.6em 3.2em";               // Hours | Month | Year
        const Y = p.calYear ?? A.getFullYear();
        const lastM = Y === now.getFullYear() ? now.getMonth() : 11;
        for (let mo = 0; mo <= lastM; mo++) {
          const d = new Date(Y, mo, 1), key = isoOf(d.getTime()).slice(0, 7);
          let sec = 0; for (const [dd, ss] of perDayApp) if (dd.slice(0, 7) === key) sec += ss;
          secs.push(sec);
          cells.push([MO(d), String(Y)]);
          axis.push(moShort(d));
          tips.push(`${MO(d)} ${Y}`);
        }
      } else {   // "year"
        template = "3.8em 3.4em";                     // Hours | Year
        let minY = now.getFullYear();
        for (const dd of perDayApp.keys()) { const y = +dd.slice(0, 4); if (y < minY) minY = y; }
        for (let y = minY; y <= now.getFullYear(); y++) {
          let sec = 0; for (const [dd, ss] of perDayApp) if (+dd.slice(0, 4) === y) sec += ss;
          secs.push(sec); cells.push([String(y)]); axis.push(String(y)); tips.push(String(y));
        }
      }
      const totalSecs = secs.reduce((a, b) => a + b, 0);
      // bar list, most-recent bucket first, hours + aligned text columns.
      // Right-edge % = this bucket vs the PREVIOUS (older) bucket, like the
      // trend % on the other detail-card bar lists.
      const listRows = secs.map((s, i) => {
        const prev = i > 0 ? secs[i - 1] : null;   // the older neighbour
        // % only on bars WITH usage, vs the previous bar (capped so a tiny
        // denominator doesn't blow up to 7000%)
        let pct = null;
        if (s > 0 && prev != null) {
          if (prev > 0) { const r = Math.round(100 * s / prev); pct = r > 999 ? "999%+" : r + "%"; }
          else pct = "New";
        }
        return { sec: s, cells: cells[i], pct,
          tipTitle: tips[i],
          tipBody: `${hrs(s)}h ${catDisplay}` +
            (pct && prev ? `\n${pct} Of The Previous Bar (${hrs(prev)}h)` : "") };
      }).reverse();
      renderAppCols("periodApps", totalSecs > 0 ? listRows : [], template, appLvl);
      if (totalSecs > 0)
        periodTabChart = hoursLineChart("periodBotCanvas",
          { labels: axis, tips, secs, name: catDisplay, color: COLORS[appLvl],
            pointR: axis.length > 40 ? 1 : 2 });
      return;
    }
    if (catKey) {
      renderBarList("periodApps", appMeta(appEntries));
      if (!p.h24) periodTabChart = botGraph("apps");
      return;
    }
    // categories: exact totals from the RAW category sums, merged by display
    // name (dictionary.json); tooltip apps from each app's dominant category
    const catAgg = new Map();
    for (const [raw, e] of cur.rawCats) {
      const name = catName(raw), k = name.toLowerCase();
      const c = catAgg.get(k) ?? { name, sec: 0, top: 0, prod: e.prod };
      c.sec += e.sec;
      if (e.sec > c.top) { c.top = e.sec; c.prod = e.prod; }
      catAgg.set(k, c);
    }
    const prevCatAgg = new Map();
    for (const [raw, e] of prev.rawCats) {
      const k = catName(raw).toLowerCase();
      prevCatAgg.set(k, (prevCatAgg.get(k) ?? 0) + e.sec);
    }
    const appsByCat = new Map();
    for (const e of agg.values()) {
      const k = catName(e.cat).toLowerCase();
      (appsByCat.get(k) ?? appsByCat.set(k, []).get(k)).push([e.name, e.sec]);
    }
    const catEntries = [...catAgg.values()]
      .filter(c => c.sec >= MIN_LOGGED_SEC)
      .sort((a, b) => b.sec - a.sec)
      .map(c => {
        const prevSec = prevCatAgg.get(c.name.toLowerCase());
        const pct = p.noPrev ? sharePctOf(c.sec)
          : prevSec > 0 ? Math.round(100 * c.sec / prevSec) + "%" : "No Trend";
        const tops = (appsByCat.get(c.name.toLowerCase()) ?? [])
          .sort((x, y) => y[1] - x[1]).slice(0, 5)
          .map(([n, s]) => `   ${hrs(s)}h  ${n}`).join("\n");
        return [c.name, c.sec, c.prod,
          `${NAMES[c.prod]}, ${hrs(c.sec)}h` +
          (p.noPrev ? `\n${pct} Of All Your Logged Time`
            : prevSec > 0 ? `\n${pct} Of ${p.prevLabel} (${hrs(prevSec)}h)`
                          : `\nNothing Logged In ${p.prevLabel} (No Trend)`) +
          (tops ? "\n" + tops : ""), pct];
      });
    // types: one bar per productivity level (Work .. Distracting) in the level's own colour, sorted by hours like the lists
    const typeEntries = LEVELS
      .map(l => {
        const sec = curA.lv[l], prevSec = prevA.lv[l];
        const pct = p.noPrev ? sharePctOf(sec)
          : prevSec > 0 ? Math.round(100 * sec / prevSec) + "%" : "No Trend";
        const tops = [...(curA.apps[l] ?? [])].sort((x, y) => y[1] - x[1]).slice(0, 5)
          .map(([n, s]) => `   ${hrs(s)}h  ${n}`).join("\n");
        return [NAMES[l], sec, l,
          `${hrs(sec)}h ${NAMES[l]}` +
          (p.noPrev ? `\n${pct} Of All Your Logged Time`
            : prevSec > 0 ? `\n${pct} Of ${p.prevLabel} (${hrs(prevSec)}h)`
                          : `\nNothing Logged In ${p.prevLabel} (No Trend)`) +
          (tops ? "\n" + tops : ""), pct,
          { kind: "lvl", key: l, period: p.label }];
      })
      .sort((a, b) => b[1] - a[1]);
    // the Types tab appends a COMBINED section under the five level bars:
    // Productive (VP+P) vs Distracting (Neutral+D+VD), drawn as STACKED
    // segment bars — the same combined colouring as the summary rows and
    // the pulse card's delta bars
    const renderTypesTab = () => {
      renderBarList("periodApps", typeEntries);
      const combos = [
        ["Productive",  ["2", "1"],        "Work + Productive"],
        ["Distracting", ["0", "-1", "-2"], "Neutral + Personal + Distracting"],
      ];
      const sum = (A, ls) => ls.reduce((s, l) => s + A.lv[l], 0);
      const maxC = Math.max(1, ...combos.map(([, ls]) => sum(curA, ls)));
      const html = combos.map(([label, ls, names]) => {
        const sec = sum(curA, ls), prevSec = sum(prevA, ls);
        const pct = p.noPrev ? (sharePctOf(sec) ?? "")
          : prevSec > 0 ? Math.round(100 * sec / prevSec) + "%" : "No Trend";
        const segs = ls.map(l =>
          `<div class="seg" style="flex:${curA.lv[l]} 1 0;background:${COLORS[l]}"></div>`).join("");
        const m = new Map();
        for (const l of ls)
          for (const [n, s] of curA.apps[l] ?? []) m.set(n, (m.get(n) ?? 0) + s);
        const tops = [...m].sort((x, y) => y[1] - x[1]).slice(0, 5)
          .map(([n, s]) => `   ${hrs(s)}h  ${n}`).join("\n");
        return `<div class="cat-row"
            data-tip-title="${esc(`${label}: ${hrs(sec)}h`)}"
            data-tip-body="${esc(names + "\n" +
              (p.noPrev ? `${pct || "–"} Of All Your Logged Time`
                : prevSec > 0 ? `${pct} Of ${p.prevLabel} (${hrs(prevSec)}h)`
                              : `Nothing Logged In ${p.prevLabel} (No Trend)`) +
              (tops ? "\n" + tops : ""))}">
            <div class="cat-bar stackbar" style="width:${(100 * sec / maxC).toFixed(1)}%">${segs}</div>
            ${pct ? `<div class="cat-label pct"><span class="cat-time">${pct}</span></div>` : ""}
            <div class="cat-label"><span class="cat-time">${hrs(sec)}h</span><span class="cat-name">${esc(label)}</span></div>
          </div>`;
      }).join("");
      // the Combined block is ANCHORED to the card's bottom (margin-top:auto
      // in the flexed list — see .bar-list.types-flex); with the level bars
      // on top the empty middle stays clean
      const host = document.getElementById("periodApps");
      host.classList.add("types-flex");
      // a TYPES graph (each level's share over the period) sits between the
      // bars and the bottom-anchored Combined block — not on 24h cards
      if (!p.h24) host.insertAdjacentHTML("beforeend",
        `<div class="types-graph"><canvas id="periodTrendCanvas"></canvas></div>`);
      host.insertAdjacentHTML("beforeend",
        `<div class="types-combined"><div class="app-sec">Combined</div>${html}</div>`);
      if (!p.h24) periodTabChart = periodGraph("periodTrendCanvas", "types");
    };
    // ---- AVERAGES tab (v81, Total page only): mean logged hours per
    // calendar month (across every year), per weekday, per time of day
    // (Night/Morning/Afternoon/Evening — from the archive's per-day
    // day_parts, filled by the v81 fetch script), plus each category's and
    // type's average per day-with-data. ----
    let avgCache = null;
    const avgMaps = () => avgCache ??= (() => {
      const monTot = new Map(), ymSeen = new Set();
      const wdTot = Array(7).fill(0), wdCnt = Array(7).fill(0);
      const catTot = new Map(), lvTot = emptyLevels();
      let active = 0;
      for (const [d, dayRows] of Object.entries(arch?.days ?? {})) {
        let dTot = 0;
        for (const [sec, , cat, prod] of dayRows) {
          dTot += sec;
          const cn = catName(cat), k = cn.toLowerCase();
          const c = catTot.get(k) ?? { name: cn, sec: 0, top: 0, prod: String(prod) };
          c.sec += sec;
          if (sec > c.top) { c.top = sec; c.prod = String(prod); }
          catTot.set(k, c);
          if (LEVELS.includes(String(prod))) lvTot[String(prod)] += sec;
        }
        if (!dTot) continue;
        active++;
        const m = +d.slice(5, 7);
        monTot.set(m, (monTot.get(m) ?? 0) + dTot);
        ymSeen.add(d.slice(0, 7));
        const wd = new Date(d + "T00:00:00").getDay();
        wdTot[wd] += dTot; wdCnt[wd]++;
      }
      const ymCnt = new Map();   // month-of-year -> how many YYYY-MM instances
      for (const ym of ymSeen) {
        const m = +ym.slice(5, 7);
        ymCnt.set(m, (ymCnt.get(m) ?? 0) + 1);
      }
      const parts = [0, 0, 0, 0];   // night, morning, afternoon, evening
      let partDays = 0;
      for (const arr of Object.values(arch?.day_parts ?? {})) {
        if (!Array.isArray(arr) || !arr.some(s => s)) continue;
        partDays++;
        arr.forEach((s, i) => parts[i] += s || 0);
      }
      return { monTot, ymCnt, wdTot, wdCnt, catTot, lvTot, active, parts, partDays };
    })();
    const renderAveragesTab = () => {
      const A = avgMaps();
      const host = document.getElementById("periodApps");
      if (!A.active) {
        host.innerHTML = '<div style="color:var(--text-dim);font-size:0.8rem">No Data</div>';
        return;
      }
      const secHtml = (title, id) =>
        `<div class="app-sec">${title}</div><div class="avg-list" id="${id}"></div>`;
      host.innerHTML =
        secHtml("Average Logged Hours Per Month", "avgMonths") +
        secHtml("Average Logged Hours Per Weekday", "avgDays") +
        secHtml("Average Logged Hours Per Time Of Day", "avgParts") +
        secHtml("Average Hours Per Day — Categories", "avgCats") +
        secHtml("Average Hours Per Day — Types", "avgTypes");
      const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
      // calendar months Jan..Dec: mean of that month's TOTALS across years
      const monRows = [];
      for (let m = 1; m <= 12; m++) {
        const n = A.ymCnt.get(m);
        if (!n) continue;
        const name = cap(new Date(2000, m - 1, 1)
          .toLocaleDateString(undefined, { month: "long" }));
        monRows.push([name, A.monTot.get(m) / n, "0",
          `Average Of ${n} ${name}${n > 1 ? "s" : ""} With Data\n` +
          `${hrs(A.monTot.get(m))}h Total`]);
      }
      renderBarList("avgMonths", monRows);
      // weekdays Monday..Sunday: mean per day WITH data
      const wdRows = [];
      for (const wd of [1, 2, 3, 4, 5, 6, 0]) {
        if (!A.wdCnt[wd]) continue;
        const name = cap(new Date(2001, 0, wd === 0 ? 7 : wd)   // 2001-01-01 = Monday
          .toLocaleDateString(undefined, { weekday: "long" }));
        wdRows.push([name, A.wdTot[wd] / A.wdCnt[wd], "0",
          `Across ${A.wdCnt[wd]} ${name}s With Data\n${hrs(A.wdTot[wd])}h Total`]);
      }
      renderBarList("avgDays", wdRows);
      // time of day, from the archive's hourly-derived day_parts
      if (A.partDays) {
        const PARTS = [["Night", "0:00 – 6:00"], ["Morning", "6:00 – 12:00"],
                       ["Afternoon", "12:00 – 18:00"], ["Evening", "18:00 – 24:00"]];
        renderBarList("avgParts", PARTS.map(([nm, span], i) =>
          [nm, A.parts[i] / A.partDays, "0",
           `${span}\nAverage Across ${A.partDays} Days With Hourly Data\n` +
           `${hrs(A.parts[i])}h Total`]));
      } else {
        document.getElementById("avgParts").innerHTML =
          `<div style="color:var(--text-dim);font-size:0.8rem">No Hourly History Yet — ` +
          `Rebuild The Archive With The Updated Fetch Script To Fill ` +
          `Night / Morning / Afternoon / Evening</div>`;
      }
      // every category's and type's average per day-with-data; rows open
      // that entity's own Total page
      renderBarList("avgCats", [...A.catTot.values()]
        .filter(c => c.sec >= MIN_LOGGED_SEC)
        .sort((a, b) => b.sec - a.sec)
        .map(c => [c.name, c.sec / A.active, c.prod,
          `${hrs(c.sec)}h Total Across ${A.active} Days With Data`,
          undefined, { kind: "cat", key: c.name, period: "Total" }]));
      renderBarList("avgTypes", LEVELS
        .map(l => [NAMES[l], A.lvTot[l] / A.active, l,
          `${hrs(A.lvTot[l])}h Total Across ${A.active} Days With Data`,
          undefined, { kind: "lvl", key: l, period: "Total" }])
        .sort((a, b) => b[1] - a[1]));
    };
    // ---- graphs for THIS period: x = the DAYS of the period (or its
    // MONTHS when the period spans more than ~2 months, e.g. year cards).
    // Used by the Pulse tab (pulse + type shares), the Trends tab (top-10
    // categories of the period) and the Types tab's embedded graph. ----
    let pkmCache = null;
    const periodKeysMaps = () => pkmCache ??= (() => {
      const span = (new Date(p.range[1] + "T00:00:00")
                  - new Date(p.range[0] + "T00:00:00")) / 864e5;
      // v81: half-year buckets beyond ~3 years (the Total pages' x-axis)
      const half = span > 1100, monthly = !half && span > 62;
      const lvM = new Map(), catM = new Map(), totM = new Map();
      for (const d = new Date(p.range[0] + "T00:00:00"); ; d.setDate(d.getDate() + 1)) {
        const iso = isoOf(d.getTime());
        if (iso > p.range[1]) break;
        const key = half ? iso.slice(0, 4) + (iso.slice(5, 7) < "07" ? "-01" : "-07")
          : monthly ? iso.slice(0, 7) : iso;
        const l2 = lvM.get(key) ?? lvM.set(key, emptyLevels()).get(key);
        const cm = catM.get(key) ?? catM.set(key, new Map()).get(key);
        for (const [sec, , cat, prod] of rowsOf(iso)) {
          if (LEVELS.includes(String(prod))) l2[String(prod)] += sec;
          const n = catName(cat);
          cm.set(n, (cm.get(n) ?? 0) + sec);
          totM.set(n, (totM.get(n) ?? 0) + sec);
        }
      }
      const keys = [...lvM.keys()];
      const labels = [], tips = [];
      const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
      keys.forEach((k, i) => {
        if (half) {
          const d = new Date(k + "-01T00:00:00");
          const h = d.getMonth() < 6 ? 1 : 2;
          labels.push(`H${h} ${String(d.getFullYear()).slice(2)}`);
          tips.push(`H${h} ${d.getFullYear()} (${h === 1 ? "January – June" : "July – December"})`);
        } else if (monthly) {
          const d = new Date(k + "-01T00:00:00");
          const short = cap(d.toLocaleDateString(undefined, { month: "short" }));
          labels.push((i === 0 || d.getMonth() === 0)
            ? `${short} ${String(d.getFullYear()).slice(2)}` : short);
          tips.push(`${cap(d.toLocaleDateString(undefined, { month: "long" }))} ${d.getFullYear()}`);
        } else {
          const d = new Date(k + "T00:00:00");
          labels.push(String(d.getDate()));   // integer day, no ".month" decimal
          tips.push(d.toLocaleDateString(undefined,
            { weekday: "short", day: "numeric", month: "short", year: "numeric" }));
        }
      });
      const topCats = [...totM.entries()].sort((a, b) => b[1] - a[1])
        .slice(0, 10).map(([n]) => n);
      return { keys, labels, tips, lvM, catM, topCats };
    })();
    const periodGraph = (canvasId, what) => {
      const K = periodKeysMaps();
      return trendChartCore(canvasId, { keys: K.keys, labels: K.labels,
        tips: K.tips, lvMap: K.lvM, catMap: K.catM, topCats: K.topCats,
        what, pointR: 2 });
    };
    const renderPeriodGraphTab = what => {
      const host = document.getElementById("periodApps");
      host.innerHTML = `<div class="ptab-chart"><canvas id="periodTrendCanvas"></canvas></div>`;
      periodTabChart = periodGraph("periodTrendCanvas", what);
    };
    // the Apps and Categories tabs carry the bottom graph (v77); the other
    // tabs hide it again — its canvas persists, only the chart is rebuilt
    const showBot = what => {
      const bot = document.getElementById("periodBot");
      if (!bot) return;
      bot.hidden = false;
      periodTabChart = botGraph(what);
    };
    const TABS = { apps: () => { renderBarList("periodApps", appMeta(appEntries));
                                 showBot("apps"); },
                   cats: () => { renderBarList("periodApps", catMeta(catEntries));
                                 showBot("cats"); },
                   types: renderTypesTab,
                   pulse: () => renderPeriodGraphTab("pulse"),
                   trends: () => renderPeriodGraphTab("cats"),
                   averages: renderAveragesTab };
    const tabRow = document.getElementById("periodTabs");
    tabRow.addEventListener("click", e => {
      const t = e.target.closest(".tab");
      if (!t) return;
      e.stopPropagation();   // a tab click must NOT close the card
      tabRow.querySelectorAll(".tab").forEach(x =>
        x.classList.toggle("active", x === t));
      periodTabChart?.destroy(); periodTabChart = null;
      const bot = document.getElementById("periodBot");
      if (bot) bot.hidden = true;
      document.getElementById("periodApps").classList.remove("types-flex");
      TABS[t.dataset.tab]();
      document.getElementById("periodApps").scrollTop = 0;
    });
    TABS.apps();
  }

  // ---- shared trend-chart machinery: the Trends card, the period cards'
  //      Weekly tabs and the 14-days card's click-cycle all build their
  //      graphs from here. Periods: w = past 4 weeks in 48-hour (2-day)
  //      steps (14 buckets), m = past 12 calendar months, y = every year
  //      from the first logged one to now — the axes
  //      are FIXED; periods below the 0.5 h floor become gaps in the lines.
  //      Pulse charts: Pulse (real 0-100) + Productive/Neutral/Distracting

              const m = (T.appLv?.[per]?.get(keys[c.dataIndex]) ?? {})[order[c.datasetIndex]];

              return [...m].sort((a, b) => b[1] - a[1]).slice(0, 5)
                .map(([n, s]) => `   ${hrs(s)}h  ${n}`).join("\n");
            } } } },
        scales: {
          x: { stacked: true, grid: { display: false },
               ticks: { color: "#909090", maxRotation: 0, autoSkip: false,
                        font: { size: tickPx },
                        callback: (v, i) => [totals[i], ""] } },
          y: { stacked: true, position: "right", min: -yMax, max: yMax,
               afterFit: s => { s.width = Math.max(s.width, Math.ceil(tickPx * 2.6) + 6); },
               grid: { color: ctx => ctx.tick.value === 0 ? "#5a5a5a" : "#333333",
                       lineWidth: ctx => ctx.tick.value === 0 ? 2 : 1 },
               ticks: { color: "#909090", font: { size: tickPx },
                        callback: v => Math.round(Math.abs(v)) + "h" } },
        } },
    });
  }

  // builds ONE trend chart onto canvasId and returns the Chart.
  // kind = "<w|m|y>-<pulse|cats>", e.g. "w-cats" = weekly top categories.
  async function buildTrendChart(canvasId, kind, opts = {}) {
    const T = await trendData(opts.offsets);
    const [per, what] = kind.split("-");
    const keys = T.keys[per];
    const labels = [], tips = [];
    keys.forEach((k, i) => {
      const { lbl, tip } = trendKeyLabel(per, k, i === 0);
      labels.push(lbl); tips.push(tip);
    });
    return trendChartCore(canvasId, {
      keys, labels, tips, lvMap: T.lv[per],
      catMap: what === "apps" ? T.app[per] : T.cat[per],
      topCats: what === "apps" ? T.topApps : T.topCats,
      what, pointR: 3, ...opts });
  }

  // ---- the TRENDS detail card: grouped tabs (Weekly / Monthly / Yearly,
  //      each with a Pulse and a Categories tab) picking ONE graph that
  //      fills the whole card ----
  // a placeholder full-page detail card with just a title (no period switcher,
  // no charts) — the Highlights / Offline Activities pages the pulse card's
  // top-left icons open. Content lands in a later pass.
  function showBlankDetail(title) {
    destroyDetailCharts();
    setSwitch(null);
    detailCtx = null;
    document.getElementById("appDetailTitle").classList.remove("tc");
    document.getElementById("appDetailTitle").textContent = title;
    document.getElementById("appDetailFresh").textContent = "";
    document.getElementById("appDetailRows").innerHTML = "";
    detailCard.hidden = false;
    sizeDetailCard();
    detailRefit = null;
  }

  // ---- EMPTY-TIMESLOT NUDGE: colour the front-page "+" (#iconOffline) red
  //      whenever any PAST hour in the 7-day calendar has nothing in it -
  //      neither RescueTime-logged time NOR a manual/offline entry. The red
  //      clears once every gap is filled. Mirrors renderTimeline()'s coverage
  //      maths exactly (same 7-day window, same hour bucketing) so the icon and
  //      the calendar always agree. Reads the offline entries straight from
  //      localStorage so it works on first paint, before the Manual Activities
  //      page (which owns `offlineEntries`) has ever been opened. ----
  function countEmptyTimeslots() {
    const HOUR = 36e5, DAY_HOURS = 24 * 7;
    const topH = new Date(Date.now()); topH.setMinutes(0, 0, 0, 0);
    const top = topH.getTime();
    const idxOf = ms => Math.round((top - ms) / HOUR);
    const covered = new Array(DAY_HOURS).fill(0);   // seconds in each hour bucket
    // RescueTime-logged time (hourly rows the fetcher pulls for the last ~7 days)
    for (const row of (data.hour_activities ?? [])) {
      const d = new Date(row[0]); d.setMinutes(0, 0, 0, 0);
      const i = idxOf(d.getTime());
      if (i >= 0 && i < DAY_HOURS) covered[i] += row[1];
    }
    // manual/offline entries (each spread across every hour it covers)
    let entries = [];
    try { const s = JSON.parse(localStorage.getItem("rtOfflineEntries")); if (Array.isArray(s)) entries = s; } catch {}
    for (const e of entries) {
      let s = e.startMs; const end = e.startMs + e.durMin * 60000;
      while (s < end) {
        const hs = new Date(s); hs.setMinutes(0, 0, 0, 0);
        const hStart = hs.getTime(), segEnd = Math.min(end, hStart + HOUR);
        const i = idxOf(hStart);
        if (i >= 0 && i < DAY_HOURS) covered[i] += (segEnd - s) / 1000;
        s = segEnd;
      }
    }
    // count empty PAST hours only: skip index 0 (the current, still-in-progress
    // hour) and never look at the future (the window ends at `now`).
    let empty = 0;
    for (let i = 1; i < DAY_HOURS; i++) if (covered[i] <= 0) empty++;
    return empty;
  }
  // toggle the red state + a helpful tooltip count on the front-page "+"
  function refreshOfflineIcon() {
    const btn = document.getElementById("iconOffline");
    if (!btn) return;
    const empty = countEmptyTimeslots();
    btn.classList.toggle("needs-fill", empty > 0);
    btn.title = empty > 0
      ? `Manual Activities - ${empty} empty hour${empty === 1 ? "" : "s"} in the last 7 days`
      : "Manual Activities";
  }

  // ---- OFFLINE ACTIVITIES page: LEFT = add-activity form (record offline time
  //      and queue it for RescueTime), RIGHT = an hourly calendar of the past
  //      24 hours. Opened by the pulse card's power icon. ----
  let offlineEntries = [];      // offline activities (persisted to localStorage)
  const OFF_LS = { entries: "rtOfflineEntries", acts: "rtOfflineActs", key: "rtOfflineKey", list: "rtOfflineActList" };
  // IN-MEMORY draft of the Add-Activity form (selected activity, details text,
  // from/until, drag range, chosen day, custom name). It survives CLOSING and
  // reopening the Manual Activities page, but NOT a full page/tab reload — so
  // the form is only reset to defaults after a successful Add or when the tab
  // is closed. Deliberately NOT in localStorage.
  let offDraft = {};
  function showOfflineDetail() {
    destroyDetailCharts();
    setSwitch(null);
    detailCtx = null;
    const titleEl = document.getElementById("appDetailTitle");
    titleEl.textContent = "Manual Activities";
    titleEl.classList.add("tc");   // title-case, not the usual all-caps card title
    document.getElementById("appDetailFresh").textContent =
      data.generated_at ? `Data Up To ${new Date(data.generated_at).toLocaleString()}` : "";
    const host = document.getElementById("appDetailRows");
    const pad = n => String(n).padStart(2, "0");
    const HOUR = 36e5, WEEK = 6048e5;
    const MAX_BLOCK_MIN = 240;   // RescueTime caps one offline_time_post at 4 hours
    const fmtHour = ms => { const d = new Date(ms); let h = d.getHours();
      const ap = h < 12 ? "AM" : "PM"; return `${h % 12 || 12} ${ap}`; };
    const fmtClock = ms => { const d = new Date(ms); const ap = d.getHours() < 12 ? "AM" : "PM";
      return `${d.getHours() % 12 || 12}:${pad(d.getMinutes())} ${ap}`; };
    const rtStamp = ms => { const d = new Date(ms);
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:00`; };

    // ---- PERSISTENCE: offline entries, the custom activity list and the
    // optional RescueTime API key all live in THIS browser's localStorage, so
    // they survive a refresh. The key is never committed to the repo.
    const lsGet = k => { try { return localStorage.getItem(k); } catch { return null; } };
    const lsSet = (k, v) => { try { localStorage.setItem(k, v); } catch {} };
    try { const s = JSON.parse(lsGet(OFF_LS.entries)); if (Array.isArray(s)) offlineEntries = s; } catch {}
    // the STANDARD activity buttons come from CODE (so edits here update the page
    // instantly); only the user's own "+ Custom Activity" names persist in
    // localStorage. Each name is what's posted as the RescueTime activity_name.
    const DEFAULT_ACTS = ["Sleep", "Chores", "Eat", "Socializing", "Personal", "Exercise"];
    // the WHOLE activity list is user-editable (add/delete ANY name, incl.
    // defaults) and persisted; first run seeds it from DEFAULT_ACTS (+ any
    // customs an older version saved)
    let acts;
    try { const full = JSON.parse(lsGet(OFF_LS.list)); if (Array.isArray(full)) acts = full; } catch {}
    if (!acts) {
      let old = []; try { const o = JSON.parse(lsGet(OFF_LS.acts)); if (Array.isArray(o)) old = o; } catch {}
      acts = [...DEFAULT_ACTS, ...old.filter(a => !DEFAULT_ACTS.includes(a))];
    }
    let apiKey = lsGet(OFF_LS.key) || "";
    const persist = () => { lsSet(OFF_LS.entries, JSON.stringify(offlineEntries)); lsSet(OFF_LS.list, JSON.stringify(acts)); };

    // seed the form from the in-memory draft (kept across close/reopen); fall
    // back to defaults on first open / after a reset
    let selAct = (offDraft.selAct && acts.includes(offDraft.selAct)) ? offDraft.selAct : (acts[0] ?? "");
    let customMode = offDraft.customMode ?? false, customName = offDraft.customName ?? "";   // "Custom" button = one-off name (NOT saved)
    let detailsText = offDraft.detailsText ?? "";   // survives form re-renders AND page close/reopen
    let wkOffset = offDraft.wkOffset ?? 0;                       // 0 = current week
    let selDay = offDraft.selDay ?? new Date(now).getTime();     // midnight of the selected day (today)
    let selFrom = offDraft.selFrom ?? null, selUntil = offDraft.selUntil ?? null;    // "HH:MM" once picked (drag/click/edit)
    let dragStartMs = offDraft.dragStartMs ?? null, dragEndMs = offDraft.dragEndMs ?? null;   // absolute drag range (may cross days)
    // snapshot the current form state into the draft so it is remembered when
    // the page is closed and reopened; called after every form change
    const saveDraft = () => {
      offDraft = { selAct, customMode, customName, detailsText, wkOffset, selDay, selFrom, selUntil, dragStartMs, dragEndMs };
    };
    const COG_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>`;

    host.innerHTML = `
      <div class="offline-grid">
        <div class="offline-form" id="offForm"></div>
        <div class="offline-day" id="offDay"></div>
      </div>`;
    const formEl = document.getElementById("offForm");
    const dayEl = document.getElementById("offDay");
    // the detail card closes on ANY inside click. The RIGHT calendar column never
    // closes (bars OR the background between them). On the LEFT column only the
    // interactive controls swallow the click, so clicking EMPTY form space still
    // closes the page (user request).
    dayEl.addEventListener("click", e => e.stopPropagation());
    formEl.addEventListener("click", e => {
      // only real controls swallow the click; labels, hints, the Added-Activities
      // list and blank gaps all bubble → clicking empty left space still closes
      if (e.target.closest("input, button, a, select, textarea")) e.stopPropagation();
    });

    // RIGHT: hourly calendar going back 7 DAYS — the MOST RECENT hour on top,
    // the oldest at the bottom. Fills the card height and scrolls for the rest.
    // Each hour is a track: logged part coloured by productivity, blank part
    // darkens on hover.
    const DAY_HOURS = 24 * 7;   // 7 days of hourly rows, scrollable
    function renderTimeline() {
      const topH = new Date(nowMs); topH.setMinutes(0, 0, 0, 0);
      const slots = [];               // index 0 = current hour (top), older downward
      for (let i = 0; i < DAY_HOURS; i++)
        slots.push({ start: topH.getTime() - i * HOUR, lv: emptyLevels(), off: 0, labels: [], apps: new Map() });
      const idxOf = ms => Math.round((topH.getTime() - ms) / HOUR);
      for (const [t, sec, , activity, , prod] of (data.hour_activities ?? [])) {
        const d = new Date(t); d.setMinutes(0, 0, 0, 0);
        const i = idxOf(d.getTime());
        if (i < 0 || i >= DAY_HOURS) continue;
        const l = String(prod);
        if (l in slots[i].lv) slots[i].lv[l] += sec;
        const an = appName(activity);   // for the hover tooltip's top-apps list
        const ae = slots[i].apps.get(an) ?? { sec: 0, prod, maxSec: 0 };
        ae.sec += sec;
        if (sec >= ae.maxSec) { ae.maxSec = sec; ae.prod = prod; }   // keep the dominant type
        slots[i].apps.set(an, ae);
      }
      for (const e of offlineEntries) {
        // spread the entry across EVERY hour it covers (so a multi-hour block
        // fills those rows), not just its start hour
        let s = e.startMs; const end = e.startMs + e.durMin * 60000; let first = true;
        while (s < end) {
          const hs = new Date(s); hs.setMinutes(0, 0, 0, 0);
          const hStart = hs.getTime(), segEnd = Math.min(end, hStart + HOUR);
          const i = idxOf(hStart);
          if (i >= 0 && i < DAY_HOURS) {
            slots[i].off += (segEnd - s) / 1000;
            if (first) slots[i].labels.push(`${e.activity} ${e.durMin}m`);
          }
          s = segEnd; first = false;
        }
      }
      const w = sec => (100 * sec / 3600).toFixed(2);
      // a date divider whenever the day changes going down the list
      let lastDay = null;
      dayEl.innerHTML = slots.map(s => {
        const dd = new Date(s.start); dd.setHours(0, 0, 0, 0);
        let divider = "";
        if (dd.getTime() !== lastDay) {
          lastDay = dd.getTime();
          const lbl = dd.getTime() === new Date(now).getTime() ? "Today"
            : new Date(s.start).toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
          divider = `<div class="oh-day" data-day="${dd.getTime()}">${lbl}</div>`;
        }
        const segs = LEVELS.map(l => s.lv[l] > 0
            ? `<div class="oh-seg" style="width:${w(s.lv[l])}%;background:${COLORS[l]}"></div>` : "").join("")
          + (s.off > 0 ? `<div class="oh-seg oh-off" style="width:${w(s.off)}%"></div>` : "");
        const tot = LEVELS.reduce((a, l) => a + s.lv[l], 0) + s.off;
        // rich hover tooltip: total on top, per-type breakdown, then the top-5
        // apps stacked. Hours under 0.1h show only the total (no types/apps).
        let tipTitle = tot > 0 ? `${hrs(tot)}h total Time` : "No time logged";
        let tipBody = "";
        if (tot >= 360) {   // 0.1h = 360s
          const typeStr = LEVELS.filter(l => s.lv[l] > 0)
            .map(l => `${hrs(s.lv[l])}h ${NAMES[l]}`).join(", ");
          // app rows: "<hours> <name>" on the left, the app's TYPE on the right
          // (tab-separated; the tooltip renderer splits it into a two-side row)
          const appStr = [...s.apps].sort((a, b) => b[1].sec - a[1].sec)
            .filter(([, e]) => hrs(e.sec) > 0).slice(0, 5)   // drop apps that round to 0h
            .map(([n, e]) => `${hrs(e.sec)}h ${n}\t${NAMES[String(e.prod)] ?? ""}`).join("\n");
          tipBody = [typeStr, appStr].filter(Boolean).join("\n");
        }
        const tipAttrs = `data-tip-title="${esc(tipTitle)}"` + (tipBody ? ` data-tip-body="${esc(tipBody)}"` : "");
        return divider + `<div class="oh-row"><div class="oh-time">${fmtHour(s.start)}</div>` +
          `<div class="oh-track" data-start="${s.start}" ${tipAttrs}>${segs}</div></div>`;
      }).join("");
      // click / drag selection is wired once on dayEl (delegated) below
      refreshOfflineIcon();   // filling gaps here may clear the red front-page "+"
    }

    // scroll the calendar so the given day's rows are in view
    function scrollToDay(dayMs) {
      const t = dayEl.querySelector(`.oh-day[data-day="${dayMs}"]`);
      if (t) dayEl.scrollTop = Math.max(0, t.offsetTop - 4);
    }

    // recent offline activities, newest first, under the Add button — grows to
    // fill the left column downward (scrolls past that)
    function renderRecent() {
      const el = document.getElementById("offRecent");
      if (!el) return;
      if (!offlineEntries.length) {
        el.innerHTML = `<div class="off-recent-empty">No offline activities added yet.</div>`;
        return;
      }
      // group entries added together (same gid) so an activity that was
      // auto-split into ≤4h blocks shows as ONE row (time range + block count).
      // Legacy entries with no gid each stand alone.
      const groups = [];
      for (const e of offlineEntries) {
        const last = groups[groups.length - 1];
        if (last && e.gid != null && last.gid === e.gid) last.items.push(e);
        else groups.push({ gid: e.gid, items: [e] });
      }
      el.innerHTML = [...groups].reverse().map(g => {
        const items = g.items;
        const act = items[0].activity || "", det = items[0].details || "";
        const start = Math.min(...items.map(i => i.startMs));
        const end = Math.max(...items.map(i => i.startMs + i.durMin * 60000));
        const n = items.length;
        const when = new Date(start).toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
        // middle: the time range + (only when it was split) the block count
        const range = `${fmtClock(start)} – ${fmtClock(end)}` + (n > 1 ? ` · ${n}×` : "");
        return `<div class="off-rec-row">
            <div class="off-rec-top">
              <span class="off-rec-name">${act.replace(/</g, "&lt;")}</span>
              <span class="off-rec-mid">${range}</span>
              <span class="off-rec-date">${when}</span>
            </div>
            ${det ? `<span class="off-rec-det">${det.replace(/</g, "&lt;")}</span>` : ""}
          </div>`;
      }).join("");
    }

    // LEFT: the add-activity form (week/day picker, from/until, activity chips,
    // + new activity, details, Add Activity)
    function renderForm() {
      const ws = weekStart(new Date(now.getTime() + wkOffset * WEEK));   // Monday of the shown week
      const days = [];
      for (let i = 0; i < 7; i++) { const d = new Date(ws); d.setDate(ws.getDate() + i); d.setHours(0, 0, 0, 0); days.push(d); }
      const WD = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
      const todayMid = new Date(now).getTime();
      const now2 = new Date(nowMs);
      // which day(s) are "selected" — a cross-day drag highlights EVERY day it
      // spans, so both days get the dark active background
      const selDaysSet = new Set([selDay]);
      if (dragStartMs != null && dragEndMs != null && dragEndMs > dragStartMs) {
        selDaysSet.clear();
        const last = new Date(dragEndMs - 1); last.setHours(0, 0, 0, 0);
        for (let d = new Date(dragStartMs); (d.setHours(0, 0, 0, 0), d.getTime()) <= last.getTime(); d.setDate(d.getDate() + 1))
          selDaysSet.add(d.getTime());
      }
      const dayCells = days.map(d => {
        const future = d.getTime() > todayMid, sel = selDaysSet.has(d.getTime());
        return `<button type="button" class="pswitch-btn off-day${sel ? " active" : ""}" data-day="${d.getTime()}"${future ? " disabled" : ""}>${d.getDate()}</button>`;
      }).join("");
      const wdHead = WD.map(w => `<div class="off-wd">${w}</div>`).join("");
      const actBtns = acts.map(a =>
        `<button type="button" class="pswitch-btn off-act${!customMode && a === selAct ? " active" : ""}" data-act="${a.replace(/"/g, "&quot;")}">${a}</button>`).join("")
        + `<button type="button" class="pswitch-btn off-act off-custombtn${customMode ? " active" : ""}" id="offCustomBtn">Custom</button>`;
      const detLen = detailsText.length;
      formEl.innerHTML = `
        <div class="off-head">Add Activity</div>
        <div class="off-week">
          <button type="button" class="off-wk-nav" data-wk="-1">‹</button>
          <div class="off-cal">
            <div class="off-wd-row">${wdHead}</div>
            <div class="off-day-row">${dayCells}</div>
          </div>
          <button type="button" class="off-wk-nav" data-wk="1"${wkOffset >= 0 ? " disabled" : ""}>›</button>
        </div>
        <div class="off-time-row">
          <span class="off-tlabel">From</span>
          <input type="time" id="offFrom" class="off-time" value="${selFrom ?? `${pad(now2.getHours())}:00`}">
          <span class="off-tlabel">Until</span>
          <input type="time" id="offUntil" class="off-time" value="${selUntil ?? `${pad((now2.getHours() + 1) % 24)}:00`}">
        </div>
        <div class="off-acts">${actBtns}</div>
        ${customMode ? `<input type="text" id="offCustomName" class="off-custom-input" maxlength="40" placeholder="Custom activity name (for this entry)" value="${esc(customName)}">` : ""}
        <div class="off-details-wrap">
          <span class="off-count" id="offCount">${40 - detLen}</span>
          <input type="text" id="offDetails" class="off-details" maxlength="40" placeholder="Add details about your time" value="${esc(detailsText)}">
        </div>
        <div class="off-add-row">
          <button type="button" class="off-cog" id="offCog" title="Settings" aria-label="Settings">${COG_SVG}</button>
          <button type="button" class="pswitch-btn off-add active" id="offAdd">Add Activity</button>
        </div>
        <div class="off-status" id="offStatus"></div>
        <div class="off-head off-recent-head-top">Added Activities</div>
        <div class="off-recent" id="offRecent"></div>`;
      formEl.querySelectorAll(".off-day").forEach(b =>
        b.addEventListener("click", () => { selDay = +b.dataset.day; dragStartMs = dragEndMs = null; renderForm(); scrollToDay(selDay); }));
      // manual time edits cancel any drag range (they define a single-day block)
      document.getElementById("offFrom").addEventListener("change", e => { selFrom = e.target.value; dragStartMs = dragEndMs = null; saveDraft(); });
      document.getElementById("offUntil").addEventListener("change", e => { selUntil = e.target.value; dragStartMs = dragEndMs = null; saveDraft(); });
      formEl.querySelectorAll(".off-wk-nav").forEach(b =>
        b.addEventListener("click", () => { if (b.disabled) return; wkOffset = Math.min(0, wkOffset + (+b.dataset.wk)); renderForm(); }));
      formEl.querySelectorAll(".off-act").forEach(b =>
        b.addEventListener("click", () => {
          if (b.id === "offCustomBtn") { customMode = true; renderForm(); document.getElementById("offCustomName")?.focus(); }
          else { customMode = false; selAct = b.dataset.act; renderForm(); }
        }));
      document.getElementById("offCustomName")?.addEventListener("input", e => { customName = e.target.value; saveDraft(); });
      // live character counter (counts DOWN from 40)
      const det = document.getElementById("offDetails");
      det.addEventListener("input", () => { detailsText = det.value; document.getElementById("offCount").textContent = 40 - det.value.length; saveDraft(); });
      document.getElementById("offCog").addEventListener("click", () => openModal());
      document.getElementById("offAdd").addEventListener("click", onAdd);
      saveDraft();          // remember the current form state across close/reopen
      renderRecent();
    }

    function onAdd() {
      const status = document.getElementById("offStatus");
      // this button's job is to SEND to RescueTime — no key means it can't. Flash
      // the button red and open the settings card with the error.
      if (!apiKey) {
        const add = document.getElementById("offAdd");
        add.classList.remove("off-flash"); void add.offsetWidth; add.classList.add("off-flash");
        openModal("Add Rescuetime API to send manual Activities.");
        return;
      }
      let startMs, durMin;
      if (dragStartMs != null && dragEndMs != null && dragEndMs > dragStartMs) {
        // a drag range (can span days) wins over the From/Until inputs
        startMs = dragStartMs; durMin = Math.round((dragEndMs - dragStartMs) / 60000);
      } else {
        const from = document.getElementById("offFrom").value, until = document.getElementById("offUntil").value;
        if (!from || !until) { status.textContent = "Pick a start and end time."; return; }
        const [fh, fm] = from.split(":").map(Number), [uh, um] = until.split(":").map(Number);
        startMs = selDay + (fh * 60 + fm) * 60000;
        durMin = Math.round((selDay + (uh * 60 + um) * 60000 - startMs) / 60000);
      }
      if (!(durMin > 0)) { status.textContent = "The end time must be after the start time."; return; }
      const details = document.getElementById("offDetails").value.trim();
      const activity = (customMode ? (customName.trim() || "Custom") : selAct);
      // RescueTime caps ONE offline_time_post at 4 h, so split anything longer
      // into back-to-back ≤4 h blocks — one post per block.
      const chunks = [];
      let cs = startMs, rem = durMin;
      const gid = Date.now();   // one id for this whole add, so auto-split blocks group into ONE row
      while (rem > 0) {
        const d = Math.min(MAX_BLOCK_MIN, rem);
        chunks.push({ startMs: cs, durMin: d, activity, details, gid });
        cs += d * 60000; rem -= d;
      }
      offlineEntries.push(...chunks);
      persist();
      // SUCCESSFUL ADD -> reset the add-activity fields to default (this also
      // clears the remembered draft via renderForm -> saveDraft). The calendar
      // day/week the user navigated to stays put.
      selAct = acts[0] ?? ""; dragStartMs = dragEndMs = null; selFrom = selUntil = null;
      detailsText = ""; customMode = false; customName = "";
      renderForm();          // rebuilds the form (also calls renderRecent)
      renderTimeline();
      uploadOffline(chunks);
    }

    async function uploadOffline(entries) {
      // POST each block to RescueTime. Its API sends no CORS headers, so the
      // browser can DELIVER a form POST (no-cors) but can't READ the response.
      // No status text is shown — the Added Activities list is all the feedback
      // the user wants; we just assume the post went through.
      if (!apiKey) return;
      try {
        for (const e of entries) {
          const body = new URLSearchParams({ key: apiKey, start_time: rtStamp(e.startMs),
            duration: String(e.durMin), activity_name: e.activity, activity_details: e.details });
          await fetch("https://www.rescuetime.com/anapi/offline_time_post",
            { method: "POST", mode: "no-cors", body });
        }
      } catch { /* assume delivered; the list already reflects the add */ }
    }

    // ---- click / drag across calendar hours → select a range and fill the day
    // + From/Until. A single click = one hour. The range CAN span days (drag
    // from today 2am up to yesterday 9pm). Delegated on dayEl so it survives
    // timeline re-renders.
    let dragAnchor = null;
    const clockHM = ms => { const d = new Date(ms); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; };
    const applyRange = (anchorMs, curMs) => {
      const lo = Math.min(anchorMs, curMs), hi = Math.max(anchorMs, curMs);
      const picked = [];
      dayEl.querySelectorAll(".oh-track").forEach(tr => {
        const s = +tr.dataset.start;
        const inRange = s >= lo && s <= hi;
        tr.classList.toggle("oh-sel", inRange);
        if (inRange) picked.push(s);
      });
      if (!picked.length) return;
      picked.sort((x, y) => x - y);
      dragStartMs = picked[0];                       // start of the earliest hour
      dragEndMs = picked[picked.length - 1] + HOUR;   // end of the latest hour
      const sd = new Date(dragStartMs); sd.setHours(0, 0, 0, 0);
      selDay = sd.getTime();
      selFrom = clockHM(dragStartMs);
      selUntil = clockHM(dragEndMs);
      wkOffset = Math.round((weekStart(new Date(selDay)).getTime() - weekStart(now).getTime()) / WEEK);
      const f = document.getElementById("offFrom"), u = document.getElementById("offUntil");
      if (f) f.value = selFrom;
      if (u) u.value = selUntil;
    };
    const endDrag = () => { if (dragAnchor == null) return; dragAnchor = null; renderForm(); };
    dayEl.addEventListener("mousedown", e => {
      const tr = e.target.closest(".oh-track"); if (!tr) return;
      e.preventDefault();
      dayEl.querySelectorAll(".oh-track.oh-sel").forEach(t => t.classList.remove("oh-sel"));
      dragAnchor = +tr.dataset.start;
      applyRange(dragAnchor, dragAnchor);
    });
    dayEl.addEventListener("mousemove", e => {
      if (dragAnchor == null) return;
      const tr = e.target.closest(".oh-track"); if (!tr) return;
      applyRange(dragAnchor, +tr.dataset.start);
    });
    dayEl.addEventListener("mouseup", endDrag);
    dayEl.addEventListener("mouseleave", endDrag);

    // ---- SETTINGS MODAL: RescueTime API key + manage the WHOLE activity list
    // (add / delete any). Names show as pills (same look as the add view);
    // hovering a pill turns it red and swaps its label to "Delete". ----
    function renderModalActs() {
      const el = document.getElementById("offModalActs");
      if (!el) return;
      el.innerHTML = acts.length
        ? acts.map(a => `<button type="button" class="pswitch-btn off-modal-actbtn" data-del="${esc(a)}"><span class="actname">${esc(a)}</span></button>`).join("")
        : `<div class="off-modal-empty">No activities — add one below.</div>`;
      el.querySelectorAll("[data-del]").forEach(btn => btn.addEventListener("click", () => {
        const name = btn.dataset.del;
        acts = acts.filter(x => x !== name);
        if (selAct === name) selAct = acts[0] ?? "";
        persist(); renderModalActs(); renderForm();
      }));
    }
    function openModal(errText) {
      const modal = document.getElementById("offModal");
      const err = document.getElementById("offModalErr");
      if (errText) { err.textContent = errText; err.hidden = false; } else { err.hidden = true; }
      document.getElementById("offKey").value = apiKey;
      document.getElementById("offKeySave").classList.toggle("active", !!apiKey);
      renderModalActs();
      modal.hidden = false;
      // anchor the card vertically around the cog (which the user just clicked,
      // so it's in view) — robust whatever the card's height/scroll
      const cog = document.getElementById("offCog"), inner = modal.querySelector(".off-modal-card");
      const cogR = cog.getBoundingClientRect(), cardR = detailCard.getBoundingClientRect();
      inner.style.top = Math.max(8, (cogR.top - cardR.top) - inner.offsetHeight / 2) + "px";
    }
    const closeModal = () => { document.getElementById("offModal").hidden = true; };
    document.getElementById("offModal")?.remove();   // drop any leftover from a prior open
    const modalEl = document.createElement("div");
    modalEl.className = "off-modal"; modalEl.id = "offModal"; modalEl.hidden = true;
    modalEl.innerHTML = `
      <div class="off-modal-card">
        <div class="off-modal-head"><span>Settings</span><button type="button" class="off-modal-x" id="offModalX">✕</button></div>
        <div class="off-modal-err" id="offModalErr" hidden></div>
        <div class="off-modal-sec">
          <div class="off-modal-label">RescueTime API Key</div>
          <div class="off-sync">
            <input type="password" id="offKey" class="off-key" autocomplete="off" placeholder="Paste your RescueTime API key">
            <button type="button" class="pswitch-btn off-keybtn" id="offKeySave">Save</button>
          </div>
          <div class="off-modal-hint">Stored only in this browser, never in the repo. Needed to send offline activities.</div>
        </div>
        <div class="off-modal-sec">
          <div class="off-modal-label">Activities</div>
          <div class="off-modal-acts" id="offModalActs"></div>
          <div class="off-addact">
            <input type="text" id="offAddActName" maxlength="30" placeholder="New activity name">
            <button type="button" class="pswitch-btn" id="offAddActBtn">Add</button>
          </div>
        </div>
      </div>`;
    detailCard.appendChild(modalEl);
    // clicks inside the modal must NOT close the detail card; backdrop closes the modal
    modalEl.addEventListener("click", e => {
      e.stopPropagation();
      if (e.target === modalEl) closeModal();
    });
    document.getElementById("offModalX").addEventListener("click", closeModal);
    document.getElementById("offKeySave").addEventListener("click", () => {
      apiKey = document.getElementById("offKey").value.trim();
      lsSet(OFF_LS.key, apiKey);
      document.getElementById("offKeySave").classList.toggle("active", !!apiKey);
      document.getElementById("offModalErr").hidden = true;
    });
    document.getElementById("offAddActBtn").addEventListener("click", () => {
      const inp = document.getElementById("offAddActName"), v = inp.value.trim();
      if (v && !acts.includes(v)) { acts.push(v); persist(); renderModalActs(); renderForm(); }
      inp.value = "";
    });

    renderForm();
    renderTimeline();
    detailCard.hidden = false;
    sizeDetailCard();
    detailRefit = null;
  }

  async function showTrendsDetail(initial) {
    destroyDetailCharts();   // the card may currently hold another view's charts
    setSwitch(null);         // the period switcher is for entity/period pages only
    const T = await trendData();
    document.getElementById("appDetailTitle").classList.remove("tc");

    document.getElementById("appDetailRows").innerHTML = `

    detailCard.hidden = false;
    sizeDetailCard();       // the charts need their final box BEFORE creation
    detailRefit = null;
    const body = document.getElementById("trendBody");
    const tabRow = document.getElementById("trendTabs");
    // COMBINED view: pulse + categories + apps for one period group,
    // stacked under the tab rows. Monthly Combined is the "Trend Home"
    // default page.
    const PER_NAMES = { h: "Daily", w: "Weekly", m: "Monthly", y: "Yearly" };
    const showCombined = async per => {
      trendCharts.forEach(c => c.destroy());
      trendCharts = [];
      const n = PER_NAMES[per];
      body.innerHTML = `
        <div class="trend-sec"><div class="app-sec">${n} Pulse</div>

          <div class="trend-chart"><canvas id="trendC3"></canvas></div></div>`;
      trendCharts = [
        await buildTrendChart("trendC1", `${per}-pulse`, { legendScale: 1, offsets }),
        await buildTrendChart("trendC2", `${per}-cats`, { legendScale: 1, offsets }),
        await buildTrendChart("trendC3", `${per}-apps`, { legendScale: 1, offsets }),
      ];
    };
    const showTab = async key => {
      trendCharts.forEach(c => c.destroy());
      trendCharts = [];
      // line chart (3 parts) over a 14-day-style bar view of the same period
      // (1 part) — the bar graph is 1/3rd of the line graph
      body.innerHTML = `<div class="trend-split">
          <div class="trend-chart tline"><canvas id="trendCanvas"></canvas></div>
          <div class="trend-chart tbar"><canvas id="trendBar"></canvas></div>
        </div>`;
      const Tv = await trendData(offsets);
      trendCharts = [
        await buildTrendChart("trendCanvas", key, { offsets }),
        trendBarChart("trendBar", key[0], Tv),
      ];
    };
    // activate(key) marks the tab and shows its view — "<per>-combined"
    // keys render the stacked three-graph page
    const VIEW_NAMES = { pulse: "Pulse", cats: "Category", apps: "Apps", combined: "Combined" };
    const prevBtn = document.getElementById("trendPrev"),
          nextBtn = document.getElementById("trendNext");
    let curKey = initial ?? "m-combined";
    const activate = async key => {
      curKey = key;
      tabRow.querySelectorAll(".tab").forEach(x =>
        x.classList.toggle("active", x.dataset.tab === key));
      // dynamic headline: "Trends — <View> <Period>" (e.g. "Trends — Category Monthly")
      const per = key.split("-")[0], view = key.split("-").slice(1).join("-");
      document.getElementById("appDetailTitle").textContent =
        `Trends — ${VIEW_NAMES[view] ?? "Pulse"} ${PER_NAMES[per] ?? ""}`.trim();
      if (key.endsWith("-combined")) await showCombined(key[0]);
      else await showTab(key);
      // Prior/Next enable state for THIS view + its current offset
      const Tc = await trendData(offsets), off = offsets[per] ?? 0;
      let canPrior = false;
      if (per === "m") canPrior = earliestMonth != null && earliestMonth < Tc.keys.m[0];
      else if (per === "w") canPrior = earliestDay != null && earliestDay < Tc.keys.w[0];
      else if (per === "h") canPrior = earliestHourMs < Tc.hOldestMs;
      // yearly is all-time → never navigates
      prevBtn.disabled = !canPrior;
      nextBtn.disabled = per === "y" || off >= 0;
    };
    tabRow.addEventListener("click", e => {
      const t = e.target.closest(".tab");
      if (!t) return;
      e.stopPropagation();   // a tab click must NOT close the card
      activate(t.dataset.tab);

    const shift = dir => {
      const per = curKey.split("-")[0];
      if (per === "y") return;
      offsets[per] = Math.min(0, (offsets[per] ?? 0) + dir);

    nextBtn.addEventListener("click", e => { e.stopPropagation(); if (!nextBtn.disabled) shift(1); });
