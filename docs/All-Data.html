      <div class="app-trend app-since">${histStart ? `Since ${esc(histStart)}` : ""}</div></div>`);

    // ---- one HALF-cell per SPECIFIC month (past 12, left) and per YEAR
    //      (right), sharing the SAME 5-column grid as the period rows above,
    //      so every column edge lines up card-wide: months = cols 1-2 (like
    //      Today), the month's trend dead-centre in col 3, years = cols 4-5
    //      (like Yesterday). The year's own trend lives in its tooltip.
    //      Tooltips + RescueTime click zones sit per HALF, not per row. ----
    const statHalf = (side, label, range, prevRange, prevLabel, url) => {
      const v = cellVal(range);
      let trend = "", tipTrend = "No Comparison Available";
      if (v !== null && prevRange) {
        const pv = cellVal(prevRange);
        if (pv !== null && (v || pv)) {
          const dHrs = hrs(v - pv);
          const up = dHrs >= 0;
          const pct = pv ? Math.round(100 * v / pv) : null;
          trend = `<span style="color:${up ? BLUE : RED}">${up ? "▲" : "▼"}
                   ${up ? "+" : ""}${dHrs}h${pct !== null ? ` (${pct}%)` : ""}</span>`;
          tipTrend = `${up ? "+" : ""}${dHrs}h Vs ${prevLabel}` +
                     (pct !== null ? ` (${pct}%)` : "");
        }
      }
      const partial = histStart && v !== null && range[0] < histStart;
      const tipBody = `${range[0]} — ${range[1]}` +
        (partial ? `\nPartial — App History Starts ${histStart}` : "") + `\n${tipTrend}`;
      return { trend,
        cell: halfCell(side, label, v,
          ` data-tip-title="${esc(label)}: ${v === null ? "No Data" : hrs(v) + "h"}"
                data-tip-body="${esc(tipBody)}"`) };
    };
    const monLabel = d => {   // month name only — the past 12 months are unambiguous
      const s = d.toLocaleDateString(undefined, { month: "long" });
      return s.charAt(0).toUpperCase() + s.slice(1);
    };
    const monthCells = [];
    for (let i = 0; i < 12; i++) {
      const s  = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const e  = new Date(now.getFullYear(), now.getMonth() - i + 1, 0);
      const ps = new Date(now.getFullYear(), now.getMonth() - i - 1, 1);
      const pe = new Date(now.getFullYear(), now.getMonth() - i, 0);
      monthCells.push(statHalf("hl", monLabel(s), [isoD(s), isoD(i === 0 ? now : e)],
                               [isoD(ps), isoD(pe)], monLabel(ps),
                               "https://www.rescuetime.com/dashboard/for/the/month/of/" + isoD(s)));
    }
    const yearCells = [];
    const startYear = histStart ? +histStart.slice(0, 4) : now.getFullYear();
    for (let y = now.getFullYear(); y >= startYear; y--) {
      const s = new Date(y, 0, 1);
      const e = y === now.getFullYear() ? now : new Date(y, 11, 31);
      const prev = y - 1 >= startYear
        ? [isoD(new Date(y - 1, 0, 1)), isoD(new Date(y - 1, 11, 31))] : null;
      yearCells.push(statHalf("hr", String(y), [isoD(s), isoD(e)], prev, String(y - 1),
                              `https://www.rescuetime.com/dashboard/for/the/year/of/${y}-01-01`));
    }
    const myRows = [];
    for (let i = 0; i < Math.max(monthCells.length, yearCells.length); i++) {
      const m = monthCells[i], y = yearCells[i];
      myRows.push(`<div class="app-period-row my-row">
        ${m ? m.cell : `<div class="app-half hl"></div>`}
        <div class="app-trend">${m ? m.trend : ""}</div>
        ${y ? y.cell : ""}</div>`);
    }
    rows.push(`<div class="period-apps">
      <div class="app-period-row my-row my-heads">
        <div class="app-sec hl">Past 12 Months</div>
        <div></div>
        <div class="app-sec hr">Years</div></div>
      ${myRows.join("")}</div>`);
    // ---- ORIGINAL RescueTime names the dictionary combines into this app
    // (up to 5, all-time hours, standard bar rows) — only shown when the
    // dictionary actually renames/merges something ----
    const rawAgg = new Map();   // raw activity -> {sec, top, prod}
    const addRaw = (act, sec, prod) => {
      if (appName(act).toLowerCase() !== key) return;
      const e = rawAgg.get(act) ?? { sec: 0, top: 0, prod: String(prod) };
      e.sec += sec;
      if (sec > e.top) { e.top = sec; e.prod = String(prod); }
      rawAgg.set(act, e);
    };
    if (arch?.days) {
      for (const dayRows of Object.values(arch.days))
        for (const [sec, act, , prod] of dayRows) addRaw(act, sec, prod);
    } else {
      for (const [, sec, , act, , prod] of data.month_activities ?? []) addRaw(act, sec, prod);
    }
    const raws = [...rawAgg.entries()].sort((a, b) => b[1].sec - a[1].sec);
    const isMerged = raws.length > 1 || (raws.length === 1 && raws[0][0] !== displayName);
    document.getElementById("appDetailTitle").textContent =
      `${displayName} — Details`;
    // How recent the fetched data goes, anchored right on the title row.
    const fetchedAt = arch?.updated_at ?? data.generated_at;
    const lastDay = appDayKeys[appDayKeys.length - 1];
    document.getElementById("appDetailFresh").textContent = fetchedAt
      ? `Data Up To ${new Date(fetchedAt).toLocaleString()}`
      : lastDay ? `Data Up To ${lastDay}` : "No Data";
    // v81 layout: the period / month / year rows SCROLL in their own area;
    // Combined Original Names and the app's ALL-TIME graph stay pinned at
    // the bottom of the card, always visible (user spec)
    document.getElementById("appDetailRows").innerHTML =
      `<div class="app-scroll">${rows.join("")}</div>` +
      (isMerged
        ? `<div class="period-apps"><div class="app-sec">Combined Original Names</div>
             <div class="bar-list" id="appRawList"></div></div>` : "") +
      (histStart
        ? `<div class="pbot-chart"><canvas id="appTotCanvas"></canvas></div>` : "");
    if (isMerged)
      renderBarList("appRawList", raws.slice(0, 5).map(([raw, e]) =>
        [raw, e.sec, e.prod,
         `Original RescueTime Name — Renamed To ${displayName}\n` +
         `${hrs(e.sec)}h Across All Recorded Data`]));
    // the all-periods app card IS the app's Total view (v79 switcher)
    setSwitch({ kind: "app", key, display: displayName, per: "total" });
    detailCard.hidden = false;
    sizeDetailCard();      // full-page card, same bottom edge as the grid
    detailRefit = null;    // no fit-to-height list on the app card
    // ---- the pinned ALL-TIME graph (v81): this app's share of every
    // logged hour, bucketed to the whole history's span — days up to two
    // months, weeks up to ~3 years, HALF-YEARS beyond (Total-page rule) ----
    if (histStart) {
      const dayAll = new Map();   // day -> per-level totals of ALL rows (the % denominator)
      for (const [d2, dayRows] of Object.entries(arch?.days ?? {})) {
        const lv = dayAll.get(d2) ?? dayAll.set(d2, emptyLevels()).get(d2);
        for (const [sec, , , prod] of dayRows)
          if (LEVELS.includes(String(prod))) lv[String(prod)] += sec;
      }
      const spanD = (new Date(todayIso + "T00:00:00")
                   - new Date(histStart + "T00:00:00")) / 864e5;
      const half = spanD > 1100, weekly = !half && spanD > 62;
      const lvM = new Map(), appM = new Map();
      for (const d2 = new Date(histStart + "T00:00:00"); ; d2.setDate(d2.getDate() + 1)) {
        const iso = isoOf(d2.getTime());
        if (iso > todayIso) break;
        const bk = half ? `${d2.getFullYear()}-${d2.getMonth() < 6 ? "01" : "07"}-01`
          : weekly ? isoOf(weekStart(new Date(iso + "T00:00:00")).getTime()) : iso;
        const l2 = lvM.get(bk) ?? lvM.set(bk, emptyLevels()).get(bk);
        const am = appM.get(bk) ?? appM.set(bk, new Map()).get(bk);
        const dl = dayAll.get(iso);
        if (dl) for (const l of LEVELS) l2[l] += dl[l];
        const s = perDay.get(iso);
        if (s) am.set(displayName, (am.get(displayName) ?? 0) + s);
      }
      const keys = [...lvM.keys()];
      const labels = [], tips = [];
      keys.forEach((k, i) => {
        const d2 = new Date(k + "T00:00:00");
        if (half) {
          const h = d2.getMonth() < 6 ? 1 : 2;
          labels.push(`H${h} ${String(d2.getFullYear()).slice(2)}`);
          tips.push(`H${h} ${d2.getFullYear()} (${h === 1 ? "January – June" : "July – December"})`);
        } else if (weekly) {
          const wn = isoWeekNum(d2);
          const th = new Date(d2); th.setDate(d2.getDate() + 3);
          labels.push(`W${wn}`);
          tips.push(`Week ${wn} ${th.getFullYear()} (From ${k})`);
        } else {
          labels.push((i === 0 || d2.getDate() === 1)
            ? `${d2.getDate()}.${d2.getMonth() + 1}` : String(d2.getDate()));
          tips.push(d2.toLocaleDateString(undefined,
            { weekday: "short", day: "numeric", month: "short", year: "numeric" }));
        }
      });
      periodTabChart = trendChartCore("appTotCanvas", { keys, labels, tips,
        lvMap: lvM, catMap: appM, topCats: [displayName],
        what: "cats", pointR: 2, legendScale: 1 });
    }
  }

  // ---- the PERIOD detail card: same overlay as the app card — total logged
  //      time with the trend vs the previous period, then the top 20 apps in
  //      the same bar-list style as the dashboard's Top Apps cards.
  //      catKey/catDisplay (optional): restrict everything to ONE category
  //      (by display name) — that turns this into the CATEGORY detail card. ----
  async function showPeriodDetail(p, catKey, catDisplay) {
    const arch = await loadArchive();
    // per-day app rows in the archive's compact shape [sec, act, cat, prod];
    // data.json's 30-day day_activities is the fallback without an archive
    const rowsOf = iso => arch?.days?.[iso]
      ?? (data.day_activities?.[iso] ?? []).map(([, sec, , act, cat, prod]) => [sec, act, cat, prod]);
    // catKey filters by CATEGORY display name — or, with the "lvl:<prod>"
    // form, by ONE exact productivity type (Productive ≠ Very Productive),
    // or, with the "app:<name>" form (v78), by ONE app (display-merged) —
    // that turns this into the period-scoped APP detail card
    const lvlKey = catKey?.startsWith("lvl:") ? catKey.slice(4) : null;
    const appKey = catKey?.startsWith("app:") ? catKey.slice(4) : null;
    const inCat = (cat, prod, act) => !catKey
      || (lvlKey ? String(prod) === lvlKey
        : appKey ? appName(act).toLowerCase() === appKey
                 : catName(cat).toLowerCase() === catKey);
    // ONE combined pass per window: per-app totals + per-level totals/apps +
    // the window's total. Day windows walk the date range; the 24h windows
    // (p.h24/p.prevH24 = [hoursBack1, hoursBack0]) filter the hourly rows.
    const winAgg = (range, h24) => {
      const m = new Map(), lv = emptyLevels(), apps = {};
      const rawCats = new Map();   // raw category -> {sec, top, prod}
      const add = (sec, act, cat, prod) => {
        if (!inCat(cat, prod, act)) return;
        const name = appName(act), k = name.toLowerCase();
        const e = m.get(k) ?? { name, sec: 0, top: 0, cat, prod: String(prod) };
        e.sec += sec;
        if (sec > e.top) { e.top = sec; e.cat = cat; e.prod = String(prod); }
        m.set(k, e);
        const l = String(prod);
        lv[l] += sec;
        const lm = (apps[l] ??= new Map());
        lm.set(name, (lm.get(name) ?? 0) + sec);
        // "Combined Original Names": raw categories on category cards, raw
        // ACTIVITY names on the period-scoped app cards (v78)
        const rcKey = appKey ? act : cat;
        const rc = rawCats.get(rcKey) ?? { sec: 0, top: 0, prod: l };
        rc.sec += sec;
        if (sec > rc.top) { rc.top = sec; rc.prod = l; }
        rawCats.set(rcKey, rc);
      };
      if (h24) {
        const [back1, back0] = h24;
        for (const [t, sec, , act, cat, prod] of (data.hour_activities ?? [])) {
          const ms = new Date(t).getTime();
          if (ms > nowMs - back1 * 36e5 && ms <= nowMs - back0 * 36e5)
            add(sec, act, cat, prod);
        }
      } else {
        for (const d = new Date(range[0] + "T00:00:00"); ; d.setDate(d.getDate() + 1)) {
          const iso = isoOf(d.getTime());
          if (iso > range[1]) break;
          for (const [sec, act, cat, prod] of rowsOf(iso)) add(sec, act, cat, prod);
        }
      }
      let total = 0;
      for (const e of m.values()) total += e.sec;
      return { m, lv, apps, total, rawCats };
    };
    const cur = winAgg(p.range, p.h24), prev = winAgg(p.prevRange, p.prevH24);
    const agg = cur.m, prevAgg = prev.m;
    const curA = cur, prevA = prev;
    // with a category filter the totals are the CATEGORY's, not the period's
    const totalSec = catKey ? cur.total : p.total;
    const prevTotSec = catKey ? prev.total : p.prevTotal;
    const rangeText = r => !r ? "" : r[0] === r[1] ? r[0] : `${r[0]} — ${r[1]}`;
    const winText = (r, h24) => h24
      ? (h24[1] === 0 ? "Rolling Last 24 Hours (Hourly Data)"
                      : `${h24[1]}–${h24[0]} Hours Ago (Hourly Data)`)
      : rangeText(r);
    // total row: logged hours | trend | the previous period's hours.
    // The % is ALWAYS spelled out — "(No Trend)" when the previous period has
    // nothing logged, so the trend column never silently loses its number.
    let trend = "", tipTrend = p.noPrev
      ? `All Recorded Data Since ${p.range[0]}` : "No Comparison Available";
    if (!p.noPrev && (totalSec || prevTotSec)) {
      const dHrs = hrs(totalSec - prevTotSec);
      const up = dHrs >= 0;
      const pct = prevTotSec ? Math.round(100 * totalSec / prevTotSec) : null;
      trend = `<span style="color:${up ? BLUE : RED}">${up ? "▲" : "▼"}
               ${up ? "+" : ""}${dHrs}h${pct !== null ? ` (${pct}%)` : " (No Trend)"}</span>`;
      tipTrend = `${p.label} Is ${up ? "+" : ""}${dHrs}h Vs ${p.prevLabel}` +
                 (pct !== null ? ` (${pct}%)` : "");
    }
    const tipBody = (catDisplay ? `${catDisplay} Only\n` : "") +
      `${p.label}: ${winText(p.range, p.h24)}\n` +
      (p.noPrev ? "" : `${p.prevLabel}: ${winText(p.prevRange, p.prevH24)}\n`) + tipTrend;
    // ---- Productive / Neutral / Distracting rows: a stacked level bar +
    // hours for the CURRENT period (left) and the PREVIOUS one (right),
    // all six bars sharing ONE scale so lengths are comparable ----
    const BUCKETS = [
      ["Productive",  ["2", "1"],   "Very Productive + Productive"],
      ["Neutral",     ["0"],        "Neutral"],
      ["Distracting", ["-1", "-2"], "Distracting + Very Distracting"],
    ];
    const sumLv = (A, levels) => levels.reduce((s, l) => s + A.lv[l], 0);
    // only the CURRENT period's bars are drawn (the prior-period cells were
    // replaced by the pulse ring), so they alone set the shared scale
    const maxSec = Math.max(1, ...BUCKETS.map(([, levels]) => sumLv(curA, levels)));
    // One cell = "Xh Word" text with the stacked bar running UNDERNEATH it.
    // side = span-l/span-r (category cards' two-sided row) | pt-bar (period
    // cards' grid). attrs (optional) carries per-cell tooltip / click zones.
    const lvlCell = (A, levels, sec, word, side, attrs = "") => {
      const segs = levels.map(l =>
        `<div class="seg" style="flex:${A.lv[l]} 1 0;background:${COLORS[l]}"></div>`).join("");
      return `<div class="cat-row lvl-cell ${side}"${attrs}>
          <div class="cat-bar stackbar" style="width:${(100 * sec / maxSec).toFixed(1)}%">${segs}</div>
          <div class="cat-label"><span class="cat-time">${hrs(sec)}h</span><span class="cat-name">${esc(word)}</span></div>
        </div>`;
    };
    // barless variant of the same cell, for the Total Logged row
    const textCell = (secH, word, side, attrs = "") =>
      `<div class="cat-row lvl-cell ${side}"${attrs}>
         <div class="cat-label"><span class="cat-time">${secH}h</span><span class="cat-name">${esc(word)}</span></div>
       </div>`;
    // the level rows make no sense for a single CATEGORY — period cards only.
    // Each bucket contributes a bar cell (grid col 1) + a trend cell (col 3);
    // the tooltip attrs sit on BOTH cells (there is no row wrapper anymore).
    const bucketRows = catKey ? [] : BUCKETS.map(([label, levels, lvNames]) => {
      const cur = sumLv(curA, levels), prev = sumLv(prevA, levels);
      let bTrend = "", bTip = p.noPrev ? "All Recorded Data" : "No Comparison Available";
      if (!p.noPrev && (cur || prev)) {
        const dHrs = hrs(cur - prev);
        const up = dHrs >= 0;
        const pct = prev ? Math.round(100 * cur / prev) : null;
        bTrend = `<span style="color:${up ? BLUE : RED}">${up ? "▲" : "▼"}
                  ${up ? "+" : ""}${dHrs}h${pct !== null ? ` (${pct}%)` : " (No Trend)"}</span>`;
        bTip = `${up ? "+" : ""}${dHrs}h Vs ${p.prevLabel}` +
               (pct !== null ? ` (${pct}%)` : "");
      }
      // top 5 apps of this bucket in the CURRENT period, for the tooltip
      const m = new Map();
      for (const l of levels)
        for (const [n, s] of curA.apps[l] ?? []) m.set(n, (m.get(n) ?? 0) + s);
      const tops = [...m].sort((a, b) => b[1] - a[1]).slice(0, 5)
        .map(([n, s]) => `   ${hrs(s)}h  ${n}`).join("\n");
      const attrs = ` data-tip-title="${esc(label)}: ${hrs(cur)}h Vs ${hrs(prev)}h (${esc(p.prevLabel)})"
          data-tip-body="${esc(lvNames + "\n" + bTip + (tops ? "\n" + tops : ""))}"`;
      return lvlCell(curA, levels, cur, label, "pt-bar", attrs) +
        `<div class="app-trend pt-trend"${attrs}>${bTrend}</div>`;
    });
    // ---- ORIGINAL RescueTime category names the dictionary combines into
    // this category (up to 5, this period's hours) — CATEGORY cards only,
    // and only when the dictionary actually renames/merges something ----
    const rawCatRows = (catKey && !lvlKey)
      ? [...cur.rawCats.entries()].sort((a, b) => b[1].sec - a[1].sec)
      : [];
    const catMerged = rawCatRows.length > 1 ||
      (rawCatRows.length === 1 && rawCatRows[0][0] !== catDisplay);
    // summary block. PERIOD cards (v61): ONE shared grid — bar cells (col 1,
    // their previous width), the CURRENT pulse ring (col 2), the trends
    // (col 3, exactly midway between the rings), and the PRIOR-period pulse
    // ring at the far right (col 4). CATEGORY/TYPE cards keep the classic
    // two-sided total row and get no rings (a type is single-level).
    const totalAttrs =
      ` data-tip-title="${esc(catDisplay ? catDisplay + " — " : "")}${esc(p.label)}: ${hrs(totalSec)}h Logged"
         data-tip-body="${esc(tipBody)}"`;
    // category/type cards: the entity's ALL-TIME hours as a share of every
    // attributable hour — the "x% of all your time" line under Total Logged
    let entAllSec = 0;
    if (catKey)
      for (const dayRows of Object.values(arch?.days ?? {}))
        for (const [sec, act, cat, prod] of dayRows)
          if (inCat(cat, prod, act)) entAllSec += sec;
    // entity cards (v80): FOUR aligned columns on ONE grid — this period's
    // hours with the entity's share OF THAT PERIOD right underneath, the
    // entity's all-time hours with its share of ALL logged time underneath,
    // then the trend and the prior period — every cell in the same
    // "value + label" style as the Total Logged cell (user spec).
    const entSummary = () => {
      const gt = grandTotalSec(arch);
      const perPct = p.total ? fmtPct(100 * totalSec / p.total) : null;
      const allPct = gt ? fmtPct(100 * entAllSec / gt) : null;
      const cell = (val, label, cls = "", attrs = "") =>
        `<div class="cat-label ent-cell${cls}"${attrs}>
           <span class="cat-time">${val}</span><span class="cat-name">${esc(label)}</span></div>`;
      const tip = (title, body) =>
        ` data-tip-title="${esc(title)}" data-tip-body="${esc(body)}"`;
      return `<div class="ent-grid">
        ${cell(hrs(totalSec) + "h", "Total Logged", "", totalAttrs)}
        ${cell(hrs(entAllSec) + "h", "Logged In Total", "",
           tip(`${catDisplay}: ${hrs(entAllSec)}h All Time`, "All Recorded Data"))}
        ${p.noPrev
          ? `<div class="app-trend app-since">Since ${esc(p.range[0])}</div>`
          : `<div class="app-trend"${totalAttrs}>${trend}</div>`}
        ${p.noPrev ? "<div></div>"
          : cell(hrs(prevTotSec) + "h", p.prevLabel, "", totalAttrs)}
        ${perPct === null ? "<div></div>"
          : cell(perPct + "%", "Of Your Time In This Period", " ent-share",
              tip(`${perPct}% Of ${p.label}`,
                `${hrs(totalSec)}h Of ${hrs(p.total)}h Logged In ${p.label}\n${catDisplay} Only`))}
        ${allPct === null ? "<div></div>"
          : cell(allPct + "%", "Of All Your Time", " ent-share",
              tip(`${allPct}% Of All Your Time`,
                `${hrs(entAllSec)}h Of ${hrs(gt)}h Total Logged\n${catDisplay} Across All Recorded Data`))}
        <div></div><div></div></div>`;
    };
    // Total page (v81): an "Average Per Day" line right under Total Logged
    // (mean across every day that has data), before the level bars
    let avgCells = "";
    if (p.noPrev && !catKey) {
      let activeDays = 0;
      for (const dayRows of Object.values(arch?.days ?? {}))
        if (dayRows.length) activeDays++;
      if (activeDays) {
        const avgAttrs = ` data-tip-title="${esc(`${hrs(totalSec / activeDays)}h Average Per Day`)}"
          data-tip-body="${esc(`${hrs(totalSec)}h Across ${activeDays} Days With Data`)}"`;
        avgCells = textCell(hrs(totalSec / activeDays), "Average Per Day", "pt-bar", avgAttrs) +
          `<div class="app-trend pt-trend"${avgAttrs}></div>`;
      }
    }
    const summaryRows = catKey
      ? entSummary()
      : textCell(hrs(totalSec), "Total Logged", "pt-bar", totalAttrs) +
        `<div class="app-trend pt-trend"${totalAttrs}>${trend}</div>` +
        avgCells + bucketRows.join("");
    // two pulse rings, drawn exactly like the dashboard pulse card's rings
    // (total above, number inside, "Current"/"Prior" below): ring 1 = THIS
    // period, ring 2 = the PRIOR period, its caption naming what it shows
    const pulseBlock = (sfx, word) => `
      <div class="period-pulse pt-p${sfx}">
        <div class="pulse-wrap">
          <canvas id="periodPulseRing${sfx}"></canvas>
          <div class="pulse-center"><div class="pulse-inner">
            <div class="pulse-label" id="periodPulseTotal${sfx}">–</div>
            <div class="pulse-num" id="periodPulseNum${sfx}">–</div>
            <div class="pulse-label">${word}</div>
          </div></div>
        </div>
        <div class="pulse-pct" id="periodPulsePct${sfx}" hidden></div>
      </div>`;
    const rows = [
      catKey
        ? `<div class="period-top">
             <div class="period-top-rows">${summaryRows}</div></div>`
        : `<div class="period-top ptgrid${avgCells ? " ptgrid-total" : ""}">${summaryRows}${pulseBlock("1", "Current")}${p.noPrev ? "" : pulseBlock("2", "Prior")}</div>`,
      catKey
        ? `<div class="period-apps fill"><div class="app-sec">${appKey ? "App" : "Top Apps"}</div>
             <div class="bar-list" id="periodApps"></div>
             ${p.h24 ? "" : `<div class="pbot-chart" id="periodBot">
               <canvas id="periodBotCanvas"></canvas></div>`}</div>`
        : `<div class="period-apps fill">
             <div class="tab-row" id="periodTabs">
               <div class="app-sec tab active" data-tab="apps">Apps</div>
               <div class="app-sec tab" data-tab="cats">Categories</div>
               <div class="app-sec tab" data-tab="types">Types</div>
               ${p.h24 ? "" : `<div class="app-sec tab" data-tab="pulse">Pulse</div>` +
                 (p.noPrev
                   ? `<div class="app-sec tab" data-tab="averages">Averages</div>`
                   : `<div class="app-sec tab" data-tab="trends">Trends</div>`)}
             </div>
             <div class="bar-list" id="periodApps"></div>
             ${p.h24 ? "" : `<div class="pbot-chart" id="periodBot" hidden>
               <canvas id="periodBotCanvas"></canvas></div>`}</div>`,
      ...(catMerged
        ? [`<div class="period-apps"><div class="app-sec">Combined Original Names</div>
             <div class="bar-list" id="catRawList"></div></div>`]
        : []),
    ];
    document.getElementById("appDetailTitle").textContent = catDisplay
      ? `${catDisplay} — ${p.label}`
      : `${p.label} — Details`;
    document.getElementById("appDetailFresh").textContent = winText(p.range, p.h24);
    // period switcher (v79): same entity, different period on click
    setSwitch({
      kind: appKey ? "app" : lvlKey ? "lvl" : catKey ? "cat" : "period",
      key: appKey ?? lvlKey ?? catKey, display: catDisplay,
      per: PER_OF_LABEL[p.label] ?? null,
    });
    destroyDetailCharts();   // canvases are replaced below
    document.getElementById("appDetailRows").innerHTML = rows.join("");
    // size the card to the page BEFORE rendering the lists, so the Top Apps
    // section knows exactly how much height it has to fill
    detailCard.hidden = false;
    sizeDetailCard();
    if (catMerged)
      renderBarList("catRawList", rawCatRows.slice(0, 5).map(([raw, e]) =>
        [raw, e.sec, e.prod,
         `Original RescueTime ${appKey ? "Name" : "Category"} — Renamed To ${catDisplay}\n` +
         `${hrs(e.sec)}h In ${p.label}`]));
    if (!catKey) {
      // ring-slice tooltips want activity-shaped rows — rebuild them from the
      // per-level app sums of each window (names already display-merged)
      const actsOf = A => {
        const out = [];
        for (const [l, m] of Object.entries(A.apps))
          for (const [n, s] of m) out.push([null, s, null, n, null, l]);
        return out;
      };
      const lvTot = A => hrs(LEVELS.reduce((a, l) => a + A.lv[l], 0));
      document.getElementById("periodPulseTotal1").textContent = `${lvTot(curA)}h`;
      periodPulseChart?.destroy();
      periodPulseChart = makeDonut("periodPulseRing1", "periodPulseNum1",
        curA.lv, actsOf(curA), n => n,
        `${p.label} Pulse — ${winText(p.range, p.h24)}`);
      const pctEl = document.getElementById("periodPulsePct1");
      if (p.noPrev) {
        // Total page: no prior period exists — the ring's caption says what
        // the single ring covers instead of a trend
        pctEl.hidden = false;
        pctEl.textContent = `Since ${p.range[0]}`;
        pctEl.dataset.tipTitle = "All Recorded Data";
        pctEl.dataset.tipBody = winText(p.range, p.h24);
      } else {
        document.getElementById("periodPulseTotal2").textContent = `${lvTot(prevA)}h`;
        periodPulseChart2?.destroy();
        periodPulseChart2 = makeDonut("periodPulseRing2", "periodPulseNum2",
          prevA.lv, actsOf(prevA), n => n,
          `${p.prevLabel} Pulse — ${winText(p.prevRange, p.prevH24)}`);
        pulsePct("periodPulsePct1", curA.lv, prevA.lv, `From ${p.prevLabel}`,
          `${p.label} Vs ${p.prevLabel}`);
        // pulsePct hides itself when the previous period has no data — on this
        // card the line must never vanish (user request), so say why instead
        if (pctEl.hidden) {
          pctEl.hidden = false;
          pctEl.textContent = `No Trend (${p.prevLabel})`;
          pctEl.dataset.tipTitle = `No ${p.prevLabel} Data To Compare Against`;
          pctEl.dataset.tipBody = `${p.label} Vs ${p.prevLabel}`;
        }
        // ring 2's caption names the period it shows
        const pctEl2 = document.getElementById("periodPulsePct2");
        pctEl2.hidden = false;
        pctEl2.textContent = p.prevLabel;
        pctEl2.dataset.tipTitle = `${p.prevLabel} Pulse`;
        pctEl2.dataset.tipBody = winText(p.prevRange, p.prevH24) || p.prevLabel;
      }
    }
    // ---- the tabbed list (Apps / Categories / Types) — the list SCROLLS
    // inside the card (small themed scrollbar) instead of trimming rows, and
    // the site-wide 0.5 h floor now applies here too ----
    // apps: same bars, %-vs-previous-period labels and tooltips as the
    // dashboard's Top Apps cards; EVERY app ≥ 0.5 h, scrollable
    // On the all-time pages (noPrev) there is no previous period, so the
    // right-edge % is the entry's SHARE of every logged hour instead of a
    // trend ("20% of my total time went to Games") — v81 user spec. The
    // Apps list is also capped to the TOP 50 there (10+ years of apps).
    const sharePctOf = sec => p.total ? fmtPct(100 * sec / p.total) + "%" : undefined;
    const appEntries = [...agg.values()]
      .filter(e => e.sec >= MIN_LOGGED_SEC)
      .sort((a, b) => b.sec - a.sec)
      .slice(0, p.noPrev ? 50 : Infinity)
      .map(e => {
        const prevSec = prevAgg.get(e.name.toLowerCase())?.sec;
        const pct = p.noPrev ? sharePctOf(e.sec)
          : prevSec > 0 ? Math.round(100 * e.sec / prevSec) + "%" : "No Trend";
        return [e.name, e.sec, e.prod,
          `${catName(e.cat)} — ${NAMES[e.prod]}, ${hrs(e.sec)}h` +
          (p.noPrev ? `\n${pct} Of All Your Logged Time`
            : prevSec > 0 ? `\n${pct} Of ${p.prevLabel} (${hrs(prevSec)}h)`
                          : `\nNot Used In ${p.prevLabel} (No Trend)`),
          pct];
      });
    detailRefit = null;   // no fit-to-height trimming — the list scrolls
    // ---- the BOTTOM graph (v77): one line per top app (category/type cards
    // + the Apps tab) or per top category (the Categories tab) across THIS
    // period — DAILY points up to ~2 months, WEEKLY points beyond (year
    // cards). Shares trendChartCore, so lines read as % of the slice's
    // total logged time with hours in the tooltip. ----
    let botCache = null;
    const botMaps = () => botCache ??= (() => {
      const span = (new Date(p.range[1] + "T00:00:00")
                  - new Date(p.range[0] + "T00:00:00")) / 864e5;
      // v81: spans beyond ~3 years (the Total pages) bucket by HALF-YEAR
      // (user spec for the all-time charts); 2 months..3 years by week
      const half = span > 1100, weekly = !half && span > 62;
      const lvM = new Map(), appM = new Map(), catM = new Map();
      const appTot = new Map(), catTot = new Map();
      for (const d = new Date(p.range[0] + "T00:00:00"); ; d.setDate(d.getDate() + 1)) {
        const iso = isoOf(d.getTime());
        if (iso > p.range[1]) break;
        const key = half
          ? `${d.getFullYear()}-${d.getMonth() < 6 ? "01" : "07"}-01`
          : weekly
          ? isoOf(weekStart(new Date(iso + "T00:00:00")).getTime()) : iso;
        const l2 = lvM.get(key) ?? lvM.set(key, emptyLevels()).get(key);
        const am = appM.get(key) ?? appM.set(key, new Map()).get(key);
        const cm = catM.get(key) ?? catM.set(key, new Map()).get(key);
        for (const [sec, act, cat, prod] of rowsOf(iso)) {
          // the denominator stays ALL logged time of the slice (site-wide
          // % style), whatever entity filter applies to the lines
          if (LEVELS.includes(String(prod))) l2[String(prod)] += sec;
          const cn = catName(cat);
          cm.set(cn, (cm.get(cn) ?? 0) + sec);
          catTot.set(cn, (catTot.get(cn) ?? 0) + sec);
          if (!inCat(cat, prod, act)) continue;   // app lines: the ENTITY's apps
          const an = appName(act);
          am.set(an, (am.get(an) ?? 0) + sec);
          appTot.set(an, (appTot.get(an) ?? 0) + sec);
        }
      }
      const keys = [...lvM.keys()];
      const labels = [], tips = [];
      keys.forEach((k, i) => {
        const d = new Date(k + "T00:00:00");
        if (half) {
          const h = d.getMonth() < 6 ? 1 : 2;
          labels.push(`H${h} ${String(d.getFullYear()).slice(2)}`);
          tips.push(`H${h} ${d.getFullYear()} (${h === 1 ? "January – June" : "July – December"})`);
        } else if (weekly) {
          const wn = isoWeekNum(d);
          const th = new Date(d); th.setDate(d.getDate() + 3);
          labels.push(`W${wn}`);
          tips.push(`Week ${wn} ${th.getFullYear()} (From ${k})`);
        } else {
          labels.push((i === 0 || d.getDate() === 1)
            ? `${d.getDate()}.${d.getMonth() + 1}` : String(d.getDate()));
          tips.push(d.toLocaleDateString(undefined,
            { weekday: "short", day: "numeric", month: "short", year: "numeric" }));
        }
      });
      const top10 = m => [...m.entries()].sort((a, b) => b[1] - a[1])
        .slice(0, 10).map(([n]) => n);
      return { keys, labels, tips, lvM, appM, catM,
               topApps: top10(appTot), topCats: top10(catTot) };
    })();
    const botGraph = what => {
      const K = botMaps();
      return trendChartCore("periodBotCanvas", { keys: K.keys,
        labels: K.labels, tips: K.tips, lvMap: K.lvM,
        catMap: what === "apps" ? K.appM : K.catM,
        topCats: what === "apps" ? K.topApps : K.topCats,
        what: "cats", pointR: 2, legendScale: 1 });
    };
    // list entries linked to the graph: every APP / CATEGORY row opens its
    // own detail page for THIS period (entry[5] nav descriptor) and carries
    // the square matching its line colour below (entry[6] — invisible when
    // the app/category isn't on the graph)
    const withMeta = (entries, tops, kind) => entries.map(en => {
      const i = tops ? tops.indexOf(en[0]) : -1;
      return [...en, { kind, key: en[0], period: p.label },
        tops ? (i >= 0 ? CAT_COLORS[i % CAT_COLORS.length] : null) : undefined];
    });
    const appMeta = entries =>
      withMeta(entries, p.h24 ? null : botMaps().topApps, "app");
    const catMeta = entries =>
      withMeta(entries, p.h24 ? null : botMaps().topCats, "cat");
    if (catKey) {
      renderBarList("periodApps", appMeta(appEntries));
      if (!p.h24) periodTabChart = botGraph("apps");
      return;
    }
    // categories: exact totals from the RAW category sums, merged by display
    // name (dictionary.json); tooltip apps from each app's dominant category
    const catAgg = new Map();
    for (const [raw, e] of cur.rawCats) {
      const name = catName(raw), k = name.toLowerCase();
      const c = catAgg.get(k) ?? { name, sec: 0, top: 0, prod: e.prod };
      c.sec += e.sec;
      if (e.sec > c.top) { c.top = e.sec; c.prod = e.prod; }
      catAgg.set(k, c);
    }
    const prevCatAgg = new Map();
    for (const [raw, e] of prev.rawCats) {
      const k = catName(raw).toLowerCase();
      prevCatAgg.set(k, (prevCatAgg.get(k) ?? 0) + e.sec);
    }
    const appsByCat = new Map();
    for (const e of agg.values()) {
      const k = catName(e.cat).toLowerCase();
      (appsByCat.get(k) ?? appsByCat.set(k, []).get(k)).push([e.name, e.sec]);
    }
    const catEntries = [...catAgg.values()]
      .filter(c => c.sec >= MIN_LOGGED_SEC)
      .sort((a, b) => b.sec - a.sec)
      .map(c => {
        const prevSec = prevCatAgg.get(c.name.toLowerCase());
        const pct = p.noPrev ? sharePctOf(c.sec)
          : prevSec > 0 ? Math.round(100 * c.sec / prevSec) + "%" : "No Trend";
        const tops = (appsByCat.get(c.name.toLowerCase()) ?? [])
          .sort((x, y) => y[1] - x[1]).slice(0, 5)
          .map(([n, s]) => `   ${hrs(s)}h  ${n}`).join("\n");
        return [c.name, c.sec, c.prod,
          `${NAMES[c.prod]}, ${hrs(c.sec)}h` +
          (p.noPrev ? `\n${pct} Of All Your Logged Time`
            : prevSec > 0 ? `\n${pct} Of ${p.prevLabel} (${hrs(prevSec)}h)`
                          : `\nNothing Logged In ${p.prevLabel} (No Trend)`) +
          (tops ? "\n" + tops : ""), pct];
      });
    // types: one bar per productivity level (Very Productive .. Very
    // Distracting) in the level's own colour, sorted by hours like the lists
    const typeEntries = LEVELS
      .map(l => {
        const sec = curA.lv[l], prevSec = prevA.lv[l];
        const pct = p.noPrev ? sharePctOf(sec)
          : prevSec > 0 ? Math.round(100 * sec / prevSec) + "%" : "No Trend";
        const tops = [...(curA.apps[l] ?? [])].sort((x, y) => y[1] - x[1]).slice(0, 5)
          .map(([n, s]) => `   ${hrs(s)}h  ${n}`).join("\n");
        return [NAMES[l], sec, l,
          `${hrs(sec)}h ${NAMES[l]}` +
          (p.noPrev ? `\n${pct} Of All Your Logged Time`
            : prevSec > 0 ? `\n${pct} Of ${p.prevLabel} (${hrs(prevSec)}h)`
                          : `\nNothing Logged In ${p.prevLabel} (No Trend)`) +
          (tops ? "\n" + tops : ""), pct,
          { kind: "lvl", key: l, period: p.label }];
      })
      .sort((a, b) => b[1] - a[1]);
    // the Types tab appends a COMBINED section under the five level bars:
    // Productive (VP+P) vs Distracting (Neutral+D+VD), drawn as STACKED
    // segment bars — the same combined colouring as the summary rows and
    // the pulse card's delta bars
    const renderTypesTab = () => {
      renderBarList("periodApps", typeEntries);
      const combos = [
        ["Productive",  ["2", "1"],        "Very Productive + Productive"],
        ["Distracting", ["0", "-1", "-2"], "Neutral + Distracting + Very Distracting"],
      ];
      const sum = (A, ls) => ls.reduce((s, l) => s + A.lv[l], 0);
      const maxC = Math.max(1, ...combos.map(([, ls]) => sum(curA, ls)));
      const html = combos.map(([label, ls, names]) => {
        const sec = sum(curA, ls), prevSec = sum(prevA, ls);
        const pct = p.noPrev ? (sharePctOf(sec) ?? "")
          : prevSec > 0 ? Math.round(100 * sec / prevSec) + "%" : "No Trend";
        const segs = ls.map(l =>
          `<div class="seg" style="flex:${curA.lv[l]} 1 0;background:${COLORS[l]}"></div>`).join("");
        const m = new Map();
        for (const l of ls)
          for (const [n, s] of curA.apps[l] ?? []) m.set(n, (m.get(n) ?? 0) + s);
        const tops = [...m].sort((x, y) => y[1] - x[1]).slice(0, 5)
          .map(([n, s]) => `   ${hrs(s)}h  ${n}`).join("\n");
        return `<div class="cat-row"
            data-tip-title="${esc(`${label}: ${hrs(sec)}h`)}"
            data-tip-body="${esc(names + "\n" +
              (p.noPrev ? `${pct || "–"} Of All Your Logged Time`
                : prevSec > 0 ? `${pct} Of ${p.prevLabel} (${hrs(prevSec)}h)`
                              : `Nothing Logged In ${p.prevLabel} (No Trend)`) +
              (tops ? "\n" + tops : ""))}">
            <div class="cat-bar stackbar" style="width:${(100 * sec / maxC).toFixed(1)}%">${segs}</div>
            ${pct ? `<div class="cat-label pct"><span class="cat-time">${pct}</span></div>` : ""}
            <div class="cat-label"><span class="cat-time">${hrs(sec)}h</span><span class="cat-name">${esc(label)}</span></div>
          </div>`;
      }).join("");
      // the Combined block is ANCHORED to the card's bottom (margin-top:auto
      // in the flexed list — see .bar-list.types-flex); with the level bars
      // on top the empty middle stays clean
      const host = document.getElementById("periodApps");
      host.classList.add("types-flex");
      // a TYPES graph (each level's share over the period) sits between the
      // bars and the bottom-anchored Combined block — not on 24h cards
      if (!p.h24) host.insertAdjacentHTML("beforeend",
        `<div class="types-graph"><canvas id="periodTrendCanvas"></canvas></div>`);
      host.insertAdjacentHTML("beforeend",
        `<div class="types-combined"><div class="app-sec">Combined</div>${html}</div>`);
      if (!p.h24) periodTabChart = periodGraph("periodTrendCanvas", "types");
    };
    // ---- AVERAGES tab (v81, Total page only): mean logged hours per
    // calendar month (across every year), per weekday, per time of day
    // (Night/Morning/Afternoon/Evening — from the archive's per-day
    // day_parts, filled by the v81 fetch script), plus each category's and
    // type's average per day-with-data. ----
    let avgCache = null;
    const avgMaps = () => avgCache ??= (() => {
      const monTot = new Map(), ymSeen = new Set();
      const wdTot = Array(7).fill(0), wdCnt = Array(7).fill(0);
      const catTot = new Map(), lvTot = emptyLevels();
      let active = 0;
      for (const [d, dayRows] of Object.entries(arch?.days ?? {})) {
        let dTot = 0;
        for (const [sec, , cat, prod] of dayRows) {
          dTot += sec;
          const cn = catName(cat), k = cn.toLowerCase();
          const c = catTot.get(k) ?? { name: cn, sec: 0, top: 0, prod: String(prod) };
          c.sec += sec;
          if (sec > c.top) { c.top = sec; c.prod = String(prod); }
          catTot.set(k, c);
          if (LEVELS.includes(String(prod))) lvTot[String(prod)] += sec;
        }
        if (!dTot) continue;
        active++;
        const m = +d.slice(5, 7);
        monTot.set(m, (monTot.get(m) ?? 0) + dTot);
        ymSeen.add(d.slice(0, 7));
        const wd = new Date(d + "T00:00:00").getDay();
        wdTot[wd] += dTot; wdCnt[wd]++;
      }
      const ymCnt = new Map();   // month-of-year -> how many YYYY-MM instances
      for (const ym of ymSeen) {
        const m = +ym.slice(5, 7);
        ymCnt.set(m, (ymCnt.get(m) ?? 0) + 1);
      }
      const parts = [0, 0, 0, 0];   // night, morning, afternoon, evening
      let partDays = 0;
      for (const arr of Object.values(arch?.day_parts ?? {})) {
        if (!Array.isArray(arr) || !arr.some(s => s)) continue;
        partDays++;
        arr.forEach((s, i) => parts[i] += s || 0);
      }
      return { monTot, ymCnt, wdTot, wdCnt, catTot, lvTot, active, parts, partDays };
    })();
    const renderAveragesTab = () => {
      const A = avgMaps();
      const host = document.getElementById("periodApps");
      if (!A.active) {
        host.innerHTML = '<div style="color:var(--text-dim);font-size:0.8rem">No Data</div>';
        return;
      }
      const secHtml = (title, id) =>
        `<div class="app-sec">${title}</div><div class="avg-list" id="${id}"></div>`;
      host.innerHTML =
        secHtml("Average Logged Hours Per Month", "avgMonths") +
        secHtml("Average Logged Hours Per Weekday", "avgDays") +
        secHtml("Average Logged Hours Per Time Of Day", "avgParts") +
        secHtml("Average Hours Per Day — Categories", "avgCats") +
        secHtml("Average Hours Per Day — Types", "avgTypes");
      const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
      // calendar months Jan..Dec: mean of that month's TOTALS across years
      const monRows = [];
      for (let m = 1; m <= 12; m++) {
        const n = A.ymCnt.get(m);
        if (!n) continue;
        const name = cap(new Date(2000, m - 1, 1)
          .toLocaleDateString(undefined, { month: "long" }));
        monRows.push([name, A.monTot.get(m) / n, "0",
          `Average Of ${n} ${name}${n > 1 ? "s" : ""} With Data\n` +
          `${hrs(A.monTot.get(m))}h Total`]);
      }
      renderBarList("avgMonths", monRows);
      // weekdays Monday..Sunday: mean per day WITH data
      const wdRows = [];
      for (const wd of [1, 2, 3, 4, 5, 6, 0]) {
        if (!A.wdCnt[wd]) continue;
        const name = cap(new Date(2001, 0, wd === 0 ? 7 : wd)   // 2001-01-01 = Monday
          .toLocaleDateString(undefined, { weekday: "long" }));
        wdRows.push([name, A.wdTot[wd] / A.wdCnt[wd], "0",
          `Across ${A.wdCnt[wd]} ${name}s With Data\n${hrs(A.wdTot[wd])}h Total`]);
      }
      renderBarList("avgDays", wdRows);
      // time of day, from the archive's hourly-derived day_parts
      if (A.partDays) {
        const PARTS = [["Night", "0:00 – 6:00"], ["Morning", "6:00 – 12:00"],
                       ["Afternoon", "12:00 – 18:00"], ["Evening", "18:00 – 24:00"]];
        renderBarList("avgParts", PARTS.map(([nm, span], i) =>
          [nm, A.parts[i] / A.partDays, "0",
           `${span}\nAverage Across ${A.partDays} Days With Hourly Data\n` +
           `${hrs(A.parts[i])}h Total`]));
      } else {
        document.getElementById("avgParts").innerHTML =
          `<div style="color:var(--text-dim);font-size:0.8rem">No Hourly History Yet — ` +
          `Rebuild The Archive With The Updated Fetch Script To Fill ` +
          `Night / Morning / Afternoon / Evening</div>`;
      }
      // every category's and type's average per day-with-data; rows open
      // that entity's own Total page
      renderBarList("avgCats", [...A.catTot.values()]
        .filter(c => c.sec >= MIN_LOGGED_SEC)
        .sort((a, b) => b.sec - a.sec)
        .map(c => [c.name, c.sec / A.active, c.prod,
          `${hrs(c.sec)}h Total Across ${A.active} Days With Data`,
          undefined, { kind: "cat", key: c.name, period: "Total" }]));
      renderBarList("avgTypes", LEVELS
        .map(l => [NAMES[l], A.lvTot[l] / A.active, l,
          `${hrs(A.lvTot[l])}h Total Across ${A.active} Days With Data`,
          undefined, { kind: "lvl", key: l, period: "Total" }])
        .sort((a, b) => b[1] - a[1]));
    };
    // ---- graphs for THIS period: x = the DAYS of the period (or its
    // MONTHS when the period spans more than ~2 months, e.g. year cards).
    // Used by the Pulse tab (pulse + type shares), the Trends tab (top-10
    // categories of the period) and the Types tab's embedded graph. ----
    let pkmCache = null;
    const periodKeysMaps = () => pkmCache ??= (() => {
      const span = (new Date(p.range[1] + "T00:00:00")
                  - new Date(p.range[0] + "T00:00:00")) / 864e5;
      // v81: half-year buckets beyond ~3 years (the Total pages' x-axis)
      const half = span > 1100, monthly = !half && span > 62;
      const lvM = new Map(), catM = new Map(), totM = new Map();
      for (const d = new Date(p.range[0] + "T00:00:00"); ; d.setDate(d.getDate() + 1)) {
        const iso = isoOf(d.getTime());
        if (iso > p.range[1]) break;
        const key = half ? iso.slice(0, 4) + (iso.slice(5, 7) < "07" ? "-01" : "-07")
          : monthly ? iso.slice(0, 7) : iso;
        const l2 = lvM.get(key) ?? lvM.set(key, emptyLevels()).get(key);
        const cm = catM.get(key) ?? catM.set(key, new Map()).get(key);
        for (const [sec, , cat, prod] of rowsOf(iso)) {
          if (LEVELS.includes(String(prod))) l2[String(prod)] += sec;
          const n = catName(cat);
          cm.set(n, (cm.get(n) ?? 0) + sec);
          totM.set(n, (totM.get(n) ?? 0) + sec);
        }
      }
      const keys = [...lvM.keys()];
      const labels = [], tips = [];
      const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
      keys.forEach((k, i) => {
        if (half) {
          const d = new Date(k + "-01T00:00:00");
          const h = d.getMonth() < 6 ? 1 : 2;
          labels.push(`H${h} ${String(d.getFullYear()).slice(2)}`);
          tips.push(`H${h} ${d.getFullYear()} (${h === 1 ? "January – June" : "July – December"})`);
        } else if (monthly) {
          const d = new Date(k + "-01T00:00:00");
          const short = cap(d.toLocaleDateString(undefined, { month: "short" }));
          labels.push((i === 0 || d.getMonth() === 0)
            ? `${short} ${String(d.getFullYear()).slice(2)}` : short);
          tips.push(`${cap(d.toLocaleDateString(undefined, { month: "long" }))} ${d.getFullYear()}`);
        } else {
          const d = new Date(k + "T00:00:00");
          labels.push((i === 0 || d.getDate() === 1)
            ? `${d.getDate()}.${d.getMonth() + 1}` : String(d.getDate()));
          tips.push(d.toLocaleDateString(undefined,
            { weekday: "short", day: "numeric", month: "short", year: "numeric" }));
        }
      });
      const topCats = [...totM.entries()].sort((a, b) => b[1] - a[1])
        .slice(0, 10).map(([n]) => n);
      return { keys, labels, tips, lvM, catM, topCats };
    })();
    const periodGraph = (canvasId, what) => {
      const K = periodKeysMaps();
      return trendChartCore(canvasId, { keys: K.keys, labels: K.labels,
        tips: K.tips, lvMap: K.lvM, catMap: K.catM, topCats: K.topCats,
        what, pointR: 2 });
    };
    const renderPeriodGraphTab = what => {
      const host = document.getElementById("periodApps");
      host.innerHTML = `<div class="ptab-chart"><canvas id="periodTrendCanvas"></canvas></div>`;
      periodTabChart = periodGraph("periodTrendCanvas", what);
    };
    // the Apps and Categories tabs carry the bottom graph (v77); the other
    // tabs hide it again — its canvas persists, only the chart is rebuilt
    const showBot = what => {
      const bot = document.getElementById("periodBot");
      if (!bot) return;
      bot.hidden = false;
      periodTabChart = botGraph(what);
    };
    const TABS = { apps: () => { renderBarList("periodApps", appMeta(appEntries));
                                 showBot("apps"); },
                   cats: () => { renderBarList("periodApps", catMeta(catEntries));
                                 showBot("cats"); },
                   types: renderTypesTab,
                   pulse: () => renderPeriodGraphTab("pulse"),
                   trends: () => renderPeriodGraphTab("cats"),
                   averages: renderAveragesTab };
    const tabRow = document.getElementById("periodTabs");
    tabRow.addEventListener("click", e => {
      const t = e.target.closest(".tab");
      if (!t) return;
      e.stopPropagation();   // a tab click must NOT close the card
      tabRow.querySelectorAll(".tab").forEach(x =>
        x.classList.toggle("active", x === t));
      periodTabChart?.destroy(); periodTabChart = null;
      const bot = document.getElementById("periodBot");
      if (bot) bot.hidden = true;
      document.getElementById("periodApps").classList.remove("types-flex");
      TABS[t.dataset.tab]();
      document.getElementById("periodApps").scrollTop = 0;
    });
    TABS.apps();
  }

  // ---- shared trend-chart machinery: the Trends card, the period cards'
  //      Weekly tabs and the 14-days card's click-cycle all build their
  //      graphs from here. Periods: w = past 4 weeks in 48-hour (2-day)
  //      steps (14 buckets), m = past 12 calendar months, y = every year
  //      from the first logged one to now — the axes
  //      are FIXED; periods below the 0.5 h floor become gaps in the lines.
  //      Pulse charts: Pulse (real 0-100) + Productive/Neutral/Distracting
  //      as % of the period's logged time. Category charts: top 10 all-time
  //      categories as % of the period's logged time. ----
  let trendDataPromise = null;
  const trendData = () => trendDataPromise ??= loadArchive().then(arch => {
    const monthKeys = [], weekKeys = [], yearKeys = [];
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      monthKeys.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
    }
    // The "Weekly" trends view is a rolling 4-week window drawn in 48-hour
    // steps: 14 buckets, each combining 2 calendar days (newest bucket =
    // yesterday + today, oldest = 27/26 days ago). wKeyOf maps every one of
    // those 28 days to its bucket's start ISO; days outside the window get
    // no "w" key and are skipped below.
    const wKeyOf = new Map();
    for (let j = 13; j >= 0; j--) {          // oldest bucket first, like the old week keys
      const older = daysAgo(2 * j + 1), newer = daysAgo(2 * j);
      const startIso = isoOf(older.getTime());
      weekKeys.push(startIso);
      wKeyOf.set(startIso, startIso);
      wKeyOf.set(isoOf(newer.getTime()), startIso);
    }
    const lv = { w: new Map(), m: new Map(), y: new Map() };
    const cat = { w: new Map(), m: new Map(), y: new Map() };
    const app = { w: new Map(), m: new Map(), y: new Map() };
    const catTot = new Map(), appTot = new Map();
    const keysOf = day => ({
      w: wKeyOf.get(day),          // undefined when the day is outside the 4-week window
      m: day.slice(0, 7), y: day.slice(0, 4) });
    const addLv = (day, l, sec) => {
      if (!LEVELS.includes(String(l))) return;
      const ks = keysOf(day);
      for (const p of ["w", "m", "y"]) {
        if (ks[p] == null) continue;   // day not in this period's window
        const m = lv[p].get(ks[p]) ?? lv[p].set(ks[p], emptyLevels()).get(ks[p]);
        m[String(l)] += sec;
      }
    };
    const addCat = (day, c, sec) => {
      const name = catName(c);
      const ks = keysOf(day);
      for (const p of ["w", "m", "y"]) {
        if (ks[p] == null) continue;
        const m = cat[p].get(ks[p]) ?? cat[p].set(ks[p], new Map()).get(ks[p]);
        m.set(name, (m.get(name) ?? 0) + sec);
      }
      catTot.set(name, (catTot.get(name) ?? 0) + sec);
    };
    const addApp = (day, a, sec) => {
      const name = appName(a);
      const ks = keysOf(day);
      for (const p of ["w", "m", "y"]) {
        if (ks[p] == null) continue;
        const m = app[p].get(ks[p]) ?? app[p].set(ks[p], new Map()).get(ks[p]);
        m.set(name, (m.get(name) ?? 0) + sec);
      }
      appTot.set(name, (appTot.get(name) ?? 0) + sec);
    };
    if (arch?.days || arch?.day_levels) {
      for (const [day, rows] of Object.entries(arch.days ?? {}))
        for (const [sec, act, c, prod] of rows) {
          addLv(day, prod, sec); addCat(day, c, sec); addApp(day, act, sec);
        }
      for (const [day, l2] of Object.entries(arch.day_levels ?? {}))
        for (const [l, sec] of Object.entries(l2)) addLv(day, l, sec);
    } else {
      for (const [date, sec, , prod] of data.rows_daily ?? [])
        addLv(date.slice(0, 10), prod, sec);
    }
    {
      const logged = [...lv.y.keys()].sort();
      const first = logged.length ? +logged[0] : now.getFullYear();
      for (let y = first; y <= now.getFullYear(); y++) yearKeys.push(String(y));
    }
    const topCats = [...catTot.entries()].sort((a, b) => b[1] - a[1])
      .slice(0, 10).map(([n]) => n);
    const topApps = [...appTot.entries()].sort((a, b) => b[1] - a[1])
      .slice(0, 10).map(([n]) => n);
    return { arch, keys: { w: weekKeys, m: monthKeys, y: yearKeys },
             lv, cat, app, topCats, topApps };
  });
  const CAT_COLORS = ["#5b9bd5", "#d64541", "#e8913a", "#8ac06a", "#b07fd6",
                      "#4fc1bf", "#d6719f", "#c9c95e", "#8c96a3", "#2563ae"];
  // core renderer: draws ONE trend line chart from prepared per-key maps.
  // cfg: keys, labels, tips (base text — the core appends "— Xh Logged" /
  // "— No Data"), lvMap (levels per key), what = "pulse" | "cats",
  // catMap + topCats for "cats", legendScale (legend font = base × scale;
  // the small 14-days card passes 1), pointR.
  function trendChartCore(canvasId, cfg) {
    const { keys, labels, lvMap, catMap, topCats, what,
            legendScale = 2, pointR = 3, topN = 10 } = cfg;
    const totOf = l2 => l2 ? LEVELS.reduce((a, l) => a + l2[l], 0) : 0;
    const tots = keys.map(k => {
      const t = totOf(lvMap.get(k));
      return t >= MIN_LOGGED_SEC ? t : null;    // null = "no data" gap
    });
    const tips = keys.map((k, i) => tots[i] === null
      ? `${cfg.tips[i]} — No Data` : `${cfg.tips[i]} — ${hrs(tots[i])}h Logged`);
    const px = Math.round(
      parseFloat(getComputedStyle(document.documentElement).fontSize) * 0.8);
    const ds = (label, dat, color, extra = {}) => ({
      label, data: dat, borderColor: color, backgroundColor: color,
      pointRadius: pointR, pointHoverRadius: 5,
      borderWidth: 2, tension: 0.3, ...extra });
    let datasets, labelCb, tipFilter;
    if (what === "pulse") {
      const val = f => keys.map((k, i) => tots[i] === null ? null
        : +(100 * f(lvMap.get(k)) / tots[i]).toFixed(1));
      const hours = keys.map((k, i) => tots[i] === null ? null : {
        prod: prodOf(lvMap.get(k)), neut: lvMap.get(k)["0"],
        dist: distOf(lvMap.get(k)) });
      datasets = [
        // pulse in white so it reads as THE metric next to the level lines
        ds("Pulse", keys.map((k, i) => tots[i] === null ? null
             : pulseOf(lvMap.get(k))), "#e3e3e3", { borderWidth: 3 }),
        ds("Productive", val(prodOf), COLORS["1"]),
        ds("Neutral", val(l2 => l2["0"]), COLORS["0"]),
        ds("Distracting", val(distOf), COLORS["-2"]),
      ];
      labelCb = c => {
        const h = hours[c.dataIndex];
        if (!h) return "";
        return c.dataset.label === "Pulse" ? ` Pulse ${c.raw}`
          : c.dataset.label === "Productive"
            ? ` ${hrs(h.prod)}h Productive (${c.raw}%)`
          : c.dataset.label === "Neutral"
            ? ` ${hrs(h.neut)}h Neutral (${c.raw}%)`
            : ` ${hrs(h.dist)}h Distracting (${c.raw}%)`;
      };
    } else if (what === "types") {
      // one line per productivity TYPE — each level's share of the period
      const val = l => keys.map((k, i) => tots[i] === null ? null
        : +(100 * lvMap.get(k)[l] / tots[i]).toFixed(1));
      const hoursOf = l => keys.map((k, i) => tots[i] === null ? null
        : lvMap.get(k)[l]);
      datasets = LEVELS.map(l =>
        ({ ...ds(NAMES[l], val(l), COLORS[l]), secs: hoursOf(l) }));
      labelCb = c => ` ${hrs(c.dataset.secs[c.dataIndex] ?? 0)}h ${c.dataset.label} (${c.raw}%)`;
      tipFilter = item => item.raw !== null && item.raw > 0;
    } else {
      // the tooltip skips categories at 0% so it stays readable
      datasets = (topCats ?? []).slice(0, topN).map((name, i) => {
        const secs = keys.map((k, j) => tots[j] === null ? null
          : (catMap.get(k)?.get(name) ?? 0));
        return { ...ds(name, secs.map((s, j) => s === null ? null
            : +(100 * s / tots[j]).toFixed(1)),
            CAT_COLORS[i % CAT_COLORS.length],
            { pointRadius: Math.min(pointR, 2), pointHoverRadius: 4 }), secs };
      });
      labelCb = c => ` ${hrs(c.dataset.secs[c.dataIndex] ?? 0)}h ${c.dataset.label} (${c.raw}%)`;
      tipFilter = item => item.raw !== null && item.raw > 0;
    }
    // the y axis scales to the DATA: highest value rounded up to the next
    // 10% step (58 -> 60) so the tallest line always uses the full height
    const top = Math.max(0, ...datasets.flatMap(d => d.data.filter(v => v !== null)));
    const yMax = Math.max(10, Math.min(100, Math.ceil(top / 10) * 10));
    return new Chart(document.getElementById(canvasId), {
      type: "line",
      data: { labels, datasets },
      options: { responsive: true, maintainAspectRatio: false, ...NO_ANIM,
        // hovering ANYWHERE over a period shows that period's values
        interaction: { mode: "index", intersect: false },
        plugins: {
          // line names UNDER the graph (user request — all graphs)
          legend: { display: true, position: "bottom",
            labels: { color: "#909090",
              boxWidth: 7 * legendScale, boxHeight: 7 * legendScale,
              font: { size: px * legendScale } } },
          tooltip: { ...HTML_TOOLTIP, filter: tipFilter ?? (() => true),
            callbacks: { title: c => tips[c[0].dataIndex] ?? "", label: labelCb } } },
        scales: {
          x: { grid: { display: false },
               ticks: { color: "#909090", maxRotation: 0, font: { size: px } } },
          // y-axis % at 2x base font, same grey as the rest of the page
          y: { min: 0, max: yMax, position: "right",
               grid: { color: "#333333" },
               ticks: { color: "#909090", font: { size: px * 2 },
                        callback: v => v + "%" } },
        } },
    });
  }
  // builds ONE trend chart onto canvasId and returns the Chart.
  // kind = "<w|m|y>-<pulse|cats>", e.g. "w-cats" = weekly top categories.
  async function buildTrendChart(canvasId, kind, opts = {}) {
    const T = await trendData();
    const [per, what] = kind.split("-");
    const keys = T.keys[per];
    const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
    const keyLabel = (k, first) => {
      if (per === "y") return { lbl: k, tip: k };
      if (per === "m") {
        const d = new Date(k + "-01T00:00:00");
        const short = cap(d.toLocaleDateString(undefined, { month: "short" }));
        return { lbl: (first || d.getMonth() === 0)
            ? `${short} ${String(d.getFullYear()).slice(2)}` : short,
          tip: `${cap(d.toLocaleDateString(undefined, { month: "long" }))} ${d.getFullYear()}` };
      }
      // "w" is a 2-day (48 h) bucket now: label the day range, e.g. "1–2 Jul"
      const d = new Date(k + "T00:00:00");
      const end = new Date(d); end.setDate(d.getDate() + 1);   // second day of the bucket
      const moS = cap(d.toLocaleDateString(undefined, { month: "short" }));
      const endMoS = cap(end.toLocaleDateString(undefined, { month: "short" }));
      const lbl = d.getMonth() === end.getMonth()
        ? `${d.getDate()}–${end.getDate()} ${moS}`
        : `${d.getDate()} ${moS}–${end.getDate()} ${endMoS}`;
      return { lbl,
               tip: `${moS} ${d.getDate()} – ${endMoS} ${end.getDate()} ${end.getFullYear()} (48 h)` };
    };
    const labels = [], tips = [];
    keys.forEach((k, i) => {
      const { lbl, tip } = keyLabel(k, i === 0);
      labels.push(lbl); tips.push(tip);
    });
    return trendChartCore(canvasId, {
      keys, labels, tips, lvMap: T.lv[per],
      catMap: what === "apps" ? T.app[per] : T.cat[per],
      topCats: what === "apps" ? T.topApps : T.topCats,
      what, pointR: 3, ...opts });
  }

  // ---- the TRENDS detail card: grouped tabs (Weekly / Monthly / Yearly,
  //      each with a Pulse and a Categories tab) picking ONE graph that
  //      fills the whole card ----
  async function showTrendsDetail(initial) {
    destroyDetailCharts();   // the card may currently hold another view's charts
    setSwitch(null);         // the period switcher is for entity/period pages only
    const T = await trendData();
    document.getElementById("appDetailTitle").textContent =
      "Trends — Pulse Over Time";
    const fetchedAt = T.arch?.updated_at ?? data.generated_at;
    document.getElementById("appDetailFresh").textContent = fetchedAt
      ? `Data Up To ${new Date(fetchedAt).toLocaleString()}` : "No Data";
    document.getElementById("appDetailRows").innerHTML = `
      <div id="trendTabs">
        <div class="tab-row">
          <div class="tab-group">Weekly</div>
          <div class="app-sec tab" data-tab="w-pulse">Pulse</div>
          <div class="app-sec tab" data-tab="w-cats">Categories</div>
          <div class="app-sec tab" data-tab="w-apps">Apps</div>
          <div class="app-sec tab" data-tab="w-combined">Combined</div>
        </div>
        <div class="tab-row">
          <div class="tab-group">Monthly</div>
          <div class="app-sec tab" data-tab="m-pulse">Pulse</div>
          <div class="app-sec tab" data-tab="m-cats">Categories</div>
          <div class="app-sec tab" data-tab="m-apps">Apps</div>
          <div class="app-sec tab" data-tab="m-combined">Trend Home</div>
        </div>
        <div class="tab-row">
          <div class="tab-group">Yearly</div>
          <div class="app-sec tab" data-tab="y-pulse">Pulse</div>
          <div class="app-sec tab" data-tab="y-cats">Categories</div>
          <div class="app-sec tab" data-tab="y-apps">Apps</div>
          <div class="app-sec tab" data-tab="y-combined">Combined</div>
        </div>
      </div>
      <div class="trend-body" id="trendBody"></div>`;
    detailCard.hidden = false;
    sizeDetailCard();       // the charts need their final box BEFORE creation
    detailRefit = null;
    const body = document.getElementById("trendBody");
    const tabRow = document.getElementById("trendTabs");
    // COMBINED view: pulse + categories + apps for one period group,
    // stacked under the tab rows. Monthly Combined is the "Trend Home"
    // default page.
    const PER_NAMES = { w: "Weekly", m: "Monthly", y: "Yearly" };
    const showCombined = async per => {
      trendCharts.forEach(c => c.destroy());
      trendCharts = [];
      const n = PER_NAMES[per];
      body.innerHTML = `
        <div class="trend-sec"><div class="app-sec">${n} Pulse</div>
          <div class="trend-chart"><canvas id="trendC1"></canvas></div></div>
        <div class="trend-sec"><div class="app-sec">${n} Categories</div>
          <div class="trend-chart"><canvas id="trendC2"></canvas></div></div>
        <div class="trend-sec"><div class="app-sec">${n} Apps</div>
          <div class="trend-chart"><canvas id="trendC3"></canvas></div></div>`;
      trendCharts = [
        await buildTrendChart("trendC1", `${per}-pulse`, { legendScale: 1 }),
        await buildTrendChart("trendC2", `${per}-cats`, { legendScale: 1 }),
        await buildTrendChart("trendC3", `${per}-apps`, { legendScale: 1 }),
      ];
    };
    const showTab = async key => {
      trendCharts.forEach(c => c.destroy());
      trendCharts = [];
      body.innerHTML = `<div class="trend-chart fill"><canvas id="trendCanvas"></canvas></div>`;
      trendCharts = [await buildTrendChart("trendCanvas", key)];
    };
    // activate(key) marks the tab and shows its view — "<per>-combined"
    // keys render the stacked three-graph page
    const activate = key => {
      tabRow.querySelectorAll(".tab").forEach(x =>
        x.classList.toggle("active", x.dataset.tab === key));
      if (key.endsWith("-combined")) showCombined(key[0]);
      else showTab(key);
    };
    tabRow.addEventListener("click", e => {
      const t = e.target.closest(".tab");
      if (!t) return;
      e.stopPropagation();   // a tab click must NOT close the card
      activate(t.dataset.tab);
    });
    activate(initial ?? "m-combined");
  }

  // ---- EVERY trend / %-vs-previous-period number on the page is a BUTTON
  // that opens the Trends card: the % labels on list bars (.cat-label.pct),
  // the trend cells on the detail cards (.app-trend — except the "Since"
  // note), and the % lines under the pulse rings (.pulse-pct). Capture
  // phase, so the click never falls through to a card's RescueTime link or
  // the overlay-closing handlers. ----
  document.addEventListener("click", e => {
    const t = e.target.closest?.(".cat-label.pct, .app-trend, .pulse-pct");
    if (!t || t.classList.contains("app-since") || !t.textContent.trim()) return;
    // inside a dashboard card with its OWN Trends mapping (pulse thirds,
    // 24h/7d/30d cards) the card's handler decides the target view
    if (t.closest(".trend-zone")) return;
    e.stopPropagation();
    e.preventDefault();
    showTrendsDetail();
  }, true);

  // ---- every APP / CATEGORY / TYPE row in a bar list is a BUTTON that
  // opens that entity's detail page for the row's own period (v78) —
  // renderBarList marks them with data-nav-*. The % text at the row's
  // right edge keeps its trend-button behaviour, and the capture phase
  // beats the card-level click handlers (trend-zone cards, the detail
  // card's click-to-close). ----
  document.addEventListener("click", e => {
    if (e.target.closest?.(".cat-label.pct")) return;   // trend button wins
    const row = e.target.closest?.(".cat-row[data-nav-kind]");
    if (!row) return;
    e.stopPropagation();
    e.preventDefault();
    openEntity(row.dataset.navKind, row.dataset.navKey, row.dataset.navPeriod);
  }, true);

  // =========================================================================
  // Past 7/30-day top-apps + top-categories cards — merged in from
  // Weeks-Months.html so every overlay floats over ONE page.
  // =========================================================================
  {
    // the lists render MANY entries; CSS caps the cards at their old visual
    // height (8 app / 5 category rows) and the rest scrolls
    const APP_N = 40;
    const CAT_N = 15;
    // clicking a list card opens the Trends card on the matching tab
    // (weekly for the 7-day cards, monthly for the 30-day ones)
    const CARD_TABS = {
      appListWeek:  "w-apps",  appListMonth: "m-apps",
      catListWeek:  "w-cats",  catListMonth: "m-cats",
    };
    for (const [id, key] of Object.entries(CARD_TABS)) {
      const card = document.getElementById(id).closest(".card");
      card.classList.add("trend-zone");   // capture listener defers to the card
      card.addEventListener("click", e => {
        e.stopPropagation();
        showTrendsDetail(key);
      });
    }

    // Build an apps list and a categories list from one activity-row set.
    // tipExtra(nameKey) returns extra tooltip lines (per-day / per-week
    // breakdowns); prev = {apps, cats} maps of the PREVIOUS period for the
    // left-anchored %-vs-previous labels.
    function renderPeriod(rows, appElId, catElId, tipExtra, prev, perLabel) {
      const byName = new Map();   // merged by DISPLAY name (dictionary.json)
      for (const [, sec, , activity, cat, prod] of (rows ?? [])) {
        const name = appName(activity);
        const k = name.toLowerCase();
        const e = byName.get(k) ?? { name, sec: 0, top: 0, cat, prod: String(prod) };
        e.sec += sec;
        if (sec > e.top) { e.top = sec; e.cat = cat; e.prod = String(prod); }
        byName.set(k, e);
      }
      const apps = [...byName.values()]
        .sort((a, b) => b.sec - a.sec)
        // ALWAYS keep the top 8; the 0.5 h floor only cuts rows beyond them
        .filter((e, i) => i < 8 || e.sec >= MIN_LOGGED_SEC)
        .slice(0, APP_N)
        .map(e => {
          const extra = tipExtra ? tipExtra(e.name.toLowerCase()) : "";
          const prevSec = prev ? (prev.apps.get(e.name.toLowerCase()) ?? 0) : null;
          const pct = prevSec === null ? null
            : prevSec > 0 ? Math.round(100 * e.sec / prevSec) + "%" : "No Trend";
          return [e.name, e.sec, e.prod,
            `${catName(e.cat)} — ${NAMES[e.prod]}, ${hrs(e.sec)}h` +
            (pct === null ? "" : prevSec > 0
              ? `\n${pct} Of The Previous Period (${hrs(prevSec)}h)`
              : "\nNot Used In The Previous Period (No Trend)") +
            (extra ? "\n" + extra : ""), pct,
            { kind: "app", key: e.name, period: perLabel }];
        });
      renderBarList(appElId, apps);

      const wk = {}, wkApps = {};
      for (const [, sec, , activity, cat, prod] of (rows ?? [])) {
        ((wk[cat] ??= emptyLevels()))[String(prod)] += sec;
        (wkApps[cat] ??= []).push([activity, sec]);
      }
      const cats = Object.entries(wk)
        .map(([name, v]) => {
          const total = LEVELS.reduce((a, l) => a + v[l], 0);
          const dominant = LEVELS.reduce((best, l) => v[l] > v[best] ? l : best, "0");
          const catApps = new Map();
          for (const [a, s] of (wkApps[name] ?? [])) {
            const n = appName(a);
            catApps.set(n, (catApps.get(n) ?? 0) + s);
          }
          const topApps = [...catApps]
            .sort((a, b) => b[1] - a[1]).slice(0, 5)
            .map(([n, s]) => `${hrs(s)}h  ${n}`)
            .join("\n");
          const prevSec = prev ? (prev.cats.get(name) ?? 0) : null;
          const pct = prevSec === null ? null
            : prevSec > 0 ? Math.round(100 * total / prevSec) + "%" : "No Trend";
          return [catName(name), total, dominant,
            (pct === null ? "" : prevSec > 0
              ? `${pct} Of The Previous Period (${hrs(prevSec)}h)\n`
              : "Nothing Logged In The Previous Period (No Trend)\n") + topApps,
            pct, { kind: "cat", key: catName(name), period: perLabel }];
        })
        .sort((a, b) => b[1] - a[1])
        // ALWAYS keep the top 5; the 0.5 h floor only cuts rows beyond them
        .filter(([, total], i) => i < 5 || total >= MIN_LOGGED_SEC)
        .slice(0, CAT_N);
      renderBarList(catElId, cats);
    }

    // per-day breakdown for the 7-day app tooltips (hours per day, past 7
    // days incl. today, keyed by lowercased DISPLAY name)
    const day7 = new Map();
    for (let i = 0; i <= 6; i++) {
      const d = new Date(now); d.setDate(now.getDate() - i);
      for (const [, sec, , act] of (data.day_activities ?? {})[isoOf(d.getTime())] ?? []) {
        const k = appName(act).toLowerCase();
        const arr = day7.get(k) ?? day7.set(k, new Array(7).fill(0)).get(k);
        arr[i] += sec;
      }
    }
    const cap1 = s => s.charAt(0).toUpperCase() + s.slice(1);
    const dayLabel = i => {
      if (i === 0) return "Today";
      if (i === 1) return "Yesterday";
      const d = new Date(now); d.setDate(now.getDate() - i);
      return cap1(d.toLocaleDateString(undefined, { weekday: "long" }));
    };
    const tip7 = k => {
      const arr = day7.get(k);
      if (!arr) return "";
      return arr.map((s, i) => s ? `${dayLabel(i)} ${hrs(s)}h` : null)
        .filter(Boolean).join("\n");
    };
    // per-week breakdown for the 30-day app tooltips (hours per Mon-based
    // calendar week across the past 30 days incl. today)
    const wk30 = new Map();
    const curWs = weekStart(now).getTime();
    for (let i = 0; i <= 29; i++) {
      const d = new Date(now); d.setDate(now.getDate() - i);
      const weeksAgo = Math.round((curWs - weekStart(d).getTime()) / 6048e5);
      for (const [, sec, , act] of (data.day_activities ?? {})[isoOf(d.getTime())] ?? []) {
        const k = appName(act).toLowerCase();
        const m = wk30.get(k) ?? wk30.set(k, new Map()).get(k);
        m.set(weeksAgo, (m.get(weeksAgo) ?? 0) + sec);
      }
    }
    const wkLabel = n => n === 0 ? "Current Week" : n === 1 ? "Last Week"
      : `${n} Weeks Ago`;
    const tip30 = k => {
      const m = wk30.get(k);
      if (!m) return "";
      return [...m.entries()].sort((a, b) => a[0] - b[0])
        .map(([n, s]) => `${wkLabel(n)} ${hrs(s)}h`).join("\n");
    };

    // previous-period sums for the % labels (apps by display name,
    // categories by raw name)
    const mkPrev = () => {
      const p = { apps: new Map(), cats: new Map() };
      p.add = (sec, act, cat) => {
        const k = appName(act).toLowerCase();
        p.apps.set(k, (p.apps.get(k) ?? 0) + sec);
        p.cats.set(cat, (p.cats.get(cat) ?? 0) + sec);
      };
      return p;
    };
    // days 7-13 back = the 7 days before the past-7-days window
    const prev7 = mkPrev();
    for (let i = 7; i <= 13; i++) {
      const d = new Date(now); d.setDate(now.getDate() - i);
      for (const [, sec, , act, cat] of (data.day_activities ?? {})[isoOf(d.getTime())] ?? [])
        prev7.add(sec, act, cat);
    }
    // days 30-59 back come from archive.json (already loading lazily for the
    // search) — render both rows once it lands; no % on the 30-day cards if
    // the archive is missing
    loadArchive().then(arch => {
      let prev30 = null;
      if (arch?.days) {
        prev30 = mkPrev();
        const lo = new Date(now); lo.setDate(now.getDate() - 59);
        const hi = new Date(now); hi.setDate(now.getDate() - 30);
        const loIso = isoOf(lo.getTime()), hiIso = isoOf(hi.getTime());
        for (const [day, rows] of Object.entries(arch.days))
          if (day >= loIso && day <= hiIso)
            for (const [sec, act, cat] of rows) prev30.add(sec, act, cat);
      }
      // Past 7 days incl. today (rolling, like the pulse's week ring) —
      // curWkRows is the same merged per-day list the week donut uses
      const week7Rows = curWkRows.length ? curWkRows : data.week_activities;
      renderPeriod(week7Rows, "appListWeek", "catListWeek", tip7, prev7,
                   "Current 7 Days");
      // Past 30 days incl. today (rolling, like the pulse's month ring)
      renderPeriod(data.month_activities, "appListMonth", "catListMonth",
                   tip30, prev30, "Current 30 Days");
      // total logged hours per period, anchored right on each title row
      const totOf = rows => (rows ?? []).reduce((s, r) => s + r[1], 0);
      const setTot = (id, sec, label) => {
        const el = document.getElementById(id);
        el.textContent = `${hrs(sec)}h Logged`;
        el.dataset.tipTitle = `${hrs(sec)}h Logged ${label}`;
        el.dataset.tipBody = "Rolling Window Incl. Today";
      };
      const tot7 = totOf(week7Rows), tot30 = totOf(data.month_activities);
      setTot("totWeekApps",  tot7,  "In The Current 7 Days");
      setTot("totMonthApps", tot30, "In The Current 30 Days");
      // ...and the daily average in the middle of the apps cards' title rows
      const setAvg = (id, sec, days, label) => {
        const el = document.getElementById(id);
        el.textContent = `${hrs(sec / days)}h Avg per day`;
        el.dataset.tipTitle = `${hrs(sec / days)}h Logged Per Day On Average`;
        el.dataset.tipBody = label;
      };
      setAvg("avgWeekApps",  tot7,  7,  "Current 7 Days Incl. Today");
      setAvg("avgMonthApps", tot30, 30, "Current 30 Days Incl. Today");
      // category cards carry the per-LEVEL split instead (avg/total already
      // sit on the apps cards above them), anchored left on the title row
      const setMix = (id, rows, label) => {
        const lv = emptyLevels();
        for (const [, sec, , , , prod] of rows ?? []) lv[String(prod)] += sec;
        const prod = lv["2"] + lv["1"], neut = lv["0"], dist = lv["-1"] + lv["-2"];
        const el = document.getElementById(id);
        el.textContent = `${hrs(prod)}h Productive - ${hrs(neut)}h Neutral - ${hrs(dist)}h Distracting`;
        el.dataset.tipTitle = `${label}: ${hrs(prod + neut + dist)}h Logged`;
        el.dataset.tipBody =
          `Very Productive ${hrs(lv["2"])}h + Productive ${hrs(lv["1"])}h\n` +
          `Neutral ${hrs(neut)}h\n` +
          `Distracting ${hrs(lv["-1"])}h + Very Distracting ${hrs(lv["-2"])}h`;
      };
      setMix("mixWeekCats", week7Rows, "Current 7 Days");
      setMix("mixMonthCats", data.month_activities, "Current 30 Days");
    });
  }
});

// Two bar rows under each pulse — Productive and Distracting hours — in the
// SAME mirrored look as every other bar row: the bar anchors RIGHT and grows
// leftwards underneath the text, hours in "xh" format at the LEFT, and the
// %-vs-previous label at the RIGHT edge.
// Bars are STACKED by level (same palette as the rings / 14-day chart) and
// scaled like the list cards: the column's LARGER of the two bars = 100%.
// prevLv (optional): the PREVIOUS period's level totals — every bar shows
// its % vs that period (past 24h vs the 24h before, past 7 days vs
// the 7 days before, past 30 days vs the 30 days before).
// refs (optional): per-row width references — {prod, down} in hours. When
// given, 100% of a bar's WIDTH = that reference (the TODAY column uses the
// 7-day DAILY AVERAGE); if either row exceeds it, widths fall back to the
// standard form (larger of the two bars = 100%, like the list cards).
function makeDeltas(elId, lv, acts, appName, prevLv, refs) {
  const el = document.getElementById(elId);
  const totalH = hrs(LEVELS.reduce((a, l) => a + lv[l], 0));
  const prodH  = hrs(prodOf(lv));
  const downH  = hrs(distOf(lv) + lv["0"]);
  if (!totalH) {   // keep the two rows' height so the columns stay aligned
    el.innerHTML = `<div class="cat-row"></div><div class="cat-row"></div>`;
    return;
  }
  const maxH = Math.max(prodH, downH) || 1;
  const prevProdH = prevLv ? hrs(prodOf(prevLv)) : null;
  const prevDownH = prevLv ? hrs(distOf(prevLv) + prevLv["0"]) : null;
  // previous period had 0h -> no meaningful % — the label says "No Trend";
  // no previous data at all -> no label
  const vsLabel = (cur, prev) => prev === null ? null
    : prev > 0 ? Math.round(100 * cur / prev) + "%"
    : cur > 0 ? "No Trend" : null;
  const prodVs = vsLabel(prodH, prevProdH), downVs = vsLabel(downH, prevDownH);
  // width scale (today only): 7-day daily average, with standard fallback
  const avgProd = refs?.prod > 0 ? 100 * prodH / refs.prod : null;
  const avgDown = refs?.down > 0 ? 100 * downH / refs.down : null;
  const useAvg = avgProd !== null && avgDown !== null &&
                 avgProd <= 100 && avgDown <= 100;
  const widthOf = (h, ref) =>
    (useAvg ? 100 * h / ref : 100 * h / maxH).toFixed(1);
  // The pulse-card bars are CENTERED under each ring and SYMMETRIC (user
  // request): the mildest level sits whole in the middle, every other level
  // splits into a half on each side — Distracting row reads
  // [VD/2][D/2][Neutral][D/2][VD/2], Productive reads [VP/2][P][VP/2].
  const bar = (h, center, outer, ref, pct) => {
    const seg = (l, f) =>
      `<div class="seg" style="flex:${f} 1 0;background:${COLORS[l]}"></div>`;
    const segs =
      [...outer].reverse().map(l => seg(l, lv[l] / 2)).join("") +
      seg(center, lv[center]) +
      outer.map(l => seg(l, lv[l] / 2)).join("");
    return `<div class="cat-row">
        <div class="cat-bar stackbar center" style="width:${widthOf(h, ref)}%">${segs}</div>
        ${pct !== null ? `<div class="cat-label pct"><span class="cat-time">${pct}</span></div>` : ""}
        <div class="cat-label"><span class="cat-time">${h}h</span></div>
      </div>`;
  };
  el.innerHTML = bar(prodH, "1", ["2"], refs?.prod, prodVs) +
                 bar(downH, "0", ["-1", "-2"], refs?.down, downVs);

  // ---- hover tooltips (shared #chartjs-tooltip element, same look as the
  //      ring-slice tooltips): top apps + hours covered by each row ----
  const topApps = levels => {
    const m = new Map();
    for (const [, sec, , activity, , prod] of (acts ?? []))
      if (levels.includes(String(prod))) {
        const n = appName(activity);
        m.set(n, (m.get(n) ?? 0) + sec);
      }
    return [...m].sort((a, b) => b[1] - a[1]).slice(0, 5)
      .map(([n, s]) => `   ${hrs(s)}h  ${n}`).join("\n");
  };
  const vsNote = (pct, prev) => pct === null ? "No Previous-Period Data\n"
    : pct === "No Trend" ? "Nothing Logged In The Previous Period (No Trend)\n"
    : `${pct} Of The Previous Period (${prev}h)\n`;
  const widthNote = ref => ref > 0
    ? (useAvg ? `Bar Width: 100% = ${ref}h (7-Day Daily Average)\n`
              : "Bar Width: Standard Scale (Larger Bar = 100%)\n")
    : "";
  const rows = el.querySelectorAll(".cat-row");
  rows[0].dataset.tipTitle = `${prodH}h Productive - Of ${totalH}h Logged`;
  rows[0].dataset.tipBody = "Very Productive + Productive\n" +
    vsNote(prodVs, prevProdH) + widthNote(refs?.prod) + topApps(["2", "1"]);
  rows[1].dataset.tipTitle = `${downH}h Neutral + Distracting - Of ${totalH}h Logged`;
  rows[1].dataset.tipBody = "Neutral + Distracting + Very Distracting\n" +
    vsNote(downVs, prevDownH) + widthNote(refs?.down) + topApps(["0", "-1", "-2"]);
}
</script>
</body>
</html>
