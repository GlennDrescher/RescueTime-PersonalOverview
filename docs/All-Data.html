<!DOCTYPE html>
<html lang="en">
<head>
<title>All Data</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="styles.css?v=123">
<link rel="icon" href="favicon.svg?v=123" type="image/svg+xml">
<link rel="icon" href="favicon.ico?v=123" sizes="32x32">

</head>
<body>

<div class="grid grid-2">
  <!-- 0. App search: fuzzy search over every app in the archive. Both the
       suggestion list and the app detail card are OVERLAYS anchored under the
       search bar — they float on top of the cards below, which never move.
       ↑/↓ selects a suggestion, Enter (or a click) opens the detail card;
       clicking the detail card closes it. -->
  <div class="card" id="searchCard" style="grid-column: 1 / -1">
    <input class="search-input" id="appSearch" type="text"
           placeholder="Search Apps, Periods or Categories…" autocomplete="off" spellcheck="false">
    <div class="card search-sug" id="searchSug" hidden></div>
    <div class="card" id="appDetailCard" hidden>
      <div class="app-head">
        <h2 id="appDetailTitle">App</h2>
        <div class="app-fresh" id="appDetailFresh"></div>
      </div>
      <!-- period switcher (v79): on app / category / type / period detail
           pages — Week/Month/Year jump to the CURRENT rolling windows
           (Current 7 Days / Current 30 Days / Current Year), Total to all
           recorded data. Hidden on the Trends pages. -->
      <div class="pswitch" id="periodSwitch" hidden>
        <div class="pswitch-nav">
          <button type="button" class="pswitch-btn" id="perPrev" data-nav="prev">◀ Prior</button>
          <button type="button" class="pswitch-btn" id="perNext" data-nav="next">Next ▶</button>
        </div>
        <span class="pswitch-label">Change Periode</span>
        <div class="pswitch-pills">
          <button type="button" class="pswitch-btn" data-per="day">Day</button>
          <button type="button" class="pswitch-btn" data-per="week">Week</button>
          <button type="button" class="pswitch-btn" data-per="month">Month</button>
          <button type="button" class="pswitch-btn" data-per="year">Year</button>
          <button type="button" class="pswitch-btn" data-per="total">Total</button>
        </div>
      </div>
      <div class="app-detail" id="appDetailRows"></div>
    </div>
  </div>

  <!-- 1. Pulse: past-24h / week / month donuts (label inside the hole) + trend delta bars.
       Clicking opens RescueTime: left third = today, middle = week, right = month. -->
  <div class="card" id="pulseCard" style="grid-column: 1 / -1">
    <!-- top-left quick-links: + -> Manual (offline) Activities, page -> Highlights -->
    <div class="card-icons">
      <button type="button" class="card-icon" id="iconOffline" title="Manual Activities" aria-label="Manual Activities">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="4" x2="12" y2="20"></line>
          <line x1="4" y1="12" x2="20" y2="12"></line>
        </svg>
      </button>
      <button type="button" class="card-icon" id="iconHistory" title="Highlights" aria-label="Highlights">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="8" y1="13" x2="16" y2="13"></line>
          <line x1="8" y1="17" x2="16" y2="17"></line>
          <line x1="8" y1="9" x2="10" y2="9"></line>
        </svg>
      </button>
    </div>
    <!-- Every .donuts row shares the same grid: one narrow DATA column on the
         far left (row labels for the bars now; more numbers later) + the three
         period columns. -->
    <div class="donuts">
      <!-- v82: the first column is just a narrow spacer now — every ring
           carries its OWN hours-to-50 stat directly to its left: the
           Distracting time that window can still absorb while its pulse is
           at/above 50 (red), or the Productive time needed to lift it back
           to 50 (blue). Value on top, "Dist/Prod + Needed" below. -->
      <div class="label-col"></div>
      <!-- inside each ring: total logged hours ABOVE the pulse number (same
           style as the period label BELOW it) -->
      <div class="donut-col">
        <div class="ring-row">
          <div class="ring-stat" id="to50_24h" hidden>
            <div class="stat-inner">
              <div class="ring-stat-top">Need</div>
              <div class="ring-stat-val big" id="to50Val_24h">–</div>
              <div class="ring-stat-bot">Hours of<br><span id="to50Word_24h">Productive</span></div>
            </div>
          </div>
          <div class="pulse-wrap">
            <canvas id="donutToday"></canvas>
            <div class="pulse-center"><div class="pulse-inner">
              <div class="pulse-label" id="totalToday">–</div>
              <div class="pulse-num" id="numToday">–</div>
              <div class="pulse-label" id="labelToday">–</div>
            </div></div>
          </div>
        </div>
        <div class="pulse-pct" id="pct24h" hidden></div>
      </div>
      <div class="donut-col">
        <div class="ring-row">
          <div class="ring-stat" id="to50_week" hidden>
            <div class="stat-inner">
              <div class="ring-stat-top">Need</div>
              <div class="ring-stat-val big" id="to50Val_week">–</div>
              <div class="ring-stat-bot">Hours of<br><span id="to50Word_week">Productive</span></div>
            </div>
          </div>
          <div class="pulse-wrap">
            <canvas id="donutWeek"></canvas>
            <div class="pulse-center"><div class="pulse-inner">
              <div class="pulse-label" id="totalWeek">–</div>
              <div class="pulse-num" id="numWeek">–</div>
              <div class="pulse-label">7 Days</div>
            </div></div>
          </div>
        </div>
        <div class="pulse-pct" id="pctWeek" hidden></div>
      </div>
      <div class="donut-col">
        <div class="ring-row">
          <div class="ring-stat" id="to50_month" hidden>
            <div class="stat-inner">
              <div class="ring-stat-top">Need</div>
              <div class="ring-stat-val big" id="to50Val_month">–</div>
              <div class="ring-stat-bot">Hours of<br><span id="to50Word_month">Productive</span></div>
            </div>
          </div>
          <div class="pulse-wrap">
            <canvas id="donutMonth"></canvas>
            <div class="pulse-center"><div class="pulse-inner">
              <div class="pulse-label" id="totalMonth">–</div>
              <div class="pulse-num" id="numMonth">–</div>
              <div class="pulse-label">30 Days</div>
            </div></div>
          </div>
        </div>
        <div class="pulse-pct" id="pctMonth" hidden></div>
      </div>
    </div>
    <div class="donuts">
      <!-- ONE set of bar labels for the whole card, aligned with the bar rows
           of every period column. Short forms keep the column narrow (v82). -->
      <div class="label-col delta-label-col">
        <div class="row-label">Prod</div>
        <div class="row-label">Dist</div>
      </div>
      <div class="donut-col"><div class="deltas" id="deltaToday"></div></div>
      <div class="donut-col"><div class="deltas" id="deltaWeek"></div></div>
      <div class="donut-col"><div class="deltas" id="deltaMonth"></div></div>
    </div>
  </div>

  <!-- category / type cards RIGHT UNDER the pulse card (user: move them up) -->
  <div class="card">
    <div class="card-head">
      <h2>Top Categories - 7 Days</h2>
      <div class="card-stat" id="mixWeekCats"></div>
    </div>
    <div class="bar-list" id="catListWeek"></div>
  </div>
  <div class="card">
    <div class="card-head">
      <h2>Top Types - 7 Days</h2>
      <div class="card-stat" id="mixTypes7"></div>
    </div>
    <div class="bar-list" id="typeList7"></div>
  </div>

  <!-- 2a. Top apps over the ROLLING past 24 hours (hourly data) — same
       bar-list look as Weeks-Months.html -->
  <div class="card" id="card24h">
    <div class="card-head">
      <h2 id="card24hTitle">Top Apps</h2>
      <div class="card-stat" id="tot24Head"></div>
    </div>
    <div class="bar-list" id="appList24h"></div>
  </div>

  <!-- 2b. Past 14 days incl. today, newest first, diverging.
       No date labels: dates + apps show in the hover tooltip.
       Title row: name | daily average | total logged. -->
  <div class="card">
    <div class="card-head">
      <h2>14 Days</h2>
      <div class="card-stat" id="avg14Head"></div>
      <div class="card-stat" id="tot14Head"></div>
    </div>
    <div class="chart-fill"><canvas id="dayChart"></canvas></div>
  </div>

  <!-- 3. The apps cards (past 7 days | past 30 days) at the bottom; the
       category / type cards were moved up under the pulse card. -->
  <div class="card">
    <div class="card-head">
      <h2>Top Apps - 7 Days</h2>
      <div class="card-stat" id="avgWeekApps"></div>
      <div class="card-stat" id="totWeekApps"></div>
    </div>
    <div class="bar-list" id="appListWeek"></div>
  </div>
  <div class="card">
    <div class="card-head">
      <h2>Top Apps - 30 Days</h2>
      <div class="card-stat" id="avgMonthApps"></div>
      <div class="card-stat" id="totMonthApps"></div>
    </div>
    <div class="bar-list" id="appListMonth"></div>
  </div>
</div>

<script>
// ---- shared core: constants, helpers, data loading, demo data ----
const LEVELS = ["2", "1", "0", "-1", "-2"];
const COLORS = { "2": "#2563ae", "1": "#5b9bd5", "0": "#8c96a3", "-1": "#985bd5", "-2": "#b34d53" };
const NAMES  = { "2": "Work", "1": "Productive", "0": "Neutral", "-1": "Personal", "-2": "Distracting" };
// Pulse weights, mirrored around 0.5 (=pulse 50). Work +2 / Productive +1 on
// the positive side; Distracting −2 on the negative side. Neutral AND Personal
// both sit ON the 50 line (weight 0.5) — Personal is treated exactly like
// Neutral, so it shows in the ring but never moves the pulse number.
const WEIGHT = { "2": 1, "1": 0.75, "0": 0.5, "-1": 0.5, "-2": 0 };
const BLUE = "#5b9bd5", RED = "#b34d53";
const NO_ANIM = { animation: false, animations: false,
                  transitions: { resize: { animation: { duration: 0 } } } };
const hrs = sec => +(sec / 3600).toFixed(1);
function emptyLevels() { return { "2":0, "1":0, "0":0, "-1":0, "-2":0 }; }
function pulseOf(lv) {
  const t = LEVELS.reduce((a, l) => a + lv[l], 0);
  return t ? Math.round(100 * LEVELS.reduce((a, l) => a + lv[l] * WEIGHT[l], 0) / t) : 0;
}
function weekStart(d) {
  const x = new Date(d); x.setHours(0, 0, 0, 0);
  x.setDate(x.getDate() - ((x.getDay() + 6) % 7));
  return x;
}
function monthStart(d) { const x = new Date(d); x.setHours(0,0,0,0); x.setDate(1); return x; }
function isoWeekNum(d) {   // ISO-8601 calendar week number (weeks start Monday)
  const x = new Date(d); x.setHours(0, 0, 0, 0);
  x.setDate(x.getDate() + 3 - ((x.getDay() + 6) % 7));   // this week's Thursday
  const w1 = new Date(x.getFullYear(), 0, 4);            // Jan 4 is always week 1
  return 1 + Math.round(((x - w1) / 864e5 - 3 + ((w1.getDay() + 6) % 7)) / 7);
}
const prodOf = lv => lv["2"] + lv["1"];
const distOf = lv => lv["-1"] + lv["-2"];

async function loadJson(file, fallback) {
  try {
    const r = await fetch(file, { cache: "no-store" });
    if (!r.ok) throw new Error("missing " + file);
    return await r.json();
  } catch { return fallback; }
}

function setStamp(data) {
  const el = document.getElementById("stamp");
  if (el) el.textContent = data.generated_at
    ? `Updated ${new Date(data.generated_at).toLocaleString()}`
    : "No Data";
}


// NOTE: NO RescueTime links anywhere — clicks navigate INSIDE the page
// (cards open the Trends views, bars/rows carry tooltips only).


// External Chart.js tooltip: renders into a shared <div> instead of the canvas.
// Placed ABOVE the hovered arc/bar (flips below only if there's no room), and
// clamped to the viewport so long app lists never get cut off.
function htmlTooltip(ctx) {
  const { chart, tooltip } = ctx;
  let el = document.getElementById("chartjs-tooltip");
  if (!el) {
    el = document.createElement("div");
    el.id = "chartjs-tooltip";
    document.body.appendChild(el);
  }
  if (tooltip.opacity === 0) { el.style.opacity = "0"; return; }

  // Rebuild content from the same callbacks (label -> lines, afterLabel -> after)
  const title = (tooltip.title ?? []).join("\n");
  const lines = (tooltip.body ?? [])
    .flatMap(b => [...(b.before ?? []), ...(b.lines ?? []), ...(b.after ?? [])]);
  el.replaceChildren();
  if (title) {
    const t = document.createElement("div");
    t.className = "tt-title"; t.textContent = title;
    el.appendChild(t);
  }
  const bodyEl = document.createElement("div");
  bodyEl.textContent = lines.join("\n");
  el.appendChild(bodyEl);
  el.style.opacity = "1";

  // Anchor at the caret, prefer above, clamp into the viewport horizontally
  const rect = chart.canvas.getBoundingClientRect();
  const x = rect.left + window.scrollX + tooltip.caretX;
  const y = rect.top + window.scrollY + tooltip.caretY;
  const w = el.offsetWidth, h = el.offsetHeight;
  const minLeft = window.scrollX + 4;
  const maxLeft = window.scrollX + document.documentElement.clientWidth - w - 4;
  el.style.left = Math.max(minLeft, Math.min(x - w / 2, maxLeft)) + "px";
  let top = y - h - 10;                       // above the point
  if (top < window.scrollY + 4) top = y + 10; // flip below if it would leave the page
  el.style.top = top + "px";
}
const HTML_TOOLTIP = { enabled: false, position: "nearest", external: htmlTooltip };

// ---- full-width list bars + instant hover tooltip: same markup, styling and
//      behaviour as the cards in Weeks-Months.html ----
function renderBarList(elId, entries) { // entries: [name, seconds, level, tooltip]
  const host = document.getElementById(elId);
  if (!entries.length) {
    host.innerHTML =
      '<div style="color:var(--text-dim);font-size:0.8rem">No Data</div>';
    return;
  }
  const max = Math.max(...entries.map(e => e[1]), 1);
  // entry[4] (optional) = %-vs-previous-period label, anchored RIGHT; the
  // main label reads "Xh Name" at the LEFT; the bar grows right-to-left
  // underneath (the site-wide mirrored bar style).
  // entry[5] (optional) = NAV descriptor {kind:"app"|"cat"|"lvl", key,
  // period} — the row becomes a button that opens that entity's detail
  // page for the SAME period the row's card shows (delegated listener).
  // entry[6] (optional) = colour of the row's square linking it to its line
  // in the graph below (null = keep the space but stay invisible).
  host.innerHTML = entries.map(([name, sec, lvl, , pct, , dot]) => `
    <div class="cat-row${dot !== undefined ? " dotted" : ""}">
      <div class="cat-bar" style="width:${(100 * sec / max).toFixed(1)}%;
           background:${COLORS[lvl]}"></div>
      ${pct != null ? `<div class="cat-label pct"><span class="cat-time">${pct}</span></div>` : ""}
      <div class="cat-label">
        ${dot !== undefined ? `<span class="cat-dot" style="${dot ? `background:${dot}` : "visibility:hidden"}"></span>` : ""}
        <span class="cat-name">${name}</span><span class="cat-time">${(sec / 3600).toFixed(1)}h</span>
      </div>
    </div>`).join("");
  // Attach tooltip text via the DOM (no HTML-escaping pitfalls in attributes)
  host.querySelectorAll(".cat-row").forEach((row, i) => {
    row.dataset.tipTitle = entries[i][0];
    row.dataset.tipBody  = entries[i][3] ?? "";
    const nav = entries[i][5];
    if (nav) {
      row.dataset.navKind = nav.kind;
      row.dataset.navKey = nav.key;
      if (nav.period) row.dataset.navPeriod = nav.period;
    }
  });
}

function tooltipEl() {
  let el = document.getElementById("chartjs-tooltip");
  if (!el) {
    el = document.createElement("div");
    el.id = "chartjs-tooltip";
    document.body.appendChild(el);
  }
  return el;
}
document.addEventListener("mousemove", e => {
  // Anything carrying data-tip-title gets the shared tooltip: list rows
  // (.cat-row) AND the pulse card's bar rows/cells set by makeDeltas.
  const row = e.target.closest?.("[data-tip-title]");
  if (!row?.dataset.tipTitle) {
    // Over a canvas, Chart.js owns the shared tooltip element — leave it alone
    if (!(e.target instanceof HTMLCanvasElement)) tooltipEl().style.opacity = "0";
    return;
  }
  const el = tooltipEl();
  el.replaceChildren();
  const t = document.createElement("div");
  t.className = "tt-title"; t.textContent = row.dataset.tipTitle;
  el.appendChild(t);
  if (row.dataset.tipBody) {
    const b = document.createElement("div");
    // each line is plain text UNLESS it contains a tab, in which case it splits
    // into a left part and a right-aligned part (e.g. "1.0h App \t Work")
    for (const line of row.dataset.tipBody.split("\n")) {
      const tab = line.indexOf("\t");
      if (tab >= 0) {
        const rowEl = document.createElement("div");
        rowEl.className = "tt-row";
        const L = document.createElement("span"); L.textContent = line.slice(0, tab);
        const R = document.createElement("span"); R.className = "tt-right"; R.textContent = line.slice(tab + 1);
        rowEl.append(L, R);
        b.appendChild(rowEl);
      } else {
        const d = document.createElement("div");
        d.textContent = line;
        b.appendChild(d);
      }
    }
    el.appendChild(b);
  }
  el.style.opacity = "1";
  // above the row, centered on the cursor, clamped to the viewport
  const r = row.getBoundingClientRect();
  const w = el.offsetWidth, h = el.offsetHeight;
  const minLeft = window.scrollX + 4;
  const maxLeft = window.scrollX + document.documentElement.clientWidth - w - 4;
  el.style.left = Math.max(minLeft, Math.min(e.clientX + window.scrollX - w / 2, maxLeft)) + "px";
  let top = r.top + window.scrollY - h - 10;
  if (top < window.scrollY + 4) top = r.bottom + window.scrollY + 10; // flip below
  el.style.top = top + "px";
});

// tipTitle names the exact window the ring shows ("Current 24 Hours (Hourly
// Data)", "Current 7 Days (Rolling)" ...) as the hover tooltip's title line.
function makeDonut(canvasId, numId, lv, acts, appName, tipTitle) {
  const p = pulseOf(lv);
  const numEl = document.getElementById(numId);
  numEl.textContent = p;
  numEl.style.color = p >= 50 ? "var(--pulse)" : "var(--vdist)"; // 50+ blue, below red
  // acts: activity rows for this donut's period, used for per-slice app
  // tooltips. Apps sharing a display name (dictionary.json) combine into one line.
  const perLevel = {};
  for (const [, sec, , activity, , prod] of (acts ?? [])) {
    const m = (perLevel[String(prod)] ??= new Map());
    const n = appName(activity);
    m.set(n, (m.get(n) ?? 0) + sec);
  }
  for (const l of Object.keys(perLevel))
    perLevel[l] = [...perLevel[l]].sort((a, b) => b[1] - a[1]);

  // Extremes render as one solid full ring: pulse 0 -> all red, 100 -> all
  // blue. Also covers "no data yet" (pulse 0, otherwise an invisible donut).
  if (p === 0 || p === 100) {
    const level = p === 100 ? "2" : "-2";
    const total = LEVELS.reduce((a, l) => a + lv[l], 0);
    const solidMerged = new Map();
    for (const [, sec, , activity] of (acts ?? [])) {
      const n = appName(activity);
      solidMerged.set(n, (solidMerged.get(n) ?? 0) + sec);
    }
    const apps = [...solidMerged].sort((a, b) => b[1] - a[1]);
    return new Chart(document.getElementById(canvasId), {
      type: "doughnut",
      data: { datasets: [{ data: [1], backgroundColor: [COLORS[level]],
                           borderWidth: 0, cutout: "80%" }]},
      options: { responsive: true, maintainAspectRatio: false, ...NO_ANIM,
        plugins: { legend: { display: false },  // an empty legend still reserves space above the ring
          tooltip: { ...HTML_TOOLTIP, callbacks: {
          title: () => tipTitle ?? "",
          label: () => total ? ` ${hrs(total)}h ${NAMES[level]}` : " no data yet",
          afterLabel: () => apps.slice(0, 5).map(([n, s]) => `   ${hrs(s)}h  ${n}`).join("\n"),
        } } } },
    });
  }
  return new Chart(document.getElementById(canvasId), {
    type: "doughnut",
    data: { datasets: [{
      data: LEVELS.map(l => lv[l]),
      backgroundColor: LEVELS.map(l => COLORS[l]),
      borderWidth: 0, cutout: "80%",
    }]},
    options: { responsive: true, maintainAspectRatio: false, ...NO_ANIM,
      plugins: { legend: { display: false },  // an empty legend still reserves space above the ring
        tooltip: { ...HTML_TOOLTIP, callbacks: {
        title: () => tipTitle ?? "",
        label: c => ` ${hrs(c.raw)}h ${NAMES[LEVELS[c.dataIndex]]}`,
        afterLabel: c => {
          const apps = perLevel[LEVELS[c.dataIndex]] ?? [];
          if (!apps.length) return "";
          return apps.slice(0, 5).map(([n, s]) => `   ${hrs(s)}h  ${n}`).join("\n");
        },
      } } } },
  });
}

Promise.all([loadJson("data.json", null), loadJson("dictionary.json", {})]).then(([data, renames]) => {
  if (!data) data = { rows_daily: [], week_activities: [], month_activities: [],
                    day_activities: {}, hour_activities: [], generated_at: null };  // NO demo data: show zeros / "No Data"
  // Lowercased keys -> case-insensitive lookup (matches Weeks-Months.html)
  // ---- dictionary: display renames + type/category overrides ----
  // Schema: "Apps" [ {OriginalName:[raw...], NewName, NewCategory?} ] and
  // "Categories" [ {OriginalName:[raw...], NewName?, NewType?} ]. OriginalName
  // matches the raw RescueTime names (case-insensitive). data.json is already
  // translated by the fetcher; we apply the SAME rules to the raw archive.json
  // here so the long-range Trends stay consistent with the front page.
  const TYPE_PROD = { work: 2, productive: 1, neutral: 0, personal: -1, distracting: -2 };
  const appMap = {}, catMap = {};    // lowercased raw name -> display (New) name
  const appCat = {}, catType = {}, appType = {};   // raw name -> assigned category / category-type / app-type
  // display-name(lowercased) -> original raw names merged into it, so the
  // ORIGINAL category names stay searchable and redirect to the merged detail
  // page. Apps do NOT alias (an app only ever shows/searches as its NewName).
  const catAliases = {};
  const origNames = g => Array.isArray(g?.OriginalName) ? g.OriginalName
                       : g?.OriginalName != null ? [g.OriginalName] : [];
  // a productivity override may be written as EITHER `type` OR `NewType`
  const prodOf = g => { const t = g?.type ?? g?.NewType;
    return t != null ? TYPE_PROD[String(t).trim().toLowerCase()] : undefined; };
  for (const g of renames.Apps ?? []) {
    if (!g) continue;
    const p = prodOf(g);
    for (const n of origNames(g)) {
      const k = String(n).toLowerCase();
      if (g.NewName)       appMap[k] = g.NewName;
      if (g.NewCategory)   appCat[k] = g.NewCategory;
      if (p !== undefined) appType[k] = p;   // re-type this app directly (wins over its category)
    }
  }
  for (const g of renames.Categories ?? []) {
    if (!g) continue;
    const p = prodOf(g);
    // also key the type by the NewName, so an app whose NewCategory points at a
    // RENAMED category (e.g. NewCategory:"Fun") still inherits that type
    if (g.NewName && p !== undefined) catType[g.NewName.toLowerCase()] = p;
    for (const n of origNames(g)) {
      const k = String(n).toLowerCase();
      if (g.NewName)       catMap[k] = g.NewName;
      if (p !== undefined) catType[k] = p;
      if (g.NewName && k !== g.NewName.toLowerCase())
        (catAliases[g.NewName.toLowerCase()] ??= []).push(String(n));
    }
  }
  const appName = raw => appMap[String(raw).toLowerCase()] ?? raw;
  const catName = raw => catMap[String(raw).toLowerCase()] ?? raw;
  const hasOverrides = Object.keys(appCat).length > 0 || Object.keys(catType).length > 0
                    || Object.keys(appType).length > 0;
  // translate ONE raw archive row [sec, act, cat, prod] -> re-typed copy.
  // Precedence: an app's own type override > its (effective) category's type > raw.
  const translateRow = ([sec, act, cat, prod]) => {
    const c = appCat[String(act).toLowerCase()] ?? cat;
    const p = appType[String(act).toLowerCase()] ?? catType[String(c).toLowerCase()] ?? prod;
    return [sec, act, c, p];
  };
  // same, for data.json's RANK-shaped rows [rank, sec, people, act, cat, prod]
  const translateRank = r => {
    if (!Array.isArray(r) || r.length < 6) return r;
    const c = appCat[String(r[3]).toLowerCase()] ?? r[4];
    const p = appType[String(r[3]).toLowerCase()] ?? catType[String(c).toLowerCase()] ?? r[5];
    return [r[0], r[1], r[2], r[3], c, p];
  };
  // data.json's per-app arrays are already translated by the fetcher, but apply
  // the SAME rules here too (idempotent) so overrides show even BEFORE the next
  // fetch and so app/type COLOURS that read data.json match the archive. NOTE:
  // rows_daily carries no category, so the aggregate week/month pulse number
  // still only picks up a category->type change on the next fetch.
  if (hasOverrides) {
    for (const key of ["month_activities", "week_activities", "hour_activities"])
      if (Array.isArray(data[key])) data[key] = data[key].map(translateRank);
    for (const d in (data.day_activities ?? {}))
      data.day_activities[d] = data.day_activities[d].map(translateRank);
  }
  // anything with less TOTAL logged time than this never appears in the
  // suggestions or the Top lists — the site-wide 0.5 h floor
  const MIN_LOGGED_SEC = 1800;

  // ---- bucket daily rows ----
  const days = new Map(), weeks = new Map(), months = new Map();
  for (const [date, sec, , prod] of (data.rows_daily ?? [])) {
    const d = new Date(date); d.setHours(0,0,0,0);
    for (const [map, key] of [[days, d.getTime()],
                              [weeks, weekStart(d).getTime()],
                              [months, monthStart(d).getTime()]]) {
      if (!map.has(key)) map.set(key, emptyLevels());
      map.get(key)[String(prod)] += sec;
    }
  }
  const now = new Date(); now.setHours(0,0,0,0);
  const isoOf = ms => { const d = new Date(ms);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
  // ROLLING windows instead of calendar ones: the "week" pulse is the past
  // 7 days (incl. today) compared to the 7 days before that; the "month"
  // pulse is the past 30 days compared to the 30 days before that.
  const daysAgo = n => { const x = new Date(now); x.setDate(now.getDate() - n); return x; };
  const sumRange = (from, to) => {  // inclusive date range over the days map
    const acc = emptyLevels();
    for (const d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
      const lv = days.get(d.getTime());
      if (lv) for (const l of LEVELS) acc[l] += lv[l];
    }
    return acc;
  };
  const orNull = lv => LEVELS.some(l => lv[l]) ? lv : null;  // "no comparison" if empty
  const curWkLv  = sumRange(daysAgo(6),  now);
  const prevWkLv = orNull(sumRange(daysAgo(13), daysAgo(7)));
  const curMoLv  = sumRange(daysAgo(29), now);
  const prevMoLv = orNull(sumRange(daysAgo(59), daysAgo(30)));

  // Past-7-days app rows for the week donut's tooltips: merge the per-day
  // activity lists (one row per app+level).
  const curWkRows = (() => {
    const acc = new Map();
    for (const d = new Date(daysAgo(6)); d <= now; d.setDate(d.getDate() + 1)) {
      for (const [, sec, , activity, cat, prod] of (data.day_activities ?? {})[isoOf(d.getTime())] ?? []) {
        const k = activity + "|" + prod;
        const e = acc.get(k) ?? [0, 0, 1, activity, cat, prod];
        e[1] += sec; acc.set(k, e);
      }
    }
    return [...acc.values()];
  })();

  // ---- ROLLING PAST 24 HOURS (first pulse + the top-apps card) ----
  // Built from hour_activities — the hourly rows the fetcher pulls for the
  // last ~48 h — so the window is a TRUE rolling 24 hours ending now, not
  // calendar days. The 24 hours BEFORE that window give the trend baseline.
  // Hour rows share the rank-row shape [hour, sec, people, app, cat, prod];
  // the hour strings carry no timezone, so Date() reads them as LOCAL time
  // (the fetcher runs with TZ=Europe/Copenhagen — same clock as the viewer).
  const nowMs = Date.now();
  const cut24 = nowMs - 24 * 36e5, cut48 = nowMs - 48 * 36e5;
  const acts24 = [], actsPrev24 = [];
  for (const row of (data.hour_activities ?? [])) {
    const t = new Date(row[0]).getTime();
    if (t > cut24 && t <= nowMs) acts24.push(row);
    else if (t > cut48 && t <= cut24) actsPrev24.push(row);
  }
  const levelsOf = rows => { const r = emptyLevels();
    for (const [, sec, , , , prod] of rows) r[String(prod)] += sec; return r; };
  const lv24 = levelsOf(acts24);
  const prev24Lv = orNull(levelsOf(actsPrev24));
  document.getElementById("labelToday").textContent = "Today";
  document.getElementById("card24hTitle").textContent = "Top Apps - 24 Hours";
  // total logged hours of the window, anchored right on the card title row
  const tot24Sec = LEVELS.reduce((a, l) => a + lv24[l], 0);
  const tot24El = document.getElementById("tot24Head");
  tot24El.textContent = `${hrs(tot24Sec)}h Logged`;
  tot24El.dataset.tipTitle = `${hrs(tot24Sec)}h Logged In The Current 24 Hours`;
  tot24El.dataset.tipBody = "Rolling Window Ending Now (Hourly Data)";

  // ---- donuts: past 24 hours | past 7 days | past 30 days ----
  makeDonut("donutToday", "numToday", lv24, acts24, appName,
            "Current 24 Hours (Rolling, Hourly Data)");
  makeDonut("donutWeek",  "numWeek",  curWkLv, curWkRows, appName,
            "Current 7 Days (Rolling, Incl. Today)");
  makeDonut("donutMonth", "numMonth", curMoLv, data.month_activities, appName,
            "Current 30 Days (Rolling, Incl. Today)");
  // total logged hours of each window, shown INSIDE the ring above the pulse
  const lvSum = l => LEVELS.reduce((a, k) => a + l[k], 0);
  document.getElementById("totalToday").textContent = `${hrs(tot24Sec)}h`;
  document.getElementById("totalWeek").textContent  = `${hrs(lvSum(curWkLv))}h`;
  document.getElementById("totalMonth").textContent = `${hrs(lvSum(curMoLv))}h`;

  // Two bar rows under each pulse: Productive | Distracting hours.
  // The 24h bars are scaled against the 7-DAY DAILY AVERAGE (100% of the bar
  // = the average productive/distracting hours per day over the past 7 days),
  // so a full bar means "the past 24 hours match a typical day".
  makeDeltas("deltaToday", lv24, acts24, appName, prev24Lv, {
    prod: hrs(prodOf(curWkLv) / 7),
    down: hrs((distOf(curWkLv) + curWkLv["0"]) / 7),
  });
  makeDeltas("deltaWeek",  curWkLv, curWkRows, appName, prevWkLv);
  makeDeltas("deltaMonth", curMoLv, data.month_activities, appName, prevMoLv);

  // ---- "% of the previous period" line under each pulse, RescueTime-style:
  //      current pulse as a percentage of the previous period's pulse, with a
  //      blue up-arrow at/above 100% and a red down-arrow below it ----
  const pulsePct = (elId, cur, prev, fromText, tipBody) => {
    const el = document.getElementById(elId);
    const curP = pulseOf(cur), prevP = prev ? pulseOf(prev) : 0;
    if (!prevP || !LEVELS.some(l => cur[l])) { el.hidden = true; return; }
    const pct = Math.round(100 * curP / prevP);
    const up = pct >= 100;
    el.hidden = false;
    el.innerHTML = `<span class="pct-arrow" style="color:${up ? BLUE : RED}">` +
      `${up ? "▲" : "▼"}</span> ${pct}% ${fromText}`;
    el.dataset.tipTitle = `Pulse ${curP} Vs ${prevP} — ${pct}% Of The Previous Period`;
    el.dataset.tipBody = tipBody;
  };
  pulsePct("pct24h", lv24, prev24Lv, "Prior 24h",
    "Current 24 Hours (Rolling)\nVs The Prior 24 Hours");
  pulsePct("pctWeek", curWkLv, prevWkLv, "Prior Week",
    "Current 7 Days Vs The Prior 7 Days");
  pulsePct("pctMonth", curMoLv, prevMoLv, "Prior Month",
    "Current 30 Days Vs The Prior 30 Days");

  // ---- hours to pulse 50, LEFT of each ring (v82 — one stat per pulse) ----
  // With WEIGHT mirrored around 0.5, pulse == 50 exactly when
  // 2·Work + Prod == 2·Distracting (Neutral AND Personal sit ON the 50 line and
  // can never move the pulse across it). The surplus is S = 2·Work + Prod −
  // 2·Distracting: while at/above 50 that window could still absorb S hours of
  // Distracting time; below 50 it needs |S| hours of Productive time to climb
  // back to 50. The 24h stat is the WHOLE window; the 7/30-day stats are PER
  // DAY over their rolling window.
  const to50 = (sfx, lv, days, windowText) => {
    const el = document.getElementById("to50_" + sfx);
    if (!LEVELS.some(l => lv[l])) { el.hidden = true; return; }
    const S = 2 * lv["2"] + lv["1"] - 2 * lv["-2"];
    const down = S >= 0;                 // at/above 50: show the Distracting budget
    const h = hrs(Math.abs(S) / days);
    const valEl = document.getElementById("to50Val_" + sfx);
    valEl.textContent = Math.round(h);   // whole hours — bare integer aligns with the pulse number (tooltip keeps the exact 0.1h value)
    valEl.style.color = down ? "var(--vdist)" : "var(--pulse)";  // red = Dist, blue = Prod
    // layout: "Need" / <number> / "Hours of" / "Productive"|"Distracting"
    document.getElementById("to50Word_" + sfx).textContent = down ? "Distracting" : "Productive";
    el.hidden = false;
    const perDay = days > 1 ? " Per Day" : "";
    el.dataset.tipTitle =
      `${h}h ${down ? "Distracting" : "Productive"}${perDay} Until The ${windowText} Pulse Is 50`;
    el.dataset.tipBody = down
      ? `Distracting Time This Window Can Still Absorb${perDay ? ` Over The\nNext ${days} Days (If It Otherwise Matches Its Recent Average)` : ""}\nBefore The ${windowText} Pulse Drops To 50.\nDistracting Counts Double.`
      : `Productive Time Needed${perDay ? ` Per Day Over The\nNext ${days} Days (If The Window Otherwise Matches Its Recent Average)` : ""}\nTo Lift The ${windowText} Pulse To 50.\nWork Counts Double.`;
  };
  to50("24h", lv24, 1, "24-Hour");
  to50("week", curWkLv, 7, "7-Day");
  to50("month", curMoLv, 30, "30-Day");

  // ---- 14-day card title row: "14 Days" | daily average | total ----
  const lv14avg = sumRange(daysAgo(13), now);
  const tot14avg = LEVELS.reduce((a, l) => a + lv14avg[l], 0);
  if (tot14avg) {
    const avgEl = document.getElementById("avg14Head");
    const avgH = hrs(tot14avg / 14);
    avgEl.textContent = `${avgH}h Avg per day`;
    avgEl.dataset.tipTitle = `${avgH}h Logged Per Day On Average`;
    avgEl.dataset.tipBody = "Current 14 Days Incl. Today";
    const totEl = document.getElementById("tot14Head");
    totEl.textContent = `Total ${hrs(tot14avg)}h`;
    totEl.dataset.tipTitle = `${hrs(tot14avg)}h Logged In Total`;
    totEl.dataset.tipBody = "Current 14 Days Incl. Today";
  }

  // ---- click zones (NO RescueTime links anywhere — user request):
  //      pulse card thirds -> the Trends card (24h third = the overview,
  //      7-day third = Weekly Pulse, 30-day third = Monthly Pulse);
  //      the 24h apps card -> the Trends overview ----
  const pulseCard = document.getElementById("pulseCard");
  pulseCard.classList.add("trend-zone");   // capture listener defers to this card
  pulseCard.addEventListener("click", e => {
    e.stopPropagation();
    const rect = pulseCard.getBoundingClientRect();
    const third = Math.min(2, Math.max(0,
      Math.floor((e.clientX - rect.left) / (rect.width / 3))));
    showTrendsDetail(third === 0 ? "h-pulse" : third === 1 ? "w-pulse" : "m-pulse");
  });
  // top-left quick-links open (for now) blank detail pages — stopPropagation so
  // the click doesn't also fire the pulse card's third->Trends handler
  document.getElementById("iconHistory").addEventListener("click", e => {
    e.stopPropagation();
    showBlankDetail("Highlights");
  });
  document.getElementById("iconOffline").addEventListener("click", e => {
    e.stopPropagation();
    showOfflineDetail();
  });
  refreshOfflineIcon();   // red "+" on load if the 7-day calendar has empty hours
  const card24 = document.getElementById("card24h");
  card24.classList.add("trend-zone");
  card24.addEventListener("click", e => {
    e.stopPropagation();
    showTrendsDetail();
  });

  // ---- top apps over the rolling past 24 hours: same rows as the first
  // pulse (acts24). Sum per DISPLAY name, so apps renamed to the same thing
  // in dictionary.json (e.g. the Claude app + claude.ai) combine into ONE
  // bar. Category and level come from the largest contributor.
  const agg = new Map();
  for (const [, sec, , activity, cat, prod] of acts24) {
    const name = appName(activity);
    const k = name.toLowerCase();
    const e = agg.get(k) ?? { name, sec: 0, top: 0, cat, prod: String(prod) };
    e.sec += sec;
    if (sec > e.top) { e.top = sec; e.cat = cat; e.prod = String(prod); }
    agg.set(k, e);
  }
  // the PRIOR 24 hours per display name, for the % vs previous period
  const prevAgg = new Map();
  for (const [, sec, , activity] of actsPrev24) {
    const k = appName(activity).toLowerCase();
    prevAgg.set(k, (prevAgg.get(k) ?? 0) + sec);
  }
  const rows24List = [...agg.values()]
    .sort((a, b) => b.sec - a.sec)
    // ALWAYS keep the top 8; the 0.5 h floor only cuts rows beyond them
    .filter((e, i) => i < 8 || e.sec >= MIN_LOGGED_SEC)
    .map(e => {
      const prevSec = prevAgg.get(e.name.toLowerCase());
      const pct = prevSec > 0 ? Math.round(100 * e.sec / prevSec) + "%" : "No Trend";
      return [e.name, e.sec, e.prod,
        `${catName(e.cat)} — ${NAMES[e.prod]}, ${hrs(e.sec)}h` +
        (prevSec > 0 ? `\n${pct} Of The Prior 24 Hours (${hrs(prevSec)}h)`
                     : "\nNot Used In The Prior 24 Hours (No Trend)"),
        pct, { kind: "app", key: e.name, period: "Current 24 Hours" }];
    });
  // render EVERY app of the window — the list keeps the card's height and
  // SCROLLS (thin themed scrollbar) for the rows below the fold
  renderBarList("appList24h", rows24List);

  // ---- past 14 days incl. today, NEWEST FIRST, diverging stacked bars ----
  const dayKeys = [];
  for (let i = 0; i < 14; i++) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    dayKeys.push(d.getTime()); // index 0 = today
  }
  const lvOf = t => days.get(t) ?? emptyLevels();
  const dayApps = new Map();
  for (const [dateStr, rows] of Object.entries(data.day_activities ?? {})) {
    const d = new Date(dateStr); d.setHours(0, 0, 0, 0);
    const perLevel = {};
    for (const [, sec, , activity, , prod] of rows ?? []) {
      const m = (perLevel[String(prod)] ??= new Map());
      const n = appName(activity);
      m.set(n, (m.get(n) ?? 0) + sec);
    }
    for (const l of Object.keys(perLevel))
      perLevel[l] = [...perLevel[l]].sort((a, b) => b[1] - a[1]);
    dayApps.set(d.getTime(), perLevel);
  }
  const upL = ["2", "1"], downL = ["0", "-1", "-2"];
  const order = [...upL, ...downL];
  // Symmetric hour scale: the productive (up) and distracting (down) sides
  // share one maximum, so bar heights are comparable across the zero line.
  const yMax = Math.ceil(Math.max(1,
    ...dayKeys.map(t => upL.reduce((a, l) => a + hrs(lvOf(t)[l]), 0)),
    ...dayKeys.map(t => downL.reduce((a, l) => a + hrs(lvOf(t)[l]), 0))));
  // Total logged hours per day, shown under each bar, rounded to whole hours
  // (exact values live in the hover tooltip). No "h" suffix (the y axis
  // already shows the unit) so every one of the 14 labels fits.
  const dayTotals = dayKeys.map(t =>
    String(Math.round(hrs(LEVELS.reduce((a, l) => a + lvOf(t)[l], 0)))));
  // second x-axis row: that day's PULSE (blank when nothing was logged)
  const dayPulses = dayKeys.map(t => {
    const lv = lvOf(t);
    return LEVELS.reduce((a, l) => a + lv[l], 0) ? String(pulseOf(lv)) : "";
  });
  // all chart text matches the 0.8rem card titles; `let` so syncChartFont
  // below can keep it in step with the root font size after resizes
  const remPx = () => parseFloat(getComputedStyle(document.documentElement).fontSize);
  let tickPx = Math.round(remPx() * 0.8);
  const dayCanvas = document.getElementById("dayChart");
  // "Total" in the bottom-right corner (under the hours scale), labelling the
  // per-day totals row — styled like the pulse card's row labels. Reads the
  // first x tick's actual draw position so it sits EXACTLY on the numbers row.
  const totLabel = {
    id: "totLabel",
    afterDraw(chart) {
      const { ctx } = chart;
      const x = chart.scales.x, y = chart.scales.y;
      // Chart.js private internals, but exact: ticks are drawn translated to
      // options.translation then offset by textOffset. Fall back to a centred
      // guess if the internals ever change shape.
      const li = x._labelItems?.[0];
      const ty = li?.options?.translation?.[1] != null
        ? li.options.translation[1] + (li.textOffset ?? 0)
        : x.top + x.height / 2;
      const lh = Math.round(tickPx * 1.2);   // Chart.js default line height
      ctx.save();
      ctx.font = `600 ${tickPx}px -apple-system, "Segoe UI", Roboto, sans-serif`;
      ctx.textBaseline = li?.options?.textBaseline ?? "middle";
      // row labels aligned to the two stacked tick rows (total hours | pulse)
      ctx.fillStyle = "#909090";
      ctx.textAlign = "left";
      ctx.fillText("Total", y.left + 4, ty);
      ctx.fillText("Pulse", y.left + 4, ty + lh);
      // the pulse row itself is drawn HERE (not as a tick) so each number can
      // be coloured blue (>=50) or red (<50)
      ctx.textAlign = "center";
      dayPulses.forEach((p, i) => {
        if (p === "") return;
        ctx.fillStyle = +p >= 50 ? "#3a86d4" : "#d64541";
        ctx.fillText(p, x.getPixelForTick(i), ty + lh);
      });
      ctx.restore();
    },
  };
  const dayChart = new Chart(dayCanvas, {
    type: "bar",
    plugins: [totLabel],
    data: {
      labels: dayKeys.map((t, i) => i === 0 ? "Today" : String(new Date(t).getDate())),
      datasets: [
        ...upL.map(l => ({ label: NAMES[l],
          data: dayKeys.map(t => hrs(lvOf(t)[l])),
          backgroundColor: COLORS[l], borderRadius: 2, stack: "t" })),
        ...downL.map(l => ({ label: NAMES[l],
          data: dayKeys.map(t => -hrs(lvOf(t)[l])),
          backgroundColor: COLORS[l], borderRadius: 2, stack: "t" })),
      ],
    },
    options: { responsive: true, maintainAspectRatio: false, ...NO_ANIM,
      plugins: { legend: { display: false },
        tooltip: { ...HTML_TOOLTIP, callbacks: {
          title: c => c[0].dataIndex === 0 ? "Today"
            : new Date(dayKeys[c[0].dataIndex]).toLocaleDateString(undefined,
                { weekday: "short", day: "numeric", month: "short" }),
          label: c => ` ${Math.abs(c.raw)}h ${c.dataset.label}`,
          afterLabel: c => {
            const apps = dayApps.get(dayKeys[c.dataIndex])?.[order[c.datasetIndex]] ?? [];
            if (!apps.length) return "";
            return apps.slice(0, 5).map(([n, s]) => `   ${hrs(s)}h  ${n}`).join("\n");
          },
        } } },
      scales: {
        x: { stacked: true, grid: { display: false },
             // no dates (those live in the tooltip) — instead each day's total
             // logged hours at the bottom, one label per bar (no skipping)
             ticks: { color: "#909090", maxRotation: 0, autoSkip: false,
                      font: { size: tickPx },
                      // two stacked rows per day: total hours, then a blank
                      // slot the totLabel plugin fills with the coloured pulse
                      callback: (v, i) => [dayTotals[i], ""] } },
        y: { stacked: true, position: "right",  // hours on the right, like the list cards
             min: -yMax, max: yMax,
             // "Total" under the axis is wider than the "8h" tick labels the
             // axis sizes itself for; reserve enough width so it never clips.
             afterFit: s => { s.width = Math.max(s.width, Math.ceil(tickPx * 2.6) + 6); },
             grid: { color: ctx => ctx.tick.value === 0 ? "#5a5a5a" : "#333333",
                     lineWidth: ctx => ctx.tick.value === 0 ? 2 : 1 },
             ticks: { color: "#909090", font: { size: tickPx },
                      callback: v => Math.round(Math.abs(v)) + "h" } },
      } },
  });

  // Keep the chart's text the SAME size as every other card's text: the root
  // font size is vw-based (clamp), but Chart.js bakes fonts in as pixels at
  // creation time — so after any resize recompute the pixel size and update
  // the chart. Without this the chart text ends up smaller (or larger) than
  // the rest of the page whenever the widget width changes after load.
  const syncChartFont = () => {
    const p = Math.round(remPx() * 0.8);
    if (p === tickPx) return;
    tickPx = p;
    dayChart.options.scales.x.ticks.font.size = p;
    dayChart.options.scales.y.ticks.font.size = p;
    dayChart.update();
  };
  window.addEventListener("resize", syncChartFont);
  new ResizeObserver(syncChartFont).observe(document.documentElement);

  // ---- clicking anywhere in the 14-days card (except a day bar) CYCLES
  // its content: 14 Days -> Weekly Pulse -> Weekly Categories -> Monthly
  // Pulse -> Monthly Categories -> Yearly Pulse -> Yearly Categories ->
  // back. The trend graphs come from the shared buildTrendChart machinery
  // (archive.json loads lazily on the first cycle). ----
  {
    const card14 = dayCanvas.closest(".card");
    const wrap = document.createElement("div");
    wrap.className = "cycle-wrap";
    wrap.hidden = true;
    wrap.innerHTML = `<canvas id="cycleCanvas"></canvas>`;
    dayCanvas.parentElement.appendChild(wrap);          // inside .chart-fill
    const h2 = card14.querySelector("h2");
    const stats = [document.getElementById("avg14Head"),
                   document.getElementById("tot14Head")];
    const VIEWS = [[null, "14 Days"],
      ["d-pulse", "14-Day Pulse"], ["d-cats", "14-Day Categories"]];
    let vi = 0, cyc = null;
    card14.addEventListener("click", async e => {
      e.stopPropagation();
      vi = (vi + 1) % VIEWS.length;
      const [key, name] = VIEWS[vi];
      cyc?.destroy(); cyc = null;
      h2.textContent = name;
      stats.forEach(s => { s.hidden = !!key; });
      if (!key) {                       // back to the 14-day bars
        wrap.hidden = true;
        dayCanvas.style.visibility = "";
        return;
      }
      dayCanvas.style.visibility = "hidden";
      wrap.hidden = false;
      // tiny legend on this small card + only the top 5 categories
      cyc = await buildTrendChart("cycleCanvas", key, { legendScale: 1, topN: 5 });
    });
  }

  // =========================================================================
  // App search card + app detail card
  // Data source: docs/archive.json — the FULL per-day history the fetch
  // script maintains (loaded lazily, only once the search box is touched).
  // =========================================================================
  const esc = s => String(s).replace(/[&<>"]/g,
    c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const searchCard = document.getElementById("searchCard");
  const detailCard = document.getElementById("appDetailCard");
  const inputEl = document.getElementById("appSearch");
  const sugEl = document.getElementById("searchSug");
  // While a detail card OR the suggestion list is open, the dashboard cards
  // underneath are hidden (body.overlay-open in styles.css) — only the
  // search bar and the open overlay stay visible. The observer catches
  // EVERY open/close path (typing, click, ESC, outside click).
  const syncOverlayState = () => document.body.classList.toggle(
    "overlay-open", !detailCard.hidden || !sugEl.hidden);
  const overlayMo = new MutationObserver(syncOverlayState);
  overlayMo.observe(detailCard, { attributes: true, attributeFilter: ["hidden"] });
  overlayMo.observe(sugEl, { attributes: true, attributeFilter: ["hidden"] });
  // Card clicks navigate to Trends views — keep clicks inside the
  // search card local, and let a click on the detail card CLOSE it instead.
  searchCard.addEventListener("click", e => e.stopPropagation());
  detailCard.addEventListener("click", e => {
    e.stopPropagation();
    detailCard.hidden = true;
  });
  // ESC closes the detail card too (anywhere on the page)...
  document.addEventListener("keydown", e => {
    if (e.key === "Escape" && !detailCard.hidden) detailCard.hidden = true;
  });
  // ...and so does a click OUTSIDE it. Capture phase, so the click is
  // swallowed before any other handler — closing an overlay must not also
  // fire a card's click-through.
  document.addEventListener("click", e => {
    const sugOpen = !sugEl.hidden, detOpen = !detailCard.hidden;
    if (!sugOpen && !detOpen) return;
    if (e.target.closest?.("#appDetailCard, #searchSug, #appSearch")) return;
    if (detOpen) detailCard.hidden = true;
    if (sugOpen) { sugList = []; renderSug(); }
    e.stopPropagation();
    e.preventDefault();
  }, true);

  // ---- every detail card spans the FULL page: from just under the search
  // bar down to the bottom edge of the (hidden) dashboard cards, so all
  // search results share one size. The apps list inside then shows exactly
  // as many rows as fit (see detailRefit). ----
  const gridEl = document.querySelector(".grid");
  const sizeDetailCard = () => {
    if (detailCard.hidden) return;
    const h = gridEl.getBoundingClientRect().bottom
            - detailCard.getBoundingClientRect().top;
    detailCard.style.height = Math.max(120, h) + "px";
  };
  let detailRefit = null;        // re-renders + re-trims the period apps list
  let periodPulseChart = null;   // the period card's CURRENT-period ring
  let periodPulseChart2 = null;  // ...and its PRIOR-period ring (far right)
  let trendCharts = [];          // the Trends card's active chart
  let periodTabChart = null;     // the period card's Weekly-tab chart
  window.addEventListener("resize", () => {
    if (!detailCard.hidden) { sizeDetailCard(); detailRefit?.(); }
    if (!sugEl.hidden) { sizeSugCard(); updateSug(); }  // re-size + re-cap
  });

  // one detail card at a time: whichever show* function takes the card over
  // destroys every chart the previous content may have left behind
  const destroyDetailCharts = () => {
    periodPulseChart?.destroy(); periodPulseChart = null;
    periodPulseChart2?.destroy(); periodPulseChart2 = null;
    periodTabChart?.destroy(); periodTabChart = null;
    trendCharts.forEach(c => c.destroy()); trendCharts = [];
  };

  let archivePromise = null;
  const loadArchive = () => archivePromise ??= loadJson("archive.json", null).then(arch => {
    // archive.json is RAW RescueTime data; apply the dictionary's type/category
    // overrides here (once) so every archive-based view (Trends, search index,
    // period details) matches the fetcher-translated data.json
    if (arch && arch.days && hasOverrides)
      for (const day in arch.days) arch.days[day] = arch.days[day].map(translateRow);
    return arch;
  });

  // ---- "x% of all your time": an entity's ALL-TIME hours as a share of
  // EVERY attributable hour in the archive — shown right under the Total
  // Logged line on the app / category / type detail cards ----
  let grandTotCache = null;
  const grandTotalSec = arch => grandTotCache ??= (() => {
    let s = 0;
    for (const rows of Object.values(arch?.days ?? {}))
      for (const [sec] of rows) s += sec;
    return s;
  })();
  const fmtPct = v => v >= 9.95 ? String(Math.round(v)) : v.toFixed(1);
  // The share lines live INSIDE their value cell's own grid (v80): the app
  // card puts "% / Of All Your Time" as a second grid row of the Total
  // halfCell, the category/type/app-period cards build theirs into the
  // four-column entity summary in showPeriodDetail — so the share is always
  // aligned and styled exactly like the hours line above it.

  // All known apps (merged by display name) with their all-time totals —
  // built once from the archive; falls back to the 30-day rows when the
  // archive hasn't been generated yet.
  let appIndexPromise = null;
  const appIndex = () => appIndexPromise ??= loadArchive().then(arch => {
    const idx = new Map();
    const cutoff30 = isoOf(daysAgo(29).getTime());   // past 30 days incl. today
    const add = (act, sec, recent) => {
      const name = appName(act), k = name.toLowerCase();
      const e = idx.get(k) ?? { name, total: 0, last30: 0 };
      e.total += sec;
      if (recent) e.last30 += sec;
      idx.set(k, e);
    };
    if (arch?.days) {
      for (const [day, rows] of Object.entries(arch.days))
        for (const [sec, act] of rows) add(act, sec, day >= cutoff30);
    } else {
      for (const [, sec, , act] of data.month_activities ?? []) add(act, sec, true);
    }
    return [...idx.values()];
  });

  // All known CATEGORIES (merged by display name via dictionary.json) with
  // their all-time + 30-day totals — same shape as the app index.
  let catIndexPromise = null;
  let catArchive = null;   // kept for the per-period category totals below
  const catIndex = () => catIndexPromise ??= loadArchive().then(arch => {
    catArchive = arch;
    const idx = new Map();
    const cutoff30 = isoOf(daysAgo(29).getTime());
    const add = (cat, sec, recent) => {
      const name = catName(cat), k = name.toLowerCase();
      const e = idx.get(k) ?? { name, total: 0, last30: 0 };
      e.total += sec;
      if (recent) e.last30 += sec;
      idx.set(k, e);
    };
    if (arch?.days) {
      for (const [day, rows] of Object.entries(arch.days))
        for (const [sec, , cat] of rows) add(cat, sec, day >= cutoff30);
    } else {
      for (const [, sec, , , cat] of data.month_activities ?? []) add(cat, sec, true);
    }
    return [...idx.values()];
  });

  // The five productivity TYPES (Work .. Distracting) are
  // searchable exactly like categories — with all-time + 30-day totals.
  let lvlIndexPromise = null;
  const lvlIndex = () => lvlIndexPromise ??= loadArchive().then(arch => {
    const idx = new Map(LEVELS.map(l => [l, { lvl: l, name: NAMES[l], total: 0, last30: 0 }]));
    const cutoff30 = isoOf(daysAgo(29).getTime());
    if (arch?.days) {
      for (const [day, rows] of Object.entries(arch.days))
        for (const [sec, , , prod] of rows) {
          const e = idx.get(String(prod));
          if (!e) continue;
          e.total += sec;
          if (day >= cutoff30) e.last30 += sec;
        }
    } else {
      for (const [, sec, , , , prod] of data.month_activities ?? []) {
        const e = idx.get(String(prod));
        if (e) { e.total += sec; e.last30 += sec; }
      }
    }
    return [...idx.values()];
  });

  // total seconds ONE filter (a category display name, or "lvl:<prod>" for a
  // productivity type) logged inside ONE period — used to show (and
  // 0.5h-filter) the "<Filter> — <Period>" combo suggestions
  const filterPeriodTotal = (p, key) => {
    const lvl = key.startsWith("lvl:") ? key.slice(4) : null;
    const hit = (cat, prod) => lvl ? String(prod) === lvl
                                   : catName(cat).toLowerCase() === key;
    let s = 0;
    if (p.h24) {
      const [b1, b0] = p.h24;
      for (const [t, sec, , , cat, prod] of (data.hour_activities ?? [])) {
        const ms = new Date(t).getTime();
        if (ms > nowMs - b1 * 36e5 && ms <= nowMs - b0 * 36e5 && hit(cat, prod)) s += sec;
      }
    } else if (catArchive?.days) {
      for (const [d, rows] of Object.entries(catArchive.days))
        if (d >= p.range[0] && d <= p.range[1])
          for (const [sec, , cat, prod] of rows) if (hit(cat, prod)) s += sec;
    } else {
      for (const [d, rows] of Object.entries(data.day_activities ?? {}))
        if (d >= p.range[0] && d <= p.range[1])
          for (const [, sec, , , cat, prod] of rows) if (hit(cat, prod)) s += sec;
    }
    return s;
  };

  // ---- every searchable PERIOD with its total logged seconds, built once
  // from the archive (rows_daily as the fallback): the named windows (Today,
  // Current 7 Days, Current Week, ...), THIS year's weeks current..1 ("Week 29"),
  // then months ("July 2026"), years ("2026") and dates ("15 07 26", also
  // searchable as "Date 15 7 2026" / "Day 15 7 2026") back to the start of
  // the data — every group NEWEST FIRST. Any period with less than 0.5 h
  // logged is dropped entirely (same floor as the apps).
  let periodIndexPromise = null;
  const periodIndex = () => periodIndexPromise ??= loadArchive().then(arch => {
    // per-day TOTAL seconds: app rows where the archive has them, seeded
    // level-only totals otherwise
    const dayTot = new Map();
    if (arch?.days || arch?.day_levels) {
      for (const [d, rows] of Object.entries(arch.days ?? {}))
        dayTot.set(d, rows.reduce((s, r) => s + r[0], 0));
      for (const [d, lv] of Object.entries(arch.day_levels ?? {}))
        dayTot.set(d, Object.values(lv).reduce((s, x) => s + x, 0));
    } else {
      for (const [date, sec] of data.rows_daily ?? []) {
        const d = date.slice(0, 10);
        dayTot.set(d, (dayTot.get(d) ?? 0) + sec);
      }
    }
    const sumTot = ([a, b]) => {
      if (a === b) return dayTot.get(a) ?? 0;   // single-day fast path (v81):
                                                // with 10y of data the DATE
                                                // pushes dominate this index
      let s = 0;
      for (const [d, sec] of dayTot) if (d >= a && d <= b) s += sec;
      return s; };
    const addD = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
    const isoD = d => isoOf(d.getTime());
    const ddmmyy = iso => `${iso.slice(8, 10)} ${iso.slice(5, 7)} ${iso.slice(2, 4)}`;
    const RT = "https://www.rescuetime.com/dashboard/for/the/";
    const out = [];
    let prio = 0;   // insertion order = tie-break order in the suggestions
    // Periods under the 0.5 h floor never become searchable (user request —
    // strict, applies to EVERY period kind and to apps alike).
    // alt = extra searchable names for the same period ("Date 15 7 2026").
    const push = (label, range, prevLabel, prevRange, rtUrl, alt) => {
      const total = sumTot(range);
      if (total >= MIN_LOGGED_SEC)
        out.push({ label, range, prevLabel, prevRange,
                   prevTotal: sumTot(prevRange),
                   rtUrl: rtUrl ?? null, alt: alt ?? null, total, prio });
      prio++;
    };
    const dayPair = d => [isoD(d), isoD(d)];
    const ws = weekStart(now), ms = monthStart(now);
    const pm = new Date(ms); pm.setMonth(pm.getMonth() - 1);
    const ppm = new Date(ms); ppm.setMonth(ppm.getMonth() - 2);
    const ys = new Date(now.getFullYear(), 0, 1);
    const pys = new Date(now.getFullYear() - 1, 0, 1);
    // rolling 24-hour windows come from the HOURLY rows, not day totals
    const hourRows = data.hour_activities ?? [];
    const sumH24 = ([back1, back0]) => {   // (now-back1 h, now-back0 h]
      let s = 0;
      for (const [t, sec] of hourRows) {
        const ms = new Date(t).getTime();
        if (ms > nowMs - back1 * 36e5 && ms <= nowMs - back0 * 36e5) s += sec;
      }
      return s;
    };
    const pushH24 = (label, win, prevLabel, prevWin) => {
      const total = sumH24(win);
      if (total >= MIN_LOGGED_SEC)
        out.push({ label, h24: win, prevH24: prevWin, prevLabel,
                   range: null, prevRange: null, prevTotal: sumH24(prevWin),
                   rtUrl: null, alt: null, total, prio });
      prio++;
    };
    // the named windows first — they win suggestion-order ties. Every period
    // has a CURRENT and a PRIOR (rolling) / PAST (calendar) equivalent:
    // Current X = the last X ending now/today, Prior X = the X before that.
    push("Today", dayPair(now), "Yesterday", dayPair(addD(now, -1)),
         RT + "day/of/" + isoD(now));
    push("Yesterday", dayPair(addD(now, -1)), ddmmyy(isoD(addD(now, -2))),
         dayPair(addD(now, -2)), RT + "day/of/" + isoD(addD(now, -1)));
    pushH24("Current 24 Hours", [24, 0], "Prior 24 Hours", [48, 24]);
    pushH24("Prior 24 Hours", [48, 24], "24 Hours Before", [72, 48]);
    push("Current 7 Days", [isoD(addD(now, -6)), isoD(now)],
         "Prior 7 Days", [isoD(addD(now, -13)), isoD(addD(now, -7))], null);
    push("Prior 7 Days", [isoD(addD(now, -13)), isoD(addD(now, -7))],
         "7 Days Before", [isoD(addD(now, -20)), isoD(addD(now, -14))], null);
    push("Current 14 Days", [isoD(addD(now, -13)), isoD(now)],
         "Prior 14 Days", [isoD(addD(now, -27)), isoD(addD(now, -14))], null);
    push("Prior 14 Days", [isoD(addD(now, -27)), isoD(addD(now, -14))],
         "14 Days Before", [isoD(addD(now, -41)), isoD(addD(now, -28))], null);
    push("Current 30 Days", [isoD(addD(now, -29)), isoD(now)],
         "Prior 30 Days", [isoD(addD(now, -59)), isoD(addD(now, -30))], null);
    push("Prior 30 Days", [isoD(addD(now, -59)), isoD(addD(now, -30))],
         "30 Days Before", [isoD(addD(now, -89)), isoD(addD(now, -60))], null);
    push("Current Week", [isoD(ws), isoD(now)],
         "Past Week", [isoD(addD(ws, -7)), isoD(addD(ws, -1))],
         RT + "week/of/" + isoD(now));
    push("Past Week", [isoD(addD(ws, -7)), isoD(addD(ws, -1))],
         "Week Before", [isoD(addD(ws, -14)), isoD(addD(ws, -8))],
         RT + "week/of/" + isoD(addD(ws, -7)));
    push("Current Month", [isoD(ms), isoD(now)],
         "Past Month", [isoD(pm), isoD(addD(ms, -1))],
         RT + "month/of/" + isoD(ms));
    push("Past Month", [isoD(pm), isoD(addD(ms, -1))],
         "Month Before", [isoD(ppm), isoD(addD(pm, -1))],
         RT + "month/of/" + isoD(pm));
    push("Current Year", [isoD(ys), isoD(now)],
         "Past Year", [isoD(pys), isoD(addD(ys, -1))],
         RT + "year/of/" + isoD(ys));
    push("Past Year", [isoD(pys), isoD(addD(ys, -1))],
         "Year Before", [isoD(new Date(now.getFullYear() - 2, 0, 1)), isoD(addD(pys, -1))],
         RT + "year/of/" + isoD(pys));
    // calendar weeks of THIS year only, the current week DOWN to Week 1 —
    // so "week" suggests the current week first, then last week, ...
    for (let s = weekStart(now), w1 = weekStart(new Date(now.getFullYear(), 0, 4));
         s >= w1; s = addD(s, -7)) {   // ISO week 1 holds Jan 4
      const ps = addD(s, -7);
      push(`Week ${isoWeekNum(s)}`, [isoD(s), isoD(addD(s, 6))],
           `Week ${isoWeekNum(ps)}`, [isoD(ps), isoD(addD(ps, 6))],
           RT + "week/of/" + isoD(s));
    }
    const first = [...dayTot.keys()].sort()[0];
    if (first) {
      // "Total" — every logged hour as ONE searchable period (v81). Its
      // detail page is the all-time view: noPrev hides every prior-period /
      // trend element, adds the Averages tab and share-% bar labels. Also
      // works in combos ("Games Total" -> that category's Total page).
      {
        const range = [first, isoD(now)];
        const total = sumTot(range);
        if (total >= MIN_LOGGED_SEC)
          out.push({ label: "Total", range, prevLabel: "No Prior Period",
                     prevRange: ["0001-01-01", "0001-01-01"], prevTotal: 0,
                     noPrev: true, rtUrl: null, alt: ["All Time"], total, prio });
        prio++;
      }
      // calendar months, newest first, back to the START OF THE DATA — a
      // month name suggests that month across EVERY year with data
      // ("January" -> January 2026, January 2025, ...); the 0.5 h floor
      // still hides empty months
      const monLbl = d => {
        const s = d.toLocaleDateString(undefined, { month: "long" });
        return s.charAt(0).toUpperCase() + s.slice(1) + " " + d.getFullYear();
      };
      for (let s = new Date(ms); isoD(new Date(s.getFullYear(), s.getMonth() + 1, 0)) >= first;
           s.setMonth(s.getMonth() - 1)) {
        const ps = new Date(s.getFullYear(), s.getMonth() - 1, 1);
        push(monLbl(s), [isoD(s), isoD(new Date(s.getFullYear(), s.getMonth() + 1, 0))],
             monLbl(ps), [isoD(ps), isoD(new Date(s.getFullYear(), s.getMonth(), 0))],
             RT + "month/of/" + isoD(s));
      }
      // calendar years, newest first ("2026")
      for (let y = now.getFullYear(); y >= +first.slice(0, 4); y--) {
        push(String(y), [isoD(new Date(y, 0, 1)), isoD(new Date(y, 11, 31))],
             String(y - 1), [isoD(new Date(y - 1, 0, 1)), isoD(new Date(y - 1, 11, 31))],
             RT + "year/of/" + y + "-01-01");
      }
      // single dates, newest first — label "15 07 26" (typing "15 07"
      // matches that DD MM across EVERY year with data). ALSO searchable via
      // "Date"/"Day" + day month year in ANY padding — "Day 15 7 2026",
      // "Day 15 07 2026", "Date 05 07 2026", ... — so a partially typed
      // "Day 20 0" keeps suggesting instead of going dead.
      for (const d of [...dayTot.keys()].sort().reverse()) {
        const pd = isoD(addD(new Date(d + "T00:00:00"), -1));
        const y = d.slice(0, 4), mP = d.slice(5, 7), dP = d.slice(8, 10);
        const alts = new Set();
        for (const dd of new Set([String(+dP), dP]))
          for (const mm of new Set([String(+mP), mP]))
            for (const w of ["Date", "Day"])
              alts.add(`${w} ${dd} ${mm} ${y}`);
        push(ddmmyy(d), [d, d], ddmmyy(pd), [pd, pd], RT + "day/of/" + d, [...alts]);
      }
    }
    return out;
  });

  // Match TIER — 2: the name STARTS with the query, 1: it merely CONTAINS
  // it, -1: no match (never fuzzy — typing "un" only surfaces names with
  // "un" actually in them). Ranking uses the tier ALONE; within a tier the
  // caller's own order decides — periods keep the index's newest-first order
  // (so "week" puts the CURRENT week on top, then last week, ...), apps
  // order by logged hours.
  function matchTier(q, name) {
    q = q.toLowerCase(); const n = name.toLowerCase();
    if (!q) return -1;
    if (n === q) return 3;   // EXACT match beats everything (v81) — makes
                             // "Week 1" rank above Week 10..19 instead of
                             // being buried below the 5-period cap
    const i = n.indexOf(q);
    return i === 0 ? 2 : i > 0 ? 1 : -1;
  }

  // The suggestion list has three groups — PERIODS on top, then CATEGORIES
  // (incl. productivity types), then APPS — each introduced by a labelled
  // .sug-head so the group kind is obvious at a glance (user request; the
  // bare divider lines said nothing). Entries under the 0.5 h floor never
  // appear in any group.
  let sugList = [], sugIdx = -1;   // {kind:"period",p} | {kind:"cat",c,p,...} | {kind:"app",a}
  // v81: the FULL matching candidates per group + the current per-group
  // caps. renderSug grows the caps (Periods first, then Categories, then
  // Apps) while every row still fits, so the card ideally has no empty
  // space; sugExpand limits that grow pass to one per fresh query.
  let sugPools = null, sugCounts = null, sugExpand = false;
  const composeSug = () => {
    sugList = sugPools ? [...sugPools.vw,
      ...sugPools.per.slice(0, sugCounts.per),
      ...sugPools.cat.slice(0, sugCounts.cat),
      ...sugPools.app.slice(0, sugCounts.app)] : [];
  };
  // the suggestions card shares the detail cards' geometry: same gap under
  // the search bar, same bottom edge (the grid's) — sizeSugCard mirrors
  // sizeDetailCard. The card ALWAYS keeps that full size; fewer suggestions
  // just fill it from the top down, more get capped to what fits.
  const sizeSugCard = () => {
    if (sugEl.hidden) return;
    const h = gridEl.getBoundingClientRect().bottom
            - sugEl.getBoundingClientRect().top;
    sugEl.style.height = Math.max(120, h) + "px";
  };
  function renderSug() {
    if (!sugList.length) {
      sugEl.hidden = true; sugEl.innerHTML = ""; sugEl.style.height = "";
      return;
    }
    const wasHidden = sugEl.hidden;
    sugEl.hidden = false;
    if (wasHidden) sizeSugCard();
    // when the SAME display name appears in more than one group — e.g. a
    // category AND a productivity type both called "Personal", or an app that
    // shares a category's name — tag each row with what it is (App / Category /
    // Type) so the otherwise-identical rows are tellable apart. Shown ONLY when
    // the list actually holds a duplicate of that name (user request).
    const sugTagKind = s =>
      s.kind === "app" ? "App"
      : s.kind === "cat" ? (String(s.key).startsWith("lvl:") ? "Type" : "Category")
      : s.kind === "period" ? "Period"
      : s.kind === "trends" ? "View" : "";
    const sugBaseName = s =>
      s.kind === "app" ? s.a.name
      : s.kind === "cat" ? (s.bare ? s.c.name : (s.label ?? ""))
      : s.kind === "period" ? s.p.label
      : (s.label ?? "");
    const build = list => {
      const nameCount = {};
      for (const s of list) {
        const n = String(sugBaseName(s)).toLowerCase();
        nameCount[n] = (nameCount[n] ?? 0) + 1;
      }
      const dupTag = s => nameCount[String(sugBaseName(s)).toLowerCase()] > 1
        ? ` <span class="sug-unit">(${sugTagKind(s)})</span>` : "";
      return `<h2 class="sug-title">Search Suggestions</h2>` +
      `<div class="sug-list">` + list.map((s, i) => {
      const open = `<div class="sug-row${i === sugIdx ? " active" : ""}" data-i="${i}">`;
      const row = s.kind === "trends"
        // a Trends view (Pulse / Categories / Apps over the past 4 weeks)
        ? `${open}
             <span class="sug-name">${esc(s.label ?? "Trends")}${dupTag(s)}</span>
             <span class="sug-hours"></span>
             <span class="sug-hours"><span class="sug-unit">Weekly Trends</span></span>
           </div>`
        : s.kind === "period"
        // periods: label left, the period's logged hours right
        ? `${open}
             <span class="sug-name">${esc(s.p.label)}${dupTag(s)}</span>
             <span class="sug-hours"></span>

      ? (h24[1] === 0 ? "Rolling Last 24 Hours (Hourly Data)"

    const tipBody = (catDisplay ? `${catDisplay} Only\n` : "") +
      `${p.label}: ${winText(p.range, p.h24)}\n` +
      (p.noPrev ? "" : `${p.prevLabel}: ${winText(p.prevRange, p.prevH24)}\n`) + tipTrend;
    // ---- Productive / Neutral / Distracting rows: a stacked level bar +
    // hours for the CURRENT period (left) and the PREVIOUS one (right),

    const BUCKETS = [
      ["Productive",  ["2", "1"],   "Work + Productive"],
      ["Neutral",     ["0"],        "Neutral"],
      ["Distracting", ["-1", "-2"], "Personal + Distracting"],

    const sumLv = (A, levels) => levels.reduce((s, l) => s + A.lv[l], 0);
    // only the CURRENT period's bars are drawn (the prior-period cells were
    // replaced by the pulse ring), so they alone set the shared scale
    const maxSec = Math.max(1, ...BUCKETS.map(([, levels]) => sumLv(curA, levels)));
    // One cell = "Xh Word" text with the stacked bar running UNDERNEATH it.
    // side = span-l/span-r (category cards' two-sided row) | pt-bar (period
    // cards' grid). attrs (optional) carries per-cell tooltip / click zones.
    const lvlCell = (A, levels, sec, word, side, attrs = "") => {
      const segs = levels.map(l =>
        `<div class="seg" style="flex:${A.lv[l]} 1 0;background:${COLORS[l]}"></div>`).join("");
      return `<div class="cat-row lvl-cell ${side}"${attrs}>
          <div class="cat-bar stackbar" style="width:${(100 * sec / maxSec).toFixed(1)}%">${segs}</div>
          <div class="cat-label"><span class="cat-time">${hrs(sec)}h</span><span class="cat-name">${esc(word)}</span></div>

    // barless variant of the same cell, for the Total Logged row
    const textCell = (secH, word, side, attrs = "") =>
      `<div class="cat-row lvl-cell ${side}"${attrs}>

    // the level rows make no sense for a single CATEGORY — period cards only.
    // Each bucket contributes a bar cell (grid col 1) + a trend cell (col 3);
    // the tooltip attrs sit on BOTH cells (there is no row wrapper anymore).
    const bucketRows = catKey ? [] : BUCKETS.map(([label, levels, lvNames]) => {
      const cur = sumLv(curA, levels), prev = sumLv(prevA, levels);
      let bTrend = "", bTip = p.noPrev ? "All Recorded Data" : "No Comparison Available";
      if (!p.noPrev && (cur || prev)) {
        const dHrs = hrs(cur - prev);
        const up = dHrs >= 0;
        const pct = prev ? Math.round(100 * cur / prev) : null;
        bTrend = `<span style="color:${up ? BLUE : RED}">${up ? "▲" : "▼"}
